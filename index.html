<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro v16</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root {
  --g:#00ff41; --g2:#00cc33; --g3:#003a12;
  --b:#00aaff; --r:#ff3333; --y:#ffe600;
  --o:#ff9900; --p:#cc44ff;
  --panel:rgba(2,8,4,.94); --border:rgba(0,255,65,.18);
  --card-h:220px; 
  --audio-h:100px; /* Фиксированная высота звука */
  --term-h:150px;  /* Фиксированная высота терминала */
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace; color:var(--g); -webkit-tap-highlight-color:transparent; user-select:none;}

/* BOOT SECTION */
#boot{position:fixed;inset:0;background:#000;z-index:300; display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
#boot-hex{position:absolute;inset:0;overflow:hidden;opacity:.05;pointer-events:none;}
#boot-hex svg{width:100%;height:100%;}
#boot-logo-wrap{position:relative;margin-bottom:10px;line-height:1;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900; font-size:clamp(42px,12vw,82px);letter-spacing:.18em;white-space:nowrap;color:transparent;}
.bc{display:inline-block;opacity:0;color:var(--g); text-shadow:0 0 24px rgba(0,255,65,.55); animation:charDrop .55s forwards;}
#boot-logo-g{position:absolute;inset:0;font-family:'Orbitron',sans-serif;font-weight:900; font-size:clamp(42px,12vw,82px);letter-spacing:.18em;color:var(--g);opacity:0;animation:glitchLoop 5s 1.6s infinite;}
#boot-scan{position:absolute;left:0;right:0;height:2px;top:0; background:linear-gradient(90deg,transparent,var(--g),transparent); box-shadow:0 0 12px var(--g);animation:scanDown 3s infinite;}
#boot-log{width:min(360px,88vw);font-size:8.5px;color:var(--g2);min-height:90px;}
#pb-wrap{width:min(360px,88vw);margin-top:16px;}
#pb-track{height:2px;background:var(--g3);}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 12px var(--g);transition:width .35s;}
#btn-start{margin-top:32px;display:none;background:none;border:1px solid var(--g);color:var(--g); font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.35em;padding:13px 44px;cursor:pointer;}

/* MAIN APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#vp{position:relative;flex:1;overflow:hidden;background:#000;}
video{display:none;}
#output_canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}
#vignette{position:absolute;inset:0;z-index:4;pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.85) 100%);}
#alert-flash{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;}
#alert-flash.on{animation:alertFlash 1.2s forwards;}

/* HUD ELEMENTS */
#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:flex;justify-content:space-between;padding:10px 14px;pointer-events:none;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:.2em;}
#badges{display:flex;gap:5px;}
.badge{font-size:7.5px;padding:3px 8px;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;}
.bdot{width:4px;height:4px;border-radius:50%;background:var(--g);animation:dotBlink 1.5s infinite;}
#btn-cam-switch{position:absolute;top:50px;right:14px;z-index:20; background:var(--panel);border:1px solid var(--border);color:var(--g2);font-size:9px;padding:7px 12px;cursor:pointer;}

/* INFO CARD (OPENS ABOVE AUDIO) */
#info-card{
  position:absolute;
  bottom:calc(var(--audio-h) + var(--term-h));
  left:0; right:0;
  height:var(--card-h);
  background:rgba(1,5,2,.98);
  border-top:1px solid var(--g);
  z-index:40;
  transform:translateY(100%);
  opacity:0;
  transition:all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
  pointer-events:none;
}
#info-card.open{transform:translateY(0); opacity:1; pointer-events:all;}
#ic-close{position:absolute;top:8px;right:12px;background:none;border:1px solid var(--g3);color:var(--g);font-size:8px;padding:3px 8px;cursor:pointer;}
#ic-body{padding:15px; display:flex; flex-direction:column; gap:8px;}
#ic-name{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;}
#ic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px 10px;font-size:8px;}
.ick{color:rgba(0,255,65,0.4);}
#ic-actions{display:flex;align-items:center;gap:12px;margin-top:5px;}
#ic-thumb{width:60px;height:35px;border:1px solid var(--g3);object-fit:cover;display:none;}
#ic-thumb.ready{display:block;}

/* AUDIO BLOCK (FIXED) */
#audio-strip{
  height:var(--audio-h);
  background:rgba(0,2,0,0.98);
  border-top:1px solid var(--g3);
  position:relative;
  z-index:30;
}
#audio-canvas{width:100%; height:100%; display:block;}
#audio-overlay{position:absolute; inset:0; padding:10px; display:flex; justify-content:space-between; pointer-events:none;}
#audio-speech{position:absolute; left:50%; top:10px; transform:translateX(-50%); font-size:8px; padding:2px 10px; border:1px solid transparent; opacity:0.3;}
#audio-speech.on{border-color:var(--g); color:var(--g); opacity:1; box-shadow:0 0 10px var(--g);}

/* TERMINAL BLOCK (FIXED) */
#terminal-wrap{
  height:var(--term-h);
  background:#000;
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:30;
}
#term-header{padding:5px 12px; border-bottom:1px solid rgba(0,255,65,0.1); display:flex; justify-content:space-between; align-items:center;}
#term-title{font-size:7px; letter-spacing:2px; color:rgba(0,255,65,0.4);}
#term-body{flex:1; overflow-y:auto; font-size:8px; padding:5px 0;}
.trow{display:grid; grid-template-columns:60px 70px 1fr 70px 70px; padding:2px 12px; border-left:2px solid transparent;}
.trow.system{border-left-color:var(--p);}
.trow.person{border-left-color:var(--g);}

/* ANIMATIONS */
@keyframes charDrop{0%{opacity:0;transform:translateY(-10px)}100%{opacity:1;transform:none}}
@keyframes scanDown{0%{top:0;opacity:0}50%{opacity:1}100%{top:100%;opacity:0}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes alertFlash{0%{opacity:1;background:rgba(255,0,0,0.2)}100%{opacity:0}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex"><svg viewBox="0 0 800 600"><pattern id="hxp" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#00ff41"/></pattern><rect width="100%" height="100%" fill="url(#hxp)"/></svg></div>
  <div id="boot-logo-wrap">
    <div id="boot-logo"><span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span></div>
    <div id="boot-logo-g">myEYE</div>
    <div id="boot-scan"></div>
  </div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div></div>
  <button id="btn-start" onclick="startApp()">INITIALIZE SYSTEM</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="vignette"></div>
    <div id="alert-flash"></div>
    <div id="topbar">
      <div id="sys-id">myEYE // NEURAL HUD</div>
      <div id="badges">
        <div class="badge"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge"><span class="bdot"></span><span id="obj-txt">SCAN</span></div>
      </div>
    </div>
    <button id="btn-cam-switch" onclick="switchCamera()">CAM 0/1</button>
  </div>

  <div id="info-card">
    <button id="ic-close" onclick="closeCard()">CLOSE</button>
    <div id="ic-body">
      <div id="ic-name">OBJECT</div>
      <div id="ic-grid"></div>
      <div id="ic-actions">
        <img id="ic-thumb" alt="snap">
        <button id="ic-shot-btn" onclick="downloadScreenshot()" style="background:none; border:1px solid var(--g); color:var(--g); font-family:inherit; padding:5px 15px; cursor:pointer;">SAVE AS PNG</button>
        <div id="ic-audio-info" style="font-size:7px; color:var(--b);">AUDIO: <span id="ic-audio-val">--</span></div>
      </div>
    </div>
  </div>

  <div id="audio-strip">
    <canvas id="audio-canvas"></canvas>
    <div id="audio-overlay">
      <div style="font-size:7px; opacity:0.5;">SPECTRUM // ANALYZER</div>
      <div id="audio-db" style="font-size:10px;">-- dB</div>
    </div>
    <div id="audio-speech">SPEECH DETECTED</div>
  </div>

  <div id="terminal-wrap">
    <div id="term-header">
      <span id="term-title">CORE LOG // REAL-TIME</span>
      <button onclick="clearLog()" style="background:none; border:none; color:var(--g); font-size:7px; cursor:pointer;">[CLEAR]</button>
    </div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';

const CACHE_KEY = 'myeye_v16';
let UC = (()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY))||{aliases:{},counts:{},events:[]}; }catch(e){return {aliases:{},counts:{},events:[]}} })();

const GCOL = {HUMAN:'#00ff41',VEHICLE:'#ff3333',ANIMAL:'#ffe600',DEVICE:'#00aaff',OBJECT:'#ffffff'};
const GROUPS = {person:'HUMAN', car:'VEHICLE', truck:'VEHICLE', dog:'ANIMAL', cat:'ANIMAL', 'cell phone':'DEVICE'};

let detector, mpPose, mpHands;
let video = document.getElementById('input_video');
let canvas = document.getElementById('output_canvas');
let ctx = canvas.getContext('2d');
let lastObjects = [], selectedCls = null;
let currentFacingMode = 'environment';
let screenshotBlob = null;

// Audio State
let audioCtx, analyser, freqData, timeData, micReady = false;
let curDb = 0, isSpeech = false;

function sysLog(evt, type='SYS', group='SYS') {
  const body = document.getElementById('term-body');
  const row = document.createElement('div');
  const now = new Date();
  row.className = `trow ${group.toLowerCase()}`;
  row.innerHTML = `<span>${now.toTimeString().slice(0,8)}</span><span>${now.toLocaleDateString()}</span><span style="color:white">${evt}</span><span style="color:var(--g)">${type}</span><span style="opacity:0.5">${group}</span>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function clearLog() { document.getElementById('term-body').innerHTML = ''; }

async function initMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    micReady = true;
    sysLog('AUDIO ENGINE ONLINE', 'OK', 'SYS');
    renderAudio();
  } catch(e) { sysLog('MIC ACCESS DENIED', 'ERR', 'SYS'); }
}

function renderAudio() {
  if(!micReady) return;
  const acan = document.getElementById('audio-canvas');
  const actx = acan.getContext('2d');
  const W = acan.width = acan.offsetWidth;
  const H = acan.height = acan.offsetHeight;
  
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  actx.clearRect(0,0,W,H);
  
  // Draw Bars
  const barW = W / freqData.length;
  for(let i=0; i<freqData.length; i++) {
    let h = (freqData[i]/255) * H;
    actx.fillStyle = `rgba(0, 255, 65, ${0.2 + (h/H)})`;
    actx.fillRect(i*barW, H-h, barW-1, h);
  }

  // Calc dB
  let sum = 0;
  for(let i=0; i<timeData.length; i++) {
    let s = (timeData[i]-128)/128;
    sum += s*s;
  }
  curDb = Math.round(Math.sqrt(sum/timeData.length) * 100);
  document.getElementById('audio-db').textContent = curDb + ' dB';
  
  isSpeech = curDb > 15;
  document.getElementById('audio-speech').classList.toggle('on', isSpeech);
  if(selectedCls) document.getElementById('ic-audio-val').textContent = curDb + ' dB ' + (isSpeech?'[ACTIVE]':'[IDLE]');

  requestAnimationFrame(renderAudio);
}

async function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initMic();
  
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacingMode}});
  video.srcObject = stream;
  await video.play();
  
  setInterval(async () => {
    if(detector) {
      lastObjects = await detector.detect(video);
      document.getElementById('obj-txt').textContent = lastObjects.length + ' TGT';
    }
  }, 100);

  requestAnimationFrame(mainLoop);
  sysLog('NEURAL HUD V16.0 ACTIVATED', 'SYSTEM', 'SYS');
}

let lastFps = 0, frames = 0;
function mainLoop(now) {
  if(now - lastFps > 1000) {
    document.getElementById('fps-txt').textContent = frames + ' FPS';
    frames = 0; lastFps = now;
  }
  frames++;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  lastObjects.forEach(obj => {
    const [x,y,w,h] = obj.bbox;
    const col = GCOL[GROUPS[obj.class]||'OBJECT'];
    
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.strokeRect(x,y,w,h);
    
    ctx.fillStyle = col;
    ctx.font = '12px Share Tech Mono';
    ctx.fillText(`${obj.class.toUpperCase()} ${Math.round(obj.score*100)}%`, x, y > 20 ? y-5 : y+20);
  });

  requestAnimationFrame(mainLoop);
}

canvas.onclick = (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  const hit = lastObjects.find(o => cx > o.bbox[0] && cx < o.bbox[0]+o.bbox[2] && cy > o.bbox[1] && cy < o.bbox[1]+o.bbox[3]);
  if(hit) openCard(hit); else closeCard();
};

function openCard(obj) {
  selectedCls = obj.class;
  const card = document.getElementById('info-card');
  document.getElementById('ic-name').textContent = obj.class.toUpperCase();
  document.getElementById('ic-grid').innerHTML = `
    <div class="ick">CONFIDENCE</div><div>${Math.round(obj.score*100)}%</div>
    <div class="ick">GROUP</div><div>${GROUPS[obj.class]||'OBJECT'}</div>
    <div class="ick">BBOX</div><div>${Math.round(obj.bbox[2])}x${Math.round(obj.bbox[3])}</div>
    <div class="ick">STATUS</div><div>TRACKING</div>
  `;
  
  canvas.toBlob(blob => {
    screenshotBlob = blob;
    const thumb = document.getElementById('ic-thumb');
    thumb.src = canvas.toDataURL();
    thumb.classList.add('ready');
  });

  card.classList.add('open');
  sysLog(`LOCK-ON: ${obj.class.toUpperCase()}`, 'SIGHT', GROUPS[obj.class]||'OBJECT');
}

function closeCard() {
  document.getElementById('info-card').classList.remove('open');
  selectedCls = null;
}

async function switchCamera() {
  currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacingMode}});
  video.srcObject = stream;
  sysLog('CAMERA RELAY SWITCHED', 'CAM', 'SYS');
}

function downloadScreenshot() {
  if(!screenshotBlob) return;
  const url = URL.createObjectURL(screenshotBlob);
  const a = document.createElement('a');
  a.href = url; a.download = `myEYE_SNAP_${Date.now()}.png`;
  a.click();
  sysLog('DATA EXPORTED TO PNG', 'DISK', 'SYS');
}

// Initial Boot Logic
(async () => {
  const log = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const addLog = (t) => { const d = document.createElement('div'); d.textContent = '> ' + t; log.appendChild(d); };
  
  addLog('LOADING COCO-SSD...'); pb.style.width = '30%';
  detector = await cocoSsd.load();
  addLog('NEURAL NETWORK READY'); pb.style.width = '60%';
  
  addLog('MEDIAPIPE ENGINES LOADED'); pb.style.width = '90%';
  setTimeout(() => {
    pb.style.width = '100%';
    document.getElementById('btn-start').style.display = 'block';
  }, 500);
})();

</script>
</body>
</html>
