<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro v16.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<style>
:root {
  --g:  #00ff41;  --g2: #00cc33;  --g3: #003a12;
  --b:  #00aaff;  --r:  #ff3333;  --y:  #ffe600;
  --o:  #ff9900;  --p:  #cc44ff;
  --panel: rgba(2,8,4,.94);
  --border: rgba(0,255,65,.18);
  --card-h: 180px;
  --term-h: 150px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: var(--g);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* BOOT SCREEN */
#boot {
  position: fixed; inset: 0; background: #000; z-index: 300;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 24px; gap: 0;
}
#boot-hex { position:absolute; inset:0; overflow:hidden; opacity:.05; pointer-events:none; }
#boot-hex svg { width:100%; height:100%; }
#boot-logo-wrap { position: relative; margin-bottom: 10px; line-height: 1; }
#boot-logo {
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: transparent;
}
.bc {
  display: inline-block;
  opacity: 0;
  color: var(--g);
  text-shadow: 0 0 24px rgba(0,255,65,.55), 0 0 60px rgba(0,255,65,.18);
  animation: charDrop .55s cubic-bezier(.22,1,.36,1) forwards;
}
.bc:nth-child(1){animation-delay:.05s}
.bc:nth-child(2){animation-delay:.18s}
.bc:nth-child(3){animation-delay:.31s}
.bc:nth-child(4){animation-delay:.44s}
.bc:nth-child(5){animation-delay:.57s}

#boot-logo-g {
  position: absolute; inset: 0;
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: var(--g);
  opacity: 0; pointer-events: none;
  animation: glitchLoop 5s 1.6s infinite;
}
#boot-scan {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent, var(--g), transparent);
  box-shadow: 0 0 12px var(--g);
  animation: scanDown 3s ease-in-out infinite;
}
#boot-sub {
  font-size: 8px; letter-spacing: .45em; color: var(--g2); text-transform: uppercase;
  margin: 8px 0 22px; opacity: 0; animation: fadeUp .5s .95s forwards;
}
#boot-log {
  width: min(360px, 88vw); font-size: 8.5px; color: var(--g2);
  min-height: 90px; line-height: 2;
}
#boot-log .bl {
  opacity: 0; animation: fadeUp .18s forwards;
  padding-left: 5px; border-left: 2px solid var(--g3); margin-bottom: 2px;
}
#boot-log .bl.ok::before   { content: '✔ '; color: var(--g); }
#boot-log .bl.warn::before { content: '⚡ '; color: var(--o); }
#boot-log .bl.err::before  { content: '✕ '; color: var(--r); }

#pb-wrap { width: min(360px, 88vw); margin-top: 16px; }
#pb-track { height: 2px; background: var(--g3); }
#pb { height: 100%; width: 0; background: linear-gradient(90deg, var(--g2), var(--g));
  box-shadow: 0 0 12px var(--g); transition: width .35s cubic-bezier(.22,1,.36,1); }
#pb-pct { font-size: 7px; color: var(--g2); text-align: right; margin-top: 3px; letter-spacing: .2em; }

#btn-start {
  margin-top: 32px; display: none;
  background: none; border: 1px solid var(--g); color: var(--g);
  font-family: 'Orbitron', sans-serif; font-size: 10px;
  letter-spacing: .35em; padding: 13px 44px; cursor: pointer;
  position: relative; overflow: hidden; transition: color .25s;
}
#btn-start::before {
  content: ''; position: absolute; inset: 0; background: var(--g);
  transform: scaleX(0); transform-origin: left;
  transition: transform .28s cubic-bezier(.22,1,.36,1); z-index: -1;
}
#btn-start:hover::before, #btn-start:active::before { transform: scaleX(1); }
#btn-start:hover, #btn-start:active { color: #000; }

/* APP LAYOUT */
#app { position: fixed; inset: 0; display: none; flex-direction: column; }
#vp { position: relative; flex: 1 1 0; min-height: 0; overflow: hidden; background: #000; }
video { display: none; }
#output_canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; cursor: crosshair; }
#vp::after {
  content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 4px);
  animation: scanroll 8s linear infinite;
}
#vignette { position: absolute; inset: 0; z-index: 4; pointer-events: none; background: radial-gradient(ellipse at center, transparent 36%, rgba(0,0,0,.88) 100%); }
#grid-ov {
  position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: .025;
  background-image: linear-gradient(var(--g) 1px, transparent 1px), linear-gradient(90deg, var(--g) 1px, transparent 1px);
  background-size: 48px 48px;
}
#alert-flash { position: absolute; inset: 0; z-index: 6; pointer-events: none; opacity: 0; }
#alert-flash.on { animation: alertFlash 1.2s ease-out forwards; }

.hc { position: absolute; width: 52px; height: 52px; z-index: 10; pointer-events: none; }
.hc::before, .hc::after { content:''; position:absolute; background:var(--g); box-shadow:0 0 6px var(--g); }
.hc::before { width:2px; height:18px; } .hc::after { width:18px; height:2px; }
#hc-tl{top:0;left:0;}    #hc-tl::before{top:0;left:0;}     #hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}   #hc-tr::before{top:0;right:0;}    #hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;} #hc-bl::before{bottom:0;left:0;}  #hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;} #hc-br::after{bottom:0;right:0;}

#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 15; pointer-events: none;
  display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
  background: linear-gradient(180deg, rgba(0,0,0,.72) 0%, transparent 100%);
}
#sys-id { font-family:'Orbitron','Arial Black',sans-serif; font-size:13px; font-weight:900; letter-spacing:.2em; color:var(--g); text-shadow:0 0 20px rgba(0,255,65,.5); }
#sys-id small { font-weight:400; font-size:9px; opacity:.4; letter-spacing:.08em; }
#badges { display:flex; gap:5px; align-items:center; }
.badge {
  font-size:7.5px; letter-spacing:.1em; padding:3px 8px;
  border:1px solid var(--border); background:var(--panel);
  color:var(--g2); display:flex; align-items:center; gap:4px; backdrop-filter: blur(4px);
}
.bdot { width:4px; height:4px; border-radius:50%; background:var(--g); animation:dotBlink 1.5s ease-in-out infinite; box-shadow:0 0 5px var(--g); }
#b-fps .bdot { background:var(--b); box-shadow:0 0 5px var(--b); }
#b-threat { display:none; border-color:rgba(255,51,51,.4); color:var(--r); }
#b-threat .bdot { background:var(--r); box-shadow:0 0 5px var(--r); animation-duration:.6s; }
#cache-badge { position: absolute; top: 40px; left: 14px; z-index: 16; font-size: 7px; color: rgba(0,255,65,.3); letter-spacing: .15em; pointer-events: none; }
#statusbar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 9; pointer-events: none;
  display: flex; justify-content: space-between; padding: 4px 14px;
  background: linear-gradient(0deg, rgba(0,0,0,.7) 0%, transparent 100%);
}
.sbi { font-size: 7px; color: rgba(0,255,65,.32); letter-spacing: .1em; }

/* INFO CARD */
#info-card {
  flex: 0 0 var(--card-h); height: var(--card-h); overflow: hidden;
  background: rgba(1,5,2,.99); border-top: 1px solid rgba(0,255,65,.45);
  position: relative; z-index: 30; max-height: 0; transition: max-height .28s cubic-bezier(.22,1,.36,1);
  border-top-color: transparent; pointer-events: none;
}
#info-card.open { max-height: var(--card-h); border-top-color: rgba(0,255,65,.45); pointer-events: all; }
#info-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--g), transparent); animation: sweepLine 3s linear infinite; }
#ic-close { position: absolute; top: 8px; right: 12px; background: none; border: 1px solid rgba(0,255,65,.3); color: var(--g2); font-family: 'Share Tech Mono', monospace; font-size: 8px; padding: 3px 10px; cursor: pointer; }
#ic-body { padding: 10px 14px 8px; height: 100%; overflow: hidden; }
#ic-row1 { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
#ic-name { font-family: 'Orbitron','Arial Black',sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .18em; cursor: pointer; }
#ic-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px 8px; font-size: 8px; margin-bottom: 6px; }
.ick { color: rgba(0,255,65,.38); font-size: 7px; }
.icv { color: var(--g); }
#ic-desc { font-size: 7.5px; color: rgba(0,255,65,.45); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#ic-tbar { margin-top: 5px; display:flex; align-items:center; gap:8px; }
#ic-tt { flex:1; height:2px; background:var(--g3); overflow:hidden; }
#ic-tf { height:100%; width:0; transition:width .5s, background .3s; }

/* TERMINAL */
#terminal-wrap { flex: 0 0 var(--term-h); height: var(--term-h); background: rgba(0,0,0,.96); border-top: 1px solid var(--border); z-index: 20; display: flex; flex-direction: column; overflow: hidden; }
#term-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; border-bottom: 1px solid rgba(0,255,65,.1); }
#term-title { font-size:7px; letter-spacing:.25em; color:rgba(0,255,65,.3); }
#term-clear { background:none; border:none; color:rgba(0,255,65,.28); font-family:'Share Tech Mono',monospace; font-size:7px; cursor:pointer; }
#term-cols { flex: 0 0 auto; display: grid; grid-template-columns: 60px 68px 1fr 68px 74px; gap: 0 4px; padding: 2px 12px; border-bottom: 1px solid rgba(0,255,65,.07); }
.tcl { font-size:6.5px; color:rgba(0,255,65,.22); letter-spacing:.15em; text-transform:uppercase; }
#term-body { flex: 1 1 0; min-height: 0; overflow-y: auto; padding: 2px 0; scrollbar-width: thin; scrollbar-color: var(--g3) transparent; }
.trow { display: grid; grid-template-columns: 60px 68px 1fr 68px 74px; gap: 0 4px; padding: 2px 12px; font-size: 8px; line-height: 1.5; border-left: 2px solid transparent; animation: rowIn .16s ease-out both; }
.trow.person   { border-left-color: var(--g); }
.trow.vehicle  { border-left-color: var(--r); }
.trow.other    { border-left-color: rgba(255,255,255,.3); }

@keyframes charDrop { 0% { opacity:0; transform:translateY(-18px) scaleY(2.2); } 100% { opacity:1; transform:none; } }
@keyframes glitchLoop { 0%,87%,100%{ opacity:0; transform:none; } 88%{ opacity:.7; transform:translateX(-3px); clip-path:polygon(0 12%,100% 12%,100% 38%,0 38%); color:var(--r); } 90%{ opacity:.5; transform:translateX(4px); clip-path:polygon(0 55%,100% 55%,100% 80%,0 80%); color:var(--b); } 92%{ opacity:0; } }
@keyframes scanDown { 0% { top:0; opacity:0; } 100%{ top:100%; opacity:0; } }
@keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
@keyframes sweepLine { from { background-position:-200% 0; } to { background-position: 200% 0; } }
@keyframes scanroll { from { background-position:0 0; } to { background-position:0 80px; } }
@keyframes dotBlink { 0%,100%{ opacity:1; } 50% { opacity:.15; } }
@keyframes alertFlash { 0% { opacity:1; background:rgba(255,51,51,.07); } 100% { opacity:0; } }
@keyframes rowIn { from { opacity:0; transform:translateX(-5px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex">
    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <defs><pattern id="hxp" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse"><polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#hxp)"/>
    </svg>
  </div>
  <div id="boot-logo-wrap">
    <div id="boot-logo" aria-label="myEYE"><span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span></div>
    <div id="boot-logo-g" aria-hidden="true">myEYE</div>
    <div id="boot-scan"  aria-hidden="true"></div>
  </div>
  <div id="boot-sub">powered by bortin'2026</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div><div id="pb-pct">0%</div></div>
  <button id="btn-start" onclick="startApp()">ACTIVATE</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="grid-ov"></div><div id="vignette"></div><div id="alert-flash"></div>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div><div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="topbar">
      <div id="sys-id">myEYE <small>// PRO</small></div>
      <div id="badges">
        <div class="badge" id="b-fps"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge" id="b-obj"><span class="bdot"></span><span id="obj-txt">SCANNING</span></div>
        <div class="badge" id="b-threat"><span class="bdot"></span>THREAT</div>
      </div>
    </div>
    <div id="cache-badge">CACHE: 0 CLASSES</div>
    <div id="statusbar">
      <div class="sbi" id="sb-time">--:--:--</div>
      <div class="sbi" id="sb-mode">DEEP SCAN</div>
      <div class="sbi">myEYE Pro</div>
    </div>
  </div>

  <div id="info-card">
    <button id="ic-close" onclick="closeCard()">✕ CLOSE</button>
    <div id="ic-body">
      <div id="ic-row1"><div id="ic-name">---</div><div id="ic-sub">// TAP NAME TO RENAME</div></div>
      <div id="ic-grid"></div><div id="ic-desc"></div>
      <div id="ic-tbar"><div id="ic-tl">THREAT</div><div id="ic-tt"><div id="ic-tf"></div></div><div id="ic-tv">0%</div></div>
      <div id="ic-rename" onclick="renameObj()">✎ RENAME CLASS</div>
    </div>
  </div>

  <div id="terminal-wrap">
    <div id="term-header"><span id="term-title">● SYSTEM LOG</span><button id="term-clear" onclick="clearLog()">✕ CLEAR</button></div>
    <div id="term-cols"><span class="tcl">TIME</span><span class="tcl">DATE</span><span class="tcl">EVENT</span><span class="tcl">TYPE</span><span class="tcl">GROUP</span></div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';
const CACHE_KEY = 'myeye_v52_pro';
let UC = (() => { try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; } catch(e) { return {}; } })();
['aliases','counts','lastSeen','events'].forEach(k => { if (!UC[k]) UC[k] = k==='events'?[]:{} });

function saveCache() {
  if (UC.events.length > 300) UC.events = UC.events.slice(-300);
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(UC)); } catch(e) {}
  const el = document.getElementById('cache-badge');
  if (el) el.textContent = `CACHE: ${Object.keys(UC.counts).length} CLASSES / ${UC.events.length} EVT`;
}

const GROUPS = {
  person:'HUMAN', car:'VEHICLE', truck:'VEHICLE', bus:'VEHICLE', motorcycle:'VEHICLE',
  dog:'ANIMAL', cat:'ANIMAL', 'cell phone':'DEVICE', laptop:'DEVICE'
};
const GCOL = { HUMAN:'#00ff41', VEHICLE:'#ff3333', ANIMAL:'#ffe600', DEVICE:'#00aaff', OBJECT:'#ffffff' };
const KB = {
  person:{threat:.72, desc:'Homo sapiens. Скелетная модель активна.'},
  car:{threat:.55, desc:'Колёсное ТС. Гражданский класс.'},
  _d:{threat:.20, desc:'Объект идентифицирован. Анализ...'}
};

const getGroup = cls => GROUPS[cls] || 'OBJECT';
const getCol = cls => GCOL[getGroup(cls)] || '#fff';
const getKB = cls => KB[cls] || KB._d;
const getAlias = cls => UC.aliases[cls] || cls.toUpperCase();

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const termBody = document.getElementById('term-body');

let detector = null, poseModel = null, poseReady = false, poseResult = null, poseBox = null, poseCanvas = null, poseCtx = null;
let lastObjects = [], selectedCls = null, threatActive = false, detecting = false, poseRunning = false;
let frameN = 0, fpsN = 0, lastFpsT = 0;
const logThrottle = {};

function hexA(hex, a) {
  if (!hex || hex[0] !== '#') return `rgba(255,255,255,${a})`;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function nowStr() {
  const n = new Date();
  return { t: n.toTimeString().slice(0,8), d: `${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')}.${n.getFullYear()}` };
}

function sysLog(event, type='SYSTEM', group='SYS') {
  const { t, d } = nowStr();
  const cls = { HUMAN:'person', VEHICLE:'vehicle', ANIMAL:'animal', DEVICE:'device', SYS:'system' }[group] || 'other';
  const row = document.createElement('div');
  row.className = `trow ${cls}`;
  row.innerHTML = `<span class="tc-time">${t}</span><span class="tc-date">${d}</span><span class="tc-event">${event}</span><span class="tc-type" style="color:${GCOL[group]||'var(--g)'}">${type}</span><span class="tc-group">${group}</span>`;
  termBody.appendChild(row);
  if (termBody.scrollHeight - termBody.scrollTop - termBody.clientHeight < 50) termBody.scrollTop = termBody.scrollHeight;
  while (termBody.children.length > 300) termBody.firstElementChild.remove();
}

async function initModels() {
  const blogEl = document.getElementById('boot-log'), pbEl = document.getElementById('pb'), pctEl = document.getElementById('pb-pct');
  const bLog = (txt, cls='ok') => { const d = document.createElement('div'); d.className = 'bl ' + cls; d.textContent = txt; blogEl.appendChild(d); };
  const setPb = p => { pbEl.style.width = p+'%'; pctEl.textContent = p+'%'; };

  bLog('INIT VISION OS v16.0 PRO'); setPb(10); await sleep(150);
  try {
    bLog('DETECTOR: LOADING COCO-SSD...','warn');
    detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    bLog('DETECTOR: OPTIMIZED FOR DISTANCE'); setPb(60);
  } catch(e) { bLog('DETECTOR ERROR: '+e.message,'err'); }

  try {
    poseModel = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}` });
    poseModel.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    poseModel.onResults(r => { poseResult = r; poseRunning = false; });
    await poseModel.initialize(); poseReady = true; bLog('POSE ENGINE: ACTIVE'); setPb(90);
  } catch(e) { bLog('POSE: FALLBACK MODE','warn'); }

  setPb(100); bLog('ALL SYSTEMS OPERATIONAL');
  document.getElementById('btn-start').style.display = 'block';
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  saveCache();
  sysLog('SYSTEM START: DEEP SCAN MODE','SYSTEM','SYS');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => { video.play(); const loop = () => { renderFrame(); requestAnimationFrame(loop); }; requestAnimationFrame(loop); };
  });
  setInterval(() => { document.getElementById('sb-time').textContent = new Date().toTimeString().slice(0,8); }, 1000);
}

async function renderFrame() {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !detector) return;
  canvas.width = vw; canvas.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);

  fpsN++;
  const now = performance.now();
  if (now - lastFpsT > 1000) { document.getElementById('fps-txt').textContent = fpsN + ' FPS'; fpsN = 0; lastFpsT = now; }
  frameN++;

  if (!detecting) {
    detecting = true;
    try {
      // Увеличено количество объектов (150) и снижен порог (0.25) для дальности
      lastObjects = await detector.detect(video, 150, 0.25);
    } catch(e) {}
    detecting = false;
  }

  drawObjects();
  if (poseReady && frameN % 4 === 0 && !poseRunning) {
    const p = lastObjects.find(o => o.class === 'person');
    if (p) {
      const [bx, by, bw, bh] = p.bbox;
      const cx = Math.max(0, bx), cy = Math.max(0, by), cw = Math.min(bw, vw-cx), ch = Math.min(bh, vh-cy);
      if (cw > 30 && ch > 30) {
        if (!poseCanvas) { poseCanvas = document.createElement('canvas'); poseCtx = poseCanvas.getContext('2d'); }
        poseCanvas.width = cw; poseCanvas.height = ch;
        poseCtx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
        poseBox = { bx:cx, by:cy, bw:cw, bh:ch }; poseRunning = true;
        poseModel.send({ image: poseCanvas }).catch(() => poseRunning = false);
      }
    }
  }
  drawPose();
}

function drawObjects() {
  const t = frameN;
  const hasThreat = lastObjects.some(o => ['person','car','truck'].includes(o.class));
  document.getElementById('b-threat').style.display = hasThreat ? 'flex' : 'none';
  document.getElementById('obj-txt').textContent = lastObjects.length + ' TARGETS';

  // Группировка для терминала
  const counts = {};
  
  lastObjects.forEach(obj => {
    const [bx, by, bw, bh] = obj.bbox;
    const isFar = obj.score < 0.45 || (bw * bh < (canvas.width * canvas.height * 0.02));
    const col = isFar ? '#ffffff' : getCol(obj.class);
    const isSel = (obj.class === selectedCls);

    // Отрисовка рамки
    ctx.save();
    if (isFar) {
        ctx.setLineDash([5, 5]); // Пунктир для дальних объектов
        ctx.strokeStyle = "rgba(255,255,255,0.6)";
    } else {
        ctx.strokeStyle = hexA(col, 1);
    }
    ctx.lineWidth = isSel ? 3 : 1.5;
    ctx.strokeRect(bx, by, bw, bh);
    
    if (isSel) {
        ctx.fillStyle = hexA(col, 0.1);
        ctx.fillRect(bx, by, bw, bh);
    }
    
    // Метка
    ctx.setLineDash([]);
    ctx.font = "10px 'Share Tech Mono'";
    ctx.fillStyle = col;
    ctx.fillText(`${getAlias(obj.class)} [${Math.round(obj.score*100)}]`, bx, by > 15 ? by - 5 : by + 15);
    ctx.restore();

    // Сбор статистики для лога
    counts[obj.class] = (counts[obj.class] || 0) + 1;
  });

  // Вывод в терминал одной строкой с количеством
  const now = Date.now();
  Object.keys(counts).forEach(cls => {
    if (!logThrottle[cls] || now - logThrottle[cls] > 10000) {
      logThrottle[cls] = now;
      const count = counts[cls];
      sysLog(`${getAlias(cls)} (${count})`, cls.toUpperCase(), getGroup(cls));
    }
  });
}

function drawPose() {
  if (!poseResult || !poseResult.poseLandmarks || !poseBox) return;
  const lm = poseResult.poseLandmarks, { bx, by, bw, bh } = poseBox;
  const pts = lm.map(p => ({ x: bx + p.x * bw, y: by + p.y * bh, v: p.visibility || 0 }));
  ctx.save();
  ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 2;
  [[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28]].forEach(([a,b]) => {
    if (pts[a].v > 0.5 && pts[b].v > 0.5) { ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke(); }
  });
  ctx.restore();
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect(), sx = canvas.width/rect.width, sy = canvas.height/rect.height;
  const cx = (e.clientX-rect.left)*sx, cy = (e.clientY-rect.top)*sy;
  const hit = lastObjects.find(o => { const [bx,by,bw,bh] = o.bbox; return cx>=bx && cx<=bx+bw && cy>=by && cy<=by+bh; });
  if (hit) { selectedCls = hit.class; openCard(hit); } else { closeCard(); }
});

function openCard(obj) {
  const col = getCol(obj.class), kb = getKB(obj.class), alias = getAlias(obj.class);
  const nameEl = document.getElementById('ic-name');
  nameEl.textContent = alias; nameEl.style.color = col; nameEl.dataset.cls = obj.class;
  document.getElementById('ic-grid').innerHTML = `<div class="ick">КЛАСС</div><div class="icv">${obj.class.toUpperCase()}</div><div class="ick">SIGNAL</div><div class="icv">${Math.round(obj.score*100)}%</div>`;
  document.getElementById('ic-desc').textContent = kb.desc;
  document.getElementById('ic-tf').style.width = (kb.threat*100)+'%';
  document.getElementById('ic-tf').style.background = col;
  document.getElementById('info-card').classList.add('open');
}
function closeCard() { selectedCls = null; document.getElementById('info-card').classList.remove('open'); }
function clearLog() { termBody.innerHTML = ''; sysLog('LOG CLEANED','SYSTEM','SYS'); }
function renameObj() {
  const nameEl = document.getElementById('ic-name'), cls = nameEl.dataset.cls;
  const nv = prompt(`RENAME "${cls.toUpperCase()}" TO:`, getAlias(cls));
  if (nv) { UC.aliases[cls] = nv.toUpperCase(); saveCache(); nameEl.textContent = nv.toUpperCase(); }
}

initModels();
</script>
