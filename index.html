<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro</title>
<!-- Шрифты загружаем первыми, до всего остального -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

<!-- MediaPipe Pose -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root {
  --g:  #00ff41;  --g2: #00cc33;  --g3: #003a12;
  --b:  #00aaff;  --r:  #ff3333;  --y:  #ffe600;
  --o:  #ff9900;  --p:  #cc44ff;
  --panel: rgba(2,8,4,.94);
  --border: rgba(0,255,65,.18);
  --card-h: 210px;   
  --term-h: 150px;   
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: var(--g);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ══════════════════════════════════
   BOOT SCREEN
══════════════════════════════════ */
#boot {
  position: fixed; inset: 0; background: #000; z-index: 300;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 24px; gap: 0;
}

#boot-hex { position:absolute; inset:0; overflow:hidden; opacity:.05; pointer-events:none; }
#boot-hex svg { width:100%; height:100%; }

#boot-logo-wrap { position: relative; margin-bottom: 10px; line-height: 1; }

#boot-logo {
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: transparent;
}
.bc {
  display: inline-block;
  opacity: 0;
  color: var(--g);
  text-shadow: 0 0 24px rgba(0,255,65,.55), 0 0 60px rgba(0,255,65,.18);
  animation: charDrop .55s cubic-bezier(.22,1,.36,1) forwards;
}
.bc:nth-child(1){animation-delay:.05s}
.bc:nth-child(2){animation-delay:.18s}
.bc:nth-child(3){animation-delay:.31s}
.bc:nth-child(4){animation-delay:.44s}
.bc:nth-child(5){animation-delay:.57s}

#boot-logo-g {
  position: absolute; inset: 0;
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: var(--g);
  opacity: 0; pointer-events: none;
  animation: glitchLoop 5s 1.6s infinite;
}
#boot-scan {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent, var(--g), transparent);
  box-shadow: 0 0 12px var(--g);
  animation: scanDown 3s ease-in-out infinite;
}

#boot-sub {
  font-size: 8px; letter-spacing: .45em; color: var(--g2); text-transform: uppercase;
  margin: 8px 0 22px; opacity: 0; animation: fadeUp .5s .95s forwards;
}

#boot-log {
  width: min(360px, 88vw); font-size: 8.5px; color: var(--g2);
  min-height: 90px; line-height: 2;
}
#boot-log .bl {
  opacity: 0; animation: fadeUp .18s forwards;
  padding-left: 5px; border-left: 2px solid var(--g3); margin-bottom: 2px;
}
#boot-log .bl.ok::before   { content: '✔ '; color: var(--g); }
#boot-log .bl.warn::before { content: '⚡ '; color: var(--o); }
#boot-log .bl.err::before  { content: '✕ '; color: var(--r); }

#pb-wrap { width: min(360px, 88vw); margin-top: 16px; }
#pb-track { height: 2px; background: var(--g3); }
#pb { height: 100%; width: 0; background: linear-gradient(90deg, var(--g2), var(--g));
  box-shadow: 0 0 12px var(--g); transition: width .35s cubic-bezier(.22,1,.36,1); }
#pb-pct { font-size: 7px; color: var(--g2); text-align: right; margin-top: 3px; letter-spacing: .2em; }

#btn-start {
  margin-top: 32px; display: none;
  background: none; border: 1px solid var(--g); color: var(--g);
  font-family: 'Orbitron', sans-serif; font-size: 10px;
  letter-spacing: .35em; padding: 13px 44px; cursor: pointer;
  position: relative; overflow: hidden; transition: color .25s;
}
#btn-start:hover { background: var(--g); color: #000; }

/* ══════════════════════════════════
   APP LAYOUT
══════════════════════════════════ */
#app {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
}

#vp {
  position: relative;
  flex: 1 1 0;        
  min-height: 0;      
  overflow: hidden;
  background: #000;
}
video { display: none; }
#output_canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 2; cursor: crosshair;
}

#vp::after {
  content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px,
    rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 4px);
  animation: scanroll 8s linear infinite;
}
#vignette {
  position: absolute; inset: 0; z-index: 4; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 36%, rgba(0,0,0,.88) 100%);
}
#grid-ov {
  position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: .025;
  background-image: linear-gradient(var(--g) 1px, transparent 1px),
                    linear-gradient(90deg, var(--g) 1px, transparent 1px);
  background-size: 48px 48px;
}
#alert-flash { position: absolute; inset: 0; z-index: 6; pointer-events: none; opacity: 0; }
#alert-flash.on { animation: alertFlash 1.2s ease-out forwards; }

.hc { position: absolute; width: 52px; height: 52px; z-index: 10; pointer-events: none; }
.hc::before, .hc::after { content:''; position:absolute; background:var(--g); box-shadow:0 0 6px var(--g); }
.hc::before { width:2px; height:18px; } .hc::after { width:18px; height:2px; }
#hc-tl{top:0;left:0;} #hc-tr{top:0;right:0;} #hc-bl{bottom:0;left:0;} #hc-br{bottom:0;right:0;}

#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 15; pointer-events: none;
  display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
  background: linear-gradient(180deg, rgba(0,0,0,.72) 0%, transparent 100%);
}
#sys-id { font-family:'Orbitron','Arial Black',sans-serif; font-size:13px; font-weight:900;
  letter-spacing:.2em; color:var(--g); text-shadow:0 0 20px rgba(0,255,65,.5); }

#badges { display:flex; gap:5px; align-items:center; }
.badge {
  font-size:7.5px; letter-spacing:.1em; padding:3px 8px;
  border:1px solid var(--border); background:var(--panel);
  color:var(--g2); display:flex; align-items:center; gap:4px;
}
.bdot { width:4px; height:4px; border-radius:50%; background:var(--g); animation:dotBlink 1.5s infinite; }

#statusbar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 9; pointer-events: none;
  display: flex; justify-content: space-between; padding: 4px 14px;
  background: linear-gradient(0deg, rgba(0,0,0,.7) 0%, transparent 100%);
}
.sbi { font-size: 7px; color: rgba(0,255,65,.32); }

/* ══════════════════════════════════
   INFO CARD
══════════════════════════════════ */
#info-card {
  flex: 0 0 var(--card-h);   
  height: var(--card-h);
  background: rgba(1,5,2,.99);
  border-top: 1px solid rgba(0,255,65,.45);
  position: relative; z-index: 30;
  max-height: 0; overflow: hidden;
  transition: max-height .28s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}
#info-card.open { max-height: var(--card-h); border-top-color: rgba(0,255,65,.45); pointer-events: all; }

#ic-close {
  position: absolute; top: 8px; right: 12px; background: none;
  border: 1px solid rgba(0,255,65,.3); color: var(--g2);
  font-family: 'Share Tech Mono', monospace; font-size: 8px;
  padding: 3px 10px; cursor: pointer;
}

#ic-body { padding: 10px 14px 8px; height: 100%; display: flex; flex-direction: column; }
#ic-name { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .18em; }
#ic-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px 8px; font-size: 8px; margin-bottom: 6px; }
.ick { color: rgba(0,255,65,.38); font-size: 7px; }
.icv { color: var(--g); }
#ic-desc { font-size: 7.5px; color: rgba(0,255,65,.45); border-top: 1px solid var(--border); padding-top: 5px; }

#ic-actions { margin-top: auto; padding-bottom: 8px; display: flex; gap: 10px; align-items: center; }
#btn-download-cached {
  background: var(--g3); border: 1px solid var(--g); color: var(--g);
  font-family: 'Orbitron', sans-serif; font-size: 8px;
  letter-spacing: .15em; padding: 6px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
#btn-download-cached:hover { background: var(--g); color: #000; }
#ic-rename { font-size:7px; color:rgba(0,255,65,.28); cursor:pointer; }

/* ══════════════════════════════════
   TERMINAL
══════════════════════════════════ */
#terminal-wrap {
  flex: 0 0 var(--term-h); height: var(--term-h);
  background: rgba(0,0,0,.96); border-top: 1px solid var(--border);
  z-index: 20; display: flex; flex-direction: column; overflow: hidden;           
}
#term-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; border-bottom: 1px solid rgba(0,255,65,.1); }
#term-body { flex: 1; overflow-y: auto; padding: 2px 0; }
.trow { display: grid; grid-template-columns: 60px 68px 1fr 68px 74px; gap: 4px; padding: 2px 12px; font-size: 8px; border-left: 2px solid transparent; }

/* ══════════════════════════════════
   ANIMATIONS
══════════════════════════════════ */
@keyframes charDrop { 0% { opacity:0; transform:translateY(-18px); } 100% { opacity:1; transform:none; } }
@keyframes glitchLoop { 0%,90%,100%{ opacity:0; } 91%{ opacity:1; transform:translateX(-2px); color:red; } 92%{ transform:translateX(2px); color:blue; } }
@keyframes scanDown { 0%{top:0; opacity:0;} 50%{opacity:1;} 100%{top:100%; opacity:0;} }
@keyframes fadeUp { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
@keyframes scanroll { from{background-position:0 0;} to{background-position:0 80px;} }
@keyframes dotBlink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
@keyframes alertFlash { 0%{opacity:1; background:rgba(255,51,51,0.1);} 100%{opacity:0;} }
</style>

</head>
<body>

<div id="boot">
  <div id="boot-hex">
    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <pattern id="hxp" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse">
        <polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/>
      </pattern>
      <rect width="100%" height="100%" fill="url(#hxp)"/>
    </svg>
  </div>
  <div id="boot-logo-wrap">
    <div id="boot-logo">
      <span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span>
    </div>
    <div id="boot-logo-g">myEYE</div>
    <div id="boot-scan"></div>
  </div>
  <div id="boot-sub">powered by bortin</div>
  <div id="boot-log"></div>
  <div id="pb-wrap">
    <div id="pb-track"><div id="pb"></div></div>
    <div id="pb-pct">0%</div>
  </div>
  <button id="btn-start" onclick="startApp()">ENTER</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="grid-ov"></div>
    <div id="vignette"></div>
    <div id="alert-flash"></div>
    <div class="hc" style="top:0;left:0;border-left:2px solid var(--g);border-top:2px solid var(--g);width:20px;height:20px;"></div>
    <div class="hc" style="top:0;right:0;border-right:2px solid var(--g);border-top:2px solid var(--g);width:20px;height:20px;"></div>
    <div class="hc" style="bottom:0;left:0;border-left:2px solid var(--g);border-bottom:2px solid var(--g);width:20px;height:20px;"></div>
    <div class="hc" style="bottom:0;right:0;border-right:2px solid var(--g);border-bottom:2px solid var(--g);width:20px;height:20px;"></div>

    <div id="topbar">
      <div id="sys-id">myEYE <small>// PRO</small></div>
      <div id="badges">
        <div class="badge"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge"><span class="bdot"></span><span id="obj-txt">SCANNING</span></div>
        <div class="badge" id="b-threat" style="display:none; color:red;"><span class="bdot" style="background:red;"></span>THREAT</div>
      </div>
    </div>
    <div id="cache-badge" style="position:absolute; top:40px; left:14px; font-size:7px; opacity:0.5;">READY</div>
    <div id="statusbar">
      <div class="sbi" id="sb-time">--:--:--</div>
      <div class="sbi">SECURE PROXIED CONNECTION</div>
    </div>
  </div>

  <div id="info-card">
    <button id="ic-close" onclick="closeCard()">✕ CLOSE</button>
    <div id="ic-body">
      <div id="ic-row1"><div id="ic-name">---</div></div>
      <div id="ic-grid"></div>
      <div id="ic-desc"></div>
      <div id="ic-actions">
        <button id="btn-download-cached" onclick="downloadCachedCapture()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          СОХРАНИТЬ ИЗ КЭША
        </button>
        <div id="ic-rename" onclick="renameObj()">✎ RENAME</div>
      </div>
    </div>
  </div>

  <div id="terminal-wrap">
    <div id="term-header"><span style="font-size:7px;">● SYSTEM LOG</span><button onclick="clearLog()" style="background:none;border:none;color:gray;font-size:7px;cursor:pointer;">CLEAR</button></div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   CORE STATE
═══════════════════════════════════════════════ */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const termBody = document.getElementById('term-body');

let detector = null;
let poseModel = null;
let lastObjects = [];
let selectedObj = null;
let currentCapture = null; // Здесь хранится Base64 последнего авто-скриншота
let poseResult = null;
let poseBox = null;
let isDetecting = false;
let isPoseRunning = false;
let frameN = 0;

const UC = JSON.parse(localStorage.getItem('myeye_v17') || '{"aliases":{},"counts":{}}');
const GCOL = { HUMAN:'#00ff41', VEHICLE:'#ff3333', ANIMAL:'#ffe600', DEVICE:'#00aaff', OBJECT:'#ffffff' };
const GROUPS = { person:'HUMAN', car:'VEHICLE', truck:'VEHICLE', dog:'ANIMAL', cat:'ANIMAL', 'cell phone':'DEVICE' };

/* ═══════════════════════════════════════════════
   INITIALIZATION
═══════════════════════════════════════════════ */
async function initModels() {
  const bLog = (t) => {
    const d = document.createElement('div'); d.className = 'bl ok'; d.textContent = t;
    document.getElementById('boot-log').appendChild(d);
  };
  
  bLog("LOADING NEURAL CORES...");
  detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  document.getElementById('pb').style.width = "60%";
  
  poseModel = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}` });
  poseModel.setOptions({ modelComplexity: 0, smoothLandmarks: true });
  poseModel.onResults(res => { poseResult = res; isPoseRunning = false; });
  await poseModel.initialize();
  
  document.getElementById('pb').style.width = "100%";
  document.getElementById('btn-start').style.display = "block";
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 720 } })
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        requestAnimationFrame(loop);
      };
    });
}

/* ═══════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════ */
async function loop() {
  if (video.paused || video.ended) return;
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  if (!isDetecting) {
    isDetecting = true;
    detector.detect(video).then(objs => { lastObjects = objs; isDetecting = false; });
  }

  // Обработка Pose для первого попавшегося человека
  const person = lastObjects.find(o => o.class === 'person');
  if (person && !isPoseRunning) {
    isPoseRunning = true;
    poseBox = person.bbox;
    poseModel.send({ image: video });
  }

  drawHUD();
  requestAnimationFrame(loop);
}

function drawHUD() {
  lastObjects.forEach(obj => {
    const [x, y, w, h] = obj.bbox;
    const col = GCOL[GROUPS[obj.class]] || '#fff';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = col;
    ctx.font = "10px Share Tech Mono";
    ctx.fillText(obj.class.toUpperCase(), x, y > 10 ? y - 5 : y + 15);
  });

  if (poseResult && poseResult.poseLandmarks && poseBox) {
    const [bx, by, bw, bh] = poseBox;
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 1;
    poseResult.poseLandmarks.forEach(p => {
      if (p.visibility > 0.5) {
        ctx.beginPath();
        ctx.arc(bx + p.x * bw, by + p.y * bh, 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    });
  }
}

/* ═══════════════════════════════════════════════
   AUTOMATIC CAPTURE LOGIC
═══════════════════════════════════════════════ */
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  const hit = lastObjects.find(o => {
    const [x, y, w, h] = o.bbox;
    return cx >= x && cx <= x + w && cy >= y && cy <= y + h;
  });

  if (hit) {
    // 1. Мгновенно сохраняем состояние экрана в кэш
    createInstantCapture();
    // 2. Открываем описание
    selectedObj = hit;
    openCard(hit);
  } else {
    closeCard();
  }
});

function createInstantCapture() {
  // Мы берем текущее состояние основного холста (видео + отрисованные рамки)
  currentCapture = canvas.toDataURL('image/png');
  sysLog("AUTO-CAPTURE CACHED", "SYSTEM", "SYS");
}

function downloadCachedCapture() {
  if (!currentCapture) return;
  const link = document.createElement('a');
  link.download = `myEYE_Snap_${Date.now()}.png`;
  link.href = currentCapture;
  link.click();
}

/* ═══════════════════════════════════════════════
   INTERFACE
═══════════════════════════════════════════════ */
function openCard(obj) {
  const col = GCOL[GROUPS[obj.class]] || '#fff';
  document.getElementById('ic-name').textContent = (UC.aliases[obj.class] || obj.class).toUpperCase();
  document.getElementById('ic-name').style.color = col;
  document.getElementById('ic-grid').innerHTML = `
    <div class="ick">CLASS</div><div class="icv">${obj.class}</div>
    <div class="ick">CONFIDENCE</div><div class="icv">${Math.round(obj.score*100)}%</div>
  `;
  document.getElementById('ic-desc').textContent = "Автоматический снимок захвачен в кэш сессии.";
  document.getElementById('info-card').classList.add('open');
}

function closeCard() {
  document.getElementById('info-card').classList.remove('open');
  selectedObj = null;
}

function sysLog(e, t, g) {
  const row = document.createElement('div');
  row.className = 'trow';
  row.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><span>${t}</span><span style="color:var(--g)">${e}</span>`;
  termBody.prepend(row);
}

function clearLog() { termBody.innerHTML = ''; }

initModels();
</script>
</body>
</html>
