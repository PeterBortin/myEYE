<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE | ADVANCED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.85);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g),0 0 60px #004400;animation:gpulse 2s ease-in-out infinite;}
#boot-sub{font-size:9px;letter-spacing:.45em;color:var(--g2);margin:6px 0 32px;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(--g2);min-height:115px;line-height:1.9;}
#boot-log .bl{opacity:0;animation:fi .22s forwards;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px;
letter-spacing:.3em;padding:13px 42px;cursor:pointer;transition:all .2s;}
#btn-start:hover{background:var(--g);color:#000;}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.6) contrast(1.3) saturate(0.9);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(0,255,65,.016) 3px,rgba(0,255,65,.016) 4px);
animation:scanroll 10s linear infinite;}

/* CONTROLS SIDEBARS */
.side-ctrl{position:absolute;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:20px;padding:10px;}
#ctrl-left{left:0;align-items:center;}
#ctrl-right{right:0;align-items:center;}

.v-slider{appearance:none;width:120px;height:2px;background:var(--g3);outline:none;transform:rotate(-90deg);margin:50px 0;}
.v-slider::-webkit-slider-thumb{appearance:none;width:12px;height:24px;background:var(--g);border:1px solid #000;cursor:pointer;}

.cam-btn{width:48px;height:48px;border:1px solid var(--border);background:var(--panel);color:var(--g);
font-size:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.cam-btn:active{background:var(--g);color:#000;}
.cam-btn i{display:block;width:10px;height:10px;border-radius:50%;margin-bottom:4px;}
.rec-dot{background:var(--r);animation:blink 1s infinite;}

/* UI ELEMENTS */
.hc{position:absolute;width:40px;height:40px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 5px var(--g);}
.hc::before{width:1px;height:15px;}.hc::after{width:15px;height:1px;}
#hc-tl{top:15px;left:15px;}#hc-tl::before,#hc-tl::after{top:0;left:0;}
#hc-tr{top:15px;right:15px;}#hc-tr::before,#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:15px;left:15px;}#hc-bl::before,#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:15px;right:15px;}#hc-br::before,#hc-br::after{bottom:0;right:0;}

#xhair{position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:40px;height:40px;margin:-20px;}
#xhair::before{content:'';position:absolute;top:20px;left:0;width:40px;height:1px;background:rgba(0,255,65,.4);}
#xhair::after{content:'';position:absolute;left:20px;top:0;width:1px;height:40px;background:rgba(0,255,65,.4);}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:.2em;}
#badges{display:flex;gap:6px;}
.badge{font-size:8px;padding:3px 8px;border:1px solid var(--border);background:var(--panel);}

#statbar{position:absolute;bottom:0;left:0;right:0;z-index:15;display:flex;gap:1px;pointer-events:none;}
.sc{flex:1;padding:8px;background:var(--panel);border-top:1px solid var(--border);font-size:7px;text-align:center;}
.sc span{display:block;color:var(--g);font-size:11px;font-weight:bold;margin-top:2px;}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(2,8,4,.98);border-top:2px solid var(--g);
padding:16px;transform:translateY(100%);
transition:transform .28s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-close{position:absolute;top:10px;right:14px;background:none;border:1px solid var(--g2);color:var(--g2);font-size:9px;padding:4px 10px;cursor:pointer;}
#info-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;display:inline-block;cursor:pointer;}

#terminal{flex:0 0 auto;height:100px;background:var(--bg);border-top:1px solid var(--border);padding:8px 16px;overflow:hidden;z-index:20;}
#term-hdr{font-size:7px;color:var(--g3);margin-bottom:6px;display:flex;align-items:center;gap:10px;letter-spacing:2px;}
#term-hdr::before{content:'';flex:1;height:1px;background:var(--g3);}
#term-lines{font-size:9px;line-height:1.6;}

.tl{opacity:0;animation:si .18s forwards;}
.tok{color:var(--g);}.twarn{color:var(--o);}.talert{color:var(--r);}.tinfo{color:var(--b);}.ttap{color:var(--y);}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
@keyframes gpulse{0%,100%{text-shadow:0 0 20px var(--g);}50%{text-shadow:0 0 40px var(--g2);}}
@keyframes fi{to{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-5px);}to{opacity:.9;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 120px;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-sub">advanced vision systems</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">INITIALIZE</button>
</div>

<div id="app" style="display:none;">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="xhair"></div>

    <!-- SIDE CONTROLS -->
    <div class="side-ctrl" id="ctrl-left">
      <div style="font-size:8px;writing-mode:vertical-lr;">ZOOM</div>
      <input type="range" class="v-slider" id="zoom-range" min="1" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
    </div>
    
    <div class="side-ctrl" id="ctrl-right">
      <button class="cam-btn" onclick="capturePhoto()"><i></i>PHOTO</button>
      <button class="cam-btn" onclick="toggleRec()"><i class="rec-dot"></i>REC</button>
    </div>

    <div id="topbar">
      <div id="sys-id">myEYE OS</div>
      <div id="badges">
        <div class="badge" id="b-fps">-- FPS</div>
        <div class="badge" id="b-obj">0 OBJ</div>
        <div class="badge" style="color:var(--b); border-color:var(--b)">V-LINK</div>
      </div>
    </div>

    <div id="statbar">
      <div class="sc">MAX DIST<span id="s-dist">---</span></div>
      <div class="sc">THREATS<span id="s-thr">0</span></div>
      <div class="sc">SIGNAL<span id="s-conf">---%</span></div>
      <div class="sc">UPTIME<span id="s-uptime">00:00</span></div>
    </div>

    <div id="info-panel">
      <button id="info-close" onclick="closeInfo()">✕ CLOSE</button>
      <div id="info-title" onclick="renameObject()">---</div>
      <div id="info-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:10px;"></div>
      <div id="info-desc" style="margin-top:10px; font-size:9px; border-top:1px solid var(--border); padding-top:8px; color:var(--g2);"></div>
    </div>
  </div>

  <div id="terminal">
    <div id="term-hdr"><span>LIVE_NEURAL_DATA_STREAM</span></div>
    <div id="term-lines"></div>
  </div>
</div>

<script>
const DEFAULT_ALIASES = {
  person: 'СУБЪЕКТ', car: 'АВТОМОБИЛЬ', truck: 'ГРУЗОВИК', 
  dog: 'ПЕС', cat: 'КОТ', 'cell phone': 'ТЕРМИНАЛ', 
  bottle: 'ЕМКОСТЬ', tv: 'ЭКРАН', laptop: 'ЛЕПТОП'
};

let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');
const tracker = { tracks: {}, nid: 1 };
const CFG = { FOCAL: 950, CONF: 0.15, SMOOTH: 0.22, TTL: 30 };
const THREAT = new Set(['person','car','truck']);
const OBJ_H = { person: 1.75, car: 1.5, truck: 3.0, default: 1.0 };

let model, video, canvas, ctx, running = false, startTime = Date.now();
let lastPred = [], termQ = [], logThr = {}, selTid = null, isRecording = false;

async function bootSeq(){
  const logEl = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const steps = ["DRIVERS: OK", "CORE: MOUNTED", "NET: BYPASS", "LOAD: COCO-SSD"];
  for(let i=0; i<steps.length; i++){
    await new Promise(r=>setTimeout(r, 400));
    const d = document.createElement('div'); d.className='bl'; d.textContent='> '+steps[i];
    logEl.appendChild(d); pb.style.width = ((i+1)/4*100)+'%';
  }
  model = await cocoSsd.load({base:'lite_mobilenet_v2'});
  document.getElementById('btn-start').style.display='block';
}

async function initCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}});
    video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('boot').style.display='none';
      document.getElementById('app').style.display='flex';
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      running = true;
      log("SYSTEM ONLINE. DATA FEED ACTIVE", "ok");
      requestAnimationFrame(renderLoop);
    };
  } catch(e) { alert("Camera access required."); }
}

function applyZoom(val) {
  const track = video.srcObject.getVideoTracks()[0];
  const caps = track.getCapabilities();
  if(caps.zoom) {
    track.applyConstraints({advanced: [{zoom: val}]});
  }
  log(`ZOOM_LEVEL: ${val}x`, "info");
}

function capturePhoto() {
  log("SNAPSHOT_SAVED_TO_BUFFER", "info");
  canvas.style.filter = "brightness(3)";
  setTimeout(()=> canvas.style.filter="", 50);
}

function toggleRec() {
  isRecording = !isRecording;
  log(isRecording ? "RECORDING_STARTED" : "RECORDING_SAVED", isRecording?"alert":"ok");
}

function log(txt, type='ok'){
  termQ.push({txt, type});
  if(termQ.length > 5) termQ.shift();
  const termEl = document.getElementById('term-lines');
  termEl.innerHTML = termQ.map(q => `<div class="tl t${q.type}">> ${q.txt}</div>`).join('');
}

function drawASCII(x, y, w, h, col) {
  const chars = "$&#@!10".split("");
  ctx.font = "8px 'Share Tech Mono'";
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.25;
  for(let i=y+8; i<y+h; i+=10) {
    for(let j=x+4; j<x+w; j+=8) {
      if(Math.random()>0.4) ctx.fillText(chars[Math.floor(Math.random()*chars.length)], j, i);
    }
  }
  ctx.globalAlpha = 1;
}

async function renderLoop(){
  if(!running) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  const raw = await model.detect(video, 20, CFG.CONF);
  updateTracks(raw);
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  lastPred.forEach(p => {
    const [x,y,w,h] = p.sm;
    const col = THREAT.has(p.cls) ? '#ff2244' : '#00ff41';
    const dist = (CFG.FOCAL * (OBJ_H[p.cls]||OBJ_H.default) / Math.max(w,h)).toFixed(1);

    // ASCII Noise in box
    drawASCII(x,y,w,h, col);

    // Box
    ctx.strokeStyle = col;
    ctx.lineWidth = p.id === selTid ? 3 : 1;
    ctx.strokeRect(x,y,w,h);
    
    // UI Label
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(x, y-20, 70, 20);
    ctx.fillStyle = col;
    ctx.font = "10px 'Share Tech Mono'";
    ctx.fillText(`${(USER_MEM[p.cls] || p.cls).toUpperCase()} #${p.id}`, x+4, y-7);
    
    if(canLog(p.id)) log(`ID_${p.id}: ${p.cls.toUpperCase()} AT ${dist}m`, THREAT.has(p.cls)?"warn":"info");
  });

  updateHUD();
  requestAnimationFrame(renderLoop);
}

function updateTracks(raw){
  // Simple tracking logic
  for(let id in tracker.tracks) tracker.tracks[id].seen = false;
  raw.forEach(p => {
    let match = Object.values(tracker.tracks).find(t => t.cls === p.class && !t.seen);
    if(match){
      match.sm = match.sm.map((v,i)=> v+(p.bbox[i]-v)*CFG.SMOOTH);
      match.seen = true;
      match.age = 0;
    } else {
      const id = tracker.nid++;
      tracker.tracks[id] = {id, cls:p.class, sm:p.bbox, age:0, seen:true};
    }
  });
  for(let id in tracker.tracks) {
    if(!tracker.tracks[id].seen) tracker.tracks[id].age++;
    if(tracker.tracks[id].age > CFG.TTL) delete tracker.tracks[id];
  }
  lastPred = Object.values(tracker.tracks);
}

function updateHUD(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('s-uptime').textContent = `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
  document.getElementById('b-obj').textContent = lastPred.length + ' OBJ';
  document.getElementById('s-thr').textContent = lastPred.filter(p=>THREAT.has(p.cls)).length;
}

function canLog(id){
  if(!logThr[id] || Date.now()-logThr[id] > 10000){ logThr[id]=Date.now(); return true; }
  return false;
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (canvas.width/r.width);
  const y = (e.clientY - r.top) * (canvas.height/r.height);
  const hit = lastPred.find(p => x>p.sm[0] && x<p.sm[0]+p.sm[2] && y>p.sm[1] && y<p.sm[1]+p.sm[3]);
  if(hit){
    selTid = hit.id;
    document.getElementById('info-title').textContent = (USER_MEM[hit.cls] || hit.cls).toUpperCase();
    document.getElementById('info-grid').innerHTML = `<div>TRACK_ID</div><div>#${hit.id}</div><div>CLASS</div><div>${hit.cls}</div>`;
    document.getElementById('info-panel').classList.add('open');
  } else {
    selTid = null;
    document.getElementById('info-panel').classList.remove('open');
  }
});

function closeInfo() { document.getElementById('info-panel').classList.remove('open'); selTid = null; }

function renameObject() {
  const old = document.getElementById('info-title').textContent;
  const n = prompt("NEW ALIAS:", old);
  if(n) {
    const hit = lastPred.find(p=>p.id === selTid);
    if(hit) {
      USER_MEM[hit.cls] = n.toUpperCase();
      localStorage.setItem('myeye_mem', JSON.stringify(USER_MEM));
      location.reload();
    }
  }
}

bootSeq();
</script>
</body>
</html>
