<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro v16.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --b:#00aaff;--r:#ff3333;--y:#ffe600;
  --o:#ff9900;--p:#cc44ff;
  --panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.18);
  --card-h:210px;
  --term-h:150px; /* Фиксированная высота терминала */
  --audio-h:100px; /* Фиксированная высота звука */
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono','Courier New',monospace;
  color:var(--g);-webkit-tap-highlight-color:transparent;user-select:none;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;
display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
#boot-hex{position:absolute;inset:0;overflow:hidden;opacity:.05;pointer-events:none;}
#boot-hex svg{width:100%;height:100%;}
#boot-logo-wrap{position:relative;margin-bottom:10px;line-height:1;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(42px,12vw,82px);letter-spacing:.18em;white-space:nowrap;color:transparent;}
.bc{display:inline-block;opacity:0;color:var(--g);
text-shadow:0 0 24px rgba(0,255,65,.55),0 0 60px rgba(0,255,65,.18);
animation:charDrop .55s cubic-bezier(.22,1,.36,1) forwards;}
.bc:nth-child(1){animation-delay:.05s}.bc:nth-child(2){animation-delay:.18s}
.bc:nth-child(3){animation-delay:.31s}.bc:nth-child(4){animation-delay:.44s}
.bc:nth-child(5){animation-delay:.57s}
#boot-logo-g{position:absolute;inset:0;font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(42px,12vw,82px);letter-spacing:.18em;white-space:nowrap;
color:var(--g);opacity:0;pointer-events:none;animation:glitchLoop 5s 1.6s infinite;}
#boot-scan{position:absolute;left:0;right:0;height:2px;top:0;
background:linear-gradient(90deg,transparent,var(--g),transparent);
box-shadow:0 0 12px var(--g);animation:scanDown 3s ease-in-out infinite;}
#boot-sub{font-size:8px;letter-spacing:.45em;color:var(--g2);text-transform:uppercase;
margin:8px 0 22px;opacity:0;animation:fadeUp .5s .95s forwards;}
#boot-log{width:min(360px,88vw);font-size:8.5px;color:var(--g2);min-height:90px;line-height:2;}
#boot-log .bl{opacity:0;animation:fadeUp .18s forwards;padding-left:5px;border-left:2px solid var(--g3);margin-bottom:2px;}
#boot-log .bl.ok::before{content:'OK ';color:var(--g);}
#boot-log .bl.warn::before{content:'!! ';color:var(--o);}
#boot-log .bl.err::before{content:'XX ';color:var(--r);}
#pb-wrap{width:min(360px,88vw);margin-top:16px;}
#pb-track{height:2px;background:var(--g3);}
#pb{height:100%;width:0;background:linear-gradient(90deg,var(--g2),var(--g));
box-shadow:0 0 12px var(--g);transition:width .35s cubic-bezier(.22,1,.36,1);}
#pb-pct{font-size:7px;color:var(--g2);text-align:right;margin-top:3px;letter-spacing:.2em;}
#btn-start{margin-top:32px;display:none;background:none;border:1px solid var(--g);color:var(--g);
font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.35em;padding:13px 44px;
cursor:pointer;position:relative;overflow:hidden;transition:color .25s;}
#btn-start::before{content:'';position:absolute;inset:0;background:var(--g);
transform:scaleX(0);transform-origin:left;transition:transform .28s cubic-bezier(.22,1,.36,1);z-index:-1;}
#btn-start:hover::before,#btn-start:active::before{transform:scaleX(1);}
#btn-start:hover,#btn-start:active{color:#000;}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#vp{position:relative;flex:1 1 0;min-height:0;overflow:hidden;background:#000;}
video{display:none;}
#output_canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}
#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);
animation:scanroll 8s linear infinite;}
#vignette{position:absolute;inset:0;z-index:4;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 36%,rgba(0,0,0,.88) 100%);}
#grid-ov{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:.025;
background-image:linear-gradient(var(--g) 1px,transparent 1px),linear-gradient(90deg,var(--g) 1px,transparent 1px);
background-size:48px 48px;}

/* INFO CARD - Opens ABOVE audio */
#info-card{
  position: absolute;
  bottom: calc(var(--audio-h) + var(--term-h));
  left: 0; right: 0;
  height: var(--card-h);
  background: rgba(1,5,2,0.98);
  border-top: 1px solid rgba(0,255,65,0.45);
  z-index: 40;
  max-height: 0;
  transition: max-height 0.3s ease-out;
  overflow: hidden;
  pointer-events: none;
}
#info-card.open{max-height:var(--card-h); pointer-events: all; border-bottom: 1px solid var(--border);}

/* AUDIO STRIP - FIXED ABOVE TERMINAL */
#audio-strip {
  position: absolute;
  bottom: var(--term-h);
  left: 0; right: 0;
  height: var(--audio-h);
  background: rgba(0,2,0,0.98);
  border-top: 1px solid rgba(0,255,65,0.2);
  z-index: 30;
}
#audio-canvas{width: 100%; height: 100%; display: block;}
#audio-overlay{position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 8px 12px; pointer-events: none;}
.a-row{display: flex; justify-content: space-between; align-items: center;}
#audio-lbl{font-size: 8px; color: var(--g2); letter-spacing: 2px;}
#audio-db{font-size: 9px; color: var(--g); text-shadow: 0 0 5px var(--g);}

/* TERMINAL - FIXED AT BOTTOM */
#terminal-wrap {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: var(--term-h);
  background: rgba(0,0,0,0.96);
  border-top: 1px solid var(--g2);
  z-index: 35;
  display: flex; flex-direction: column;
}

/* Common UI Elements */
#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 100%);}
#sys-id{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:.2em;color:var(--g);}
#badges{display:flex;gap:5px;}
.badge{font-size:7.5px;padding:3px 8px;border:1px solid var(--border);background:var(--panel);color:var(--g2);display:flex;align-items:center;gap:4px;}
.bdot{width:4px;height:4px;border-radius:50%;background:var(--g);animation:dotBlink 1.5s infinite;}

/* Inner content styles */
#ic-body{padding:15px; height:100%;}
#ic-name{font-family:'Orbitron',sans-serif; font-size:18px; color:var(--g); margin-bottom:10px;}
#ic-grid{display:grid; grid-template-columns: 80px 1fr 80px 1fr; gap:5px; font-size:9px;}
.ick{color:rgba(0,255,65,0.4);}
#term-body{flex:1; overflow-y:auto; font-size:9px; padding:5px 12px; line-height:1.4;}
.trow{display:grid; grid-template-columns: 60px 80px 1fr 60px; gap:10px; border-bottom:1px solid rgba(0,255,65,0.05); padding:2px 0;}

@keyframes charDrop{0%{opacity:0;transform:translateY(-18px)}100%{opacity:1;transform:none}}
@keyframes scanDown{0%{top:0;opacity:0}50%{opacity:1}100%{top:100%;opacity:0}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes scanroll{from{background-position:0 0}to{background-position:0 80px}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex"><svg viewBox="0 0 800 600"><defs><pattern id="hxp" width="56" height="48" patternUnits="userSpaceOnUse"><polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/></pattern></defs><rect width="100%" height="100%" fill="url(#hxp)"/></svg></div>
  <div id="boot-logo-wrap"><div id="boot-logo"><span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span></div><div id="boot-logo-g">myEYE</div><div id="boot-scan"></div></div>
  <div id="boot-sub">Neural HUD v16.0 Pro</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div><div id="pb-pct">0%</div></div>
  <button id="btn-start" onclick="startApp()">INITIALIZE</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="grid-ov"></div>
    <div id="vignette"></div>
    <div id="topbar">
      <div id="sys-id">myEYE <small>// PRO</small></div>
      <div id="badges">
        <div class="badge"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge"><span class="bdot"></span><span id="obj-txt">SCAN</span></div>
        <div class="badge" id="b-mic"><span class="bdot"></span>AUDIO</div>
      </div>
    </div>
  </div>

  <div id="info-card">
    <div id="ic-body">
      <div id="ic-name">OBJECT_IDENTIFIED</div>
      <div id="ic-grid">
        <div class="ick">TYPE:</div><div id="res-type">---</div>
        <div class="ick">PROB:</div><div id="res-prob">0%</div>
        <div class="ick">THREAT:</div><div id="res-threat">LOW</div>
        <div class="ick">DIST:</div><div id="res-dist">CALC...</div>
      </div>
      <div style="margin-top:15px; font-size:8px; color:rgba(0,255,65,0.5);" id="ic-desc">Scanning biological and mechanical signatures...</div>
      <button onclick="closeCard()" style="margin-top:15px; background:none; border:1px solid var(--g); color:var(--g); padding:5px 10px; font-family:inherit; cursor:pointer;">CLOSE_DATA</button>
    </div>
  </div>

  <div id="audio-strip">
    <canvas id="audio-canvas"></canvas>
    <div id="audio-overlay">
      <div class="a-row">
        <span id="audio-lbl">ACOUSTIC_SPECTRUM</span>
        <span id="audio-db">-60.0 dB</span>
      </div>
      <div class="a-row" style="justify-content: center;">
        <span id="speech-node" style="font-size:7px; opacity:0.3;">[ NO_SPEECH_DETECTED ]</span>
      </div>
    </div>
  </div>

  <div id="terminal-wrap">
    <div style="padding:5px 12px; border-bottom:1px solid rgba(0,255,65,0.2); font-size:8px; display:flex; justify-content:space-between;">
      <span>TERMINAL_FEED v16.0</span>
      <span id="clock">00:00:00</span>
    </div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const termBody = document.getElementById('term-body');
const audioCanv = document.getElementById('audio-canvas');
const actx = audioCanv.getContext('2d');

let detector, analyser, audioCtx, freqData, timeData;
let lastObjects = [], fps = 0, lastTime = 0;

// Log function
function sysLog(msg, type="INFO") {
  const row = document.createElement('div');
  row.className = 'trow';
  const now = new Date();
  const timeStr = now.toTimeString().slice(0,8);
  row.innerHTML = `<span>${timeStr}</span><span style="color:var(--g2)">[${type}]</span><span>${msg}</span><span>SYS_OK</span>`;
  termBody.prepend(row);
  if(termBody.children.length > 50) termBody.lastChild.remove();
}

async function initModels() {
  const log = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const update = (txt, p) => {
    const d = document.createElement('div'); d.className='bl ok'; d.textContent=txt; log.appendChild(d);
    pb.style.width = p+'%'; document.getElementById('pb-pct').textContent = p+'%';
  };

  update("LOADING TENSORFLOW_KERNEL", 20);
  detector = await cocoSsd.load();
  update("COCO-SSD_ENGINE READY", 50);
  update("AUDIO_ANALYSER INITIALIZING", 80);
  update("SYSTEMS_READY", 100);
  document.getElementById('btn-start').style.display = 'block';
}

async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    renderAudio();
    sysLog("AUDIO_STREAM_CONNECTED", "AUDIO");
  } catch(e) {
    sysLog("MIC_ACCESS_DENIED", "WARN");
  }
}

function renderAudio() {
  requestAnimationFrame(renderAudio);
  if(!analyser) return;
  
  const W = audioCanv.width = audioCanv.offsetWidth;
  const H = audioCanv.height = audioCanv.offsetHeight;
  
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  
  actx.clearRect(0,0,W,H);
  
  // Draw Grid
  actx.strokeStyle = 'rgba(0,255,65,0.05)';
  for(let i=0; i<W; i+=20) { actx.beginPath(); actx.moveTo(i,0); actx.lineTo(i,H); actx.stroke(); }
  for(let i=0; i<H; i+=20) { actx.beginPath(); actx.moveTo(0,i); actx.lineTo(W,i); actx.stroke(); }

  // Draw Spectrum Bars
  const barWidth = W / freqData.length;
  for(let i=0; i<freqData.length; i++) {
    const h = (freqData[i]/255) * H;
    actx.fillStyle = `rgba(0, 255, 65, ${0.1 + (h/H)})`;
    actx.fillRect(i * barWidth, H - h, barWidth - 1, h);
  }

  // Calculate dB
  let sum = 0;
  for(let i=0; i<timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / timeData.length);
  const db = rms > 0 ? 20 * Math.log10(rms) : -60;
  document.getElementById('audio-db').textContent = db.toFixed(1) + " dB";
  
  const sn = document.getElementById('speech-node');
  if(db > -30) {
    sn.style.opacity = 1; sn.textContent = "[ SPEECH_DETECTED ]"; sn.style.color = "var(--g)";
  } else {
    sn.style.opacity = 0.3; sn.textContent = "[ NO_SPEECH_DETECTED ]"; sn.style.color = "var(--g2)";
  }
}

async function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
  video.srcObject = stream;
  video.play();
  
  initAudio();
  sysLog("CAMERA_ENVIRONMENT_ONLINE", "SYS");
  requestAnimationFrame(predict);
  
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
  }, 1000);
}

async function predict() {
  const now = performance.now();
  fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  document.getElementById('fps-txt').textContent = fps + " FPS";

  if (video.readyState === 4) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    lastObjects = await detector.detect(video);
    document.getElementById('obj-txt').textContent = lastObjects.length + " OBJ";
    
    lastObjects.forEach(obj => {
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 2;
      const [x, y, w, h] = obj.bbox;
      ctx.strokeRect(x, y, w, h);
      
      ctx.fillStyle = '#00ff41';
      ctx.font = '10px Share Tech Mono';
      ctx.fillText(`${obj.class.toUpperCase()} ${Math.round(obj.score*100)}%`, x, y > 10 ? y - 5 : 10);
    });
  }
  requestAnimationFrame(predict);
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  
  const hit = lastObjects.find(o => {
    const [bx, by, bw, bh] = o.bbox;
    return x >= bx && x <= bx + bw && y >= by && y <= by + bh;
  });
  
  if(hit) openCard(hit);
  else closeCard();
});

function openCard(obj) {
  document.getElementById('ic-name').textContent = obj.class.toUpperCase();
  document.getElementById('res-type').textContent = "BIOLOGICAL";
  document.getElementById('res-prob').textContent = Math.round(obj.score*100) + "%";
  document.getElementById('res-threat').textContent = obj.class === 'person' ? "HIGH" : "LOW";
  document.getElementById('res-dist').textContent = (Math.random() * 10 + 2).toFixed(1) + "m";
  document.getElementById('info-card').classList.add('open');
  sysLog(`TARGET_LOCK: ${obj.class.toUpperCase()}`, "DETECT");
}

function closeCard() {
  document.getElementById('info-card').classList.remove('open');
}

initModels();
</script>
</body>
</html>
