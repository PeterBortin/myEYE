<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
:root{ --g:#00ff41; --panel:rgba(2,8,4,.8); --blue:#00aaff; }
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--g);}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:42px;color:var(--g);text-shadow:0 0 15px var(--g);letter-spacing:5px;}
#pb-wrap{width:100%;max-width:300px;height:2px;background:#111;margin-top:20px;position:relative;}
#pb{height:100%;width:0;background:var(--g);transition:width .3s;}
#btn-start{margin-top:40px;display:none;background:none;border:1px solid var(--g);color:var(--g);padding:15px 50px;cursor:pointer;font-family:'Orbitron';text-transform:uppercase;}

#app{position:fixed;inset:0;display:none;flex-direction:column;background:#000;}
#vp{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#000;}
video{position:absolute;width:1px;height:1px;opacity:0;}
canvas{width:100%;height:100%;object-fit:cover;z-index:2;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:grid;grid-template-columns: 1fr auto; padding:15px;pointer-events:none;}
.badge{font-size:10px;padding:4px 8px;border:1px solid rgba(0,255,65,.3);background:var(--panel);margin-left:5px;}

#terminal{height:120px;background:rgba(0,0,0,0.9);border-top:1px solid rgba(0,255,65,0.3);padding:10px;font-size:10px;overflow:hidden;display:flex;flex-direction:column-reverse;z-index:20;}
.tl{color:var(--g);margin-bottom:3px;}
.tl span {color: #888; margin-right: 8px;}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log" style="font-size:10px; margin-top:10px;">SYSTEM CALIBRATING...</div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="startApp()">INITIALIZE SYSTEM</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="topbar">
      <div style="font-family:'Orbitron'; font-weight:700; font-size: 11px;">myEYE HUD v3.0</div>
      <div>
        <span class="badge" id="b-fps">0 FPS</span>
        <span class="badge" id="b-obj">0 TARGETS</span>
      </div>
    </div>
  </div>
  <div id="terminal"></div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const term = document.getElementById('terminal');

let objectDetector, lastFps = 0, frameCount = 0;
let currentPersonBox = null;

function log(msg) {
  const line = document.createElement('div');
  line.className = 'tl';
  const ts = new Date().toLocaleTimeString();
  line.innerHTML = `<span>[${ts}]</span> > ${msg}`;
  term.prepend(line);
  if (term.childNodes.length > 10) term.lastChild.remove();
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

pose.onResults((results) => {
  if (!results.poseLandmarks || !currentPersonBox) return;
  const { x, y, w, h } = currentPersonBox;
  
  const adjLandmarks = results.poseLandmarks.map(lp => ({
    x: (lp.x * w + x) / canvasElement.width,
    y: (lp.y * h + y) / canvasElement.height,
    visibility: lp.visibility
  }));

  drawConnectors(canvasCtx, adjLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 2});
  drawLandmarks(canvasCtx, adjLandmarks, {color: '#00ff41', fillColor: '#00ff41', lineWidth: 1, radius: 2});
});

async function initModels() {
  try {
    objectDetector = await cocoSsd.load();
    document.getElementById('pb').style.width = '50%';
    await pose.initialize();
    document.getElementById('pb').style.width = '100%';
    document.getElementById('boot-log').innerText = "SYSTEM READY";
    document.getElementById('btn-start').style.display = 'block';
  } catch (e) {
    document.getElementById('boot-log').innerText = "INIT ERROR: " + e.message;
  }
}

async function processFrame() {
  if (videoElement.readyState < 2) return;

  canvasElement.width = videoElement.videoWidth;
  canvasElement.height = videoElement.videoHeight;
  
  // 1. Рисуем видео
  canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

  // 2. Сетка
  canvasCtx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
  canvasCtx.beginPath();
  for(let i=50; i<canvasElement.width; i+=50) { canvasCtx.moveTo(i,0); canvasCtx.lineTo(i,canvasElement.height); }
  for(let i=50; i<canvasElement.height; i+=50) { canvasCtx.moveTo(0,i); canvasCtx.lineTo(canvasElement.width,i); }
  canvasCtx.stroke();

  // 3. Объекты
  const detections = await objectDetector.detect(videoElement, 10, 0.4);
  document.getElementById('b-obj').innerText = detections.length + " TARGETS";

  for (const o of detections) {
    const [bx, by, bw, bh] = o.bbox;
    canvasCtx.strokeStyle = o.class === 'person' ? '#00ff41' : '#00aaff';
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeRect(bx, by, bw, bh);
    
    canvasCtx.fillStyle = canvasCtx.strokeStyle;
    canvasCtx.fillText(o.class.toUpperCase(), bx, by - 5);

    if(o.class === 'person') {
      currentPersonBox = { x: bx, y: by, w: bw, h: bh };
      const crop = document.createElement('canvas');
      crop.width = bw; crop.height = bh;
      crop.getContext('2d').drawImage(videoElement, bx, by, bw, bh, 0, 0, bw, bh);
      await pose.send({image: crop});
    }
  }

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFps > 1000) {
    document.getElementById('b-fps').innerText = frameCount + " FPS";
    frameCount = 0; lastFps = now;
  }
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await processFrame();
    },
    width: 1280,
    height: 720
  });
  
  camera.start().then(() => log("CAMERA_ACTIVE"));
}

initModels();
</script>
</body>
</html>
