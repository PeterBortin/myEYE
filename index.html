<style>
:root {
  --g:#00ff41; --g2:#00cc33; --g3:#003a12; --gd:#001a08;
  --y:#ffff00; --o:#ff9900; --r:#ff2244; --b:#00aaff;
  --bg:#020804; --panel:rgba(2,8,4,.95); --border:rgba(0,255,65,.18);
  --font-mono:'Share Tech Mono',monospace;
  --font-hud:'Orbitron',sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family:var(--font-mono); color:var(--g);
  user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ═══════════════════════════════ BOOT ═══════════════════════════════ */
#boot {
position:fixed; inset:0; background:#000; z-index:300;
display:flex; flex-direction:column; justify-content:center; align-items:center;
}
#boot-logo {
font-family:var(–font-hud); font-weight:900;
font-size:clamp(32px,9vw,58px); letter-spacing:.2em; color:var(–g);
text-shadow:0 0 30px var(–g),0 0 70px #004400;
animation:pulse-glow 2.5s ease-in-out infinite;
}
#boot-sub { font-size:9px; letter-spacing:.45em; color:var(–g2); margin:5px 0 30px; }
#boot-log {
width:min(380px,88vw); font-size:9.5px; color:var(–g2);
min-height:120px; line-height:2;
}
#boot-log .bl { opacity:0; animation:fade-in .2s forwards; }
#pb-wrap { width:min(380px,88vw); height:2px; background:#0a1a0a; margin-top:16px; }
#pb { height:100%; width:0; background:var(–g); box-shadow:0 0 8px var(–g); transition:width .35s ease; }
#btn-start {
margin-top:26px; display:none; background:none;
border:1px solid var(–g); color:var(–g);
font-family:var(–font-hud); font-size:11px;
letter-spacing:.3em; padding:13px 44px; cursor:pointer;
transition:all .2s; position:relative; overflow:hidden;
}
#btn-start::after {
content:’’; position:absolute; inset:0;
background:var(–g); transform:scaleX(0); transform-origin:left;
transition:transform .2s; z-index:-1;
}
#btn-start:hover::after, #btn-start:active::after { transform:scaleX(1); }
#btn-start:hover, #btn-start:active { color:#000; }

/* ═══════════════════════════════ LAYOUT ═══════════════════════════════ */
#app { position:fixed; inset:0; display:flex; flex-direction:column; }
#vp { position:relative; flex:1 1 auto; overflow:hidden; background:#000; }
video {
position:absolute; inset:0; width:100%; height:100%;
object-fit:cover; z-index:1;
filter:brightness(.55) contrast(1.38) saturate(.88);
transition:filter .5s;
}
video.night { filter:brightness(.35) contrast(2.4) saturate(0) sepia(1) hue-rotate(75deg); }
canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; }

/* CRT scanline overlay */
#vp::after {
content:’’; position:absolute; inset:0; z-index:5; pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,.013) 3px,rgba(0,255,65,.013) 4px);
animation:scanroll 12s linear infinite;
}
/* vignette */
#vp::before {
content:’’; position:absolute; inset:0; z-index:6; pointer-events:none;
background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
}

/* ═══════════════════════════════ HUD CORNERS ═══════════════════════════════ */
.hc { position:absolute; width:54px; height:54px; z-index:10; pointer-events:none; }
.hc::before, .hc::after { content:’’; position:absolute; background:var(–g); box-shadow:0 0 6px var(–g); }
.hc::before { width:2px; height:22px; }
.hc::after  { width:22px; height:2px; }
#hc-tl { top:0; left:0; } #hc-tl::before { top:0; left:0; } #hc-tl::after { top:0; left:0; }
#hc-tr { top:0; right:0; } #hc-tr::before { top:0; right:0; } #hc-tr::after { top:0; right:0; }
#hc-bl { bottom:0; left:0; } #hc-bl::before { bottom:0; left:0; } #hc-bl::after { bottom:0; left:0; }
#hc-br { bottom:0; right:0; } #hc-br::before { bottom:0; right:0; } #hc-br::after { bottom:0; right:0; }

/* ═══════════════════════════════ CROSSHAIR ═══════════════════════════════ */
#xhair {
position:absolute; top:50%; left:50%; z-index:8; pointer-events:none;
width:30px; height:30px; margin:-15px;
}
#xhair::before {
content:’’; position:absolute; top:14px; left:0;
width:30px; height:2px; background:rgba(0,255,65,.35);
box-shadow:0 0 4px rgba(0,255,65,.2);
}
#xhair::after {
content:’’; position:absolute; left:14px; top:0;
width:2px; height:30px; background:rgba(0,255,65,.35);
box-shadow:0 0 4px rgba(0,255,65,.2);
}
#xhair-ring {
position:absolute; top:50%; left:50%; z-index:8; pointer-events:none;
width:22px; height:22px; margin:-11px;
border:1px solid rgba(0,255,65,.25); border-radius:50%;
animation:ring-pulse 4s ease-out infinite;
}

/* ═══════════════════════════════ TOPBAR ═══════════════════════════════ */
#topbar {
position:absolute; top:0; left:0; right:0; z-index:15;
display:flex; align-items:center; justify-content:space-between;
padding:10px 14px; pointer-events:none;
background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,transparent 100%);
}
#sys-id {
font-family:var(–font-hud); font-size:13px; font-weight:700;
letter-spacing:.22em; color:var(–g); text-shadow:0 0 14px var(–g);
pointer-events:all;
}
#badges { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.badge {
font-size:8px; letter-spacing:.1em; padding:3px 8px;
border:1px solid var(–border); background:var(–panel); color:var(–g2);
transition:all .3s;
}
.badge.active { border-color:var(–g); color:var(–g); }
.badge.alert  { border-color:var(–r); color:var(–r); animation:blink .7s ease-in-out infinite; }
.badge.warn   { border-color:var(–o); color:var(–o); }

/* ═══════════════════════════════ CONTROLS ═══════════════════════════════ */
#controls {
position:absolute; top:48px; right:14px; z-index:20;
display:flex; flex-direction:column; gap:4px; pointer-events:all;
}
.ctrl-btn {
background:var(–panel); border:1px solid var(–border);
color:var(–g2); font-family:var(–font-mono);
font-size:8px; padding:6px 10px; cursor:pointer;
letter-spacing:.1em; text-align:center;
transition:all .2s; white-space:nowrap;
-webkit-tap-highlight-color:transparent;
}
.ctrl-btn:hover, .ctrl-btn:active { border-color:var(–g); color:var(–g); background:rgba(0,255,65,.08); }
.ctrl-btn.toggled { border-color:var(–b); color:var(–b); background:rgba(0,170,255,.08); }

/* ═══════════════════════════════ STATBAR ═══════════════════════════════ */
#statbar {
position:absolute; bottom:0; left:0; right:0; z-index:15;
display:flex; gap:1px; pointer-events:none;
background:linear-gradient(to top,rgba(0,0,0,.4) 0%,transparent 100%);
}
.sc {
flex:1; padding:5px 4px;
background:var(–panel); border-top:1px solid var(–border);
font-size:7px; letter-spacing:.06em; color:var(–g2); text-align:center;
}
.sc span { display:block; color:var(–g); font-size:10px; font-weight:bold; margin-top:1px; }

/* ═══════════════════════════════ INFO PANEL ═══════════════════════════════ */
#info-panel {
position:absolute; bottom:0; left:0; right:0; z-index:25;
background:rgba(1,6,3,.97); border-top:2px solid var(–g);
padding:12px 16px 14px;
transform:translateY(100%);
transition:transform .3s cubic-bezier(.22,1,.36,1);
pointer-events:none;
max-height:50%;
overflow-y:auto;
}
#info-panel.open { transform:translateY(0); pointer-events:all; }
#info-close {
position:absolute; top:10px; right:14px;
background:none; border:1px solid var(–g2);
color:var(–g2); font-family:var(–font-mono);
font-size:9px; padding:3px 10px; cursor:pointer; letter-spacing:.1em;
}
#info-close:hover { border-color:var(–r); color:var(–r); }
#info-title {
font-family:var(–font-hud); font-size:13px; font-weight:700;
letter-spacing:.2em; color:var(–g); margin-bottom:8px;
display:inline-block; cursor:pointer;
border-bottom:1px dashed transparent; transition:.2s;
}
#info-title:hover { border-bottom-color:currentColor; text-shadow:0 0 10px currentColor; }
#info-grid {
display:grid; grid-template-columns:1fr 1fr;
gap:3px 14px; font-size:9px; margin-bottom:8px;
}
.ik { color:var(–g2); }
.iv { color:var(–g); }
.iv.plate {
color:var(–y); font-size:11px; letter-spacing:.2em; font-weight:bold;
animation:plate-anim 1s steps(1) infinite;
}
#info-desc {
font-size:9px; color:var(–g2); line-height:1.65;
border-top:1px solid var(–border); padding-top:6px;
}

/* ═══════════════════════════════ TERMINAL ═══════════════════════════════ */
#terminal {
flex:0 0 auto; height:106px; background:var(–bg);
border-top:1px solid var(–border);
padding:7px 14px; overflow:hidden; z-index:20;
}
#term-hdr {
font-family:var(–font-hud); font-size:7px; letter-spacing:.28em;
color:var(–g3); margin-bottom:5px;
display:flex; align-items:center; gap:8px;
}
#term-hdr::before { content:’’; flex:1; height:1px; background:var(–g3); }
#term-lines { font-size:9px; line-height:1.75; }
.tl { opacity:0; animation:slide-in .18s forwards; }
.tok   { color:var(–g);  }
.twarn { color:var(–o);  }
.talert{ color:var(–r);  }
.tinfo { color:var(–b);  }
.ttap  { color:var(–y);  }

/* ═══════════════════════════════ KEYFRAMES ═══════════════════════════════ */
@keyframes pulse-glow {
0%,100% { text-shadow:0 0 20px var(–g),0 0 40px #003300; }
50%      { text-shadow:0 0 50px var(–g),0 0 100px #00aa44; }
}
@keyframes fade-in   { to { opacity:1; } }
@keyframes slide-in  { from { opacity:0; transform:translateX(-6px); } to { opacity:.93; transform:none; } }
@keyframes scanroll  { from { background-position:0 0; } to { background-position:0 120px; } }
@keyframes ring-pulse {
0%   { box-shadow:0 0 0 0 rgba(0,255,65,.45); transform:scale(1); }
70%  { box-shadow:0 0 0 60px rgba(0,255,65,0); transform:scale(1.05); }
100% { box-shadow:0 0 0 0 rgba(0,255,65,0);  transform:scale(1); }
}
@keyframes blink {
0%,100% { opacity:1; } 50% { opacity:.4; }
}
@keyframes plate-anim {
0%,90% { opacity:1; } 95% { opacity:.5; } 100% { opacity:1; }
}
@keyframes corner-scan {
0%,100% { opacity:1; filter:brightness(1); }
50%      { opacity:.6; filter:brightness(1.5); }
}
@keyframes box-appear {
from { opacity:0; transform:scale(.92); }
to   { opacity:1; transform:scale(1); }
}
</style>

</head>

<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════════ */
const CFG = {
  FOCAL: 950,
  CONF:  0.12,
  MAX_DET: 60,
  SMOOTH: 0.22,
  TTL: 40,
  IOU: 0.20,
};

/* ══════════════════════════════════════════════════════════════
   ALIASES & KNOWLEDGE BASE
══════════════════════════════════════════════════════════════ */
const DEFAULT_ALIASES = {
  person:'СУБЪЕКТ', car:'АВТОМОБИЛЬ', truck:'ГРУЗОВИК', bus:'АВТОБУС',
  motorcycle:'МОТОЦИКЛ', bicycle:'ВЕЛОСИПЕД', 'fire hydrant':'ГИДРАНТ',
  'stop sign':'СТОП-ЗНАК', 'traffic light':'СВЕТОФОР',
  dog:'ПЁС', cat:'КОТ', bird:'ПТИЦА', horse:'ЛОШАДЬ',
  cow:'КРС', sheep:'ОВЦА', bear:'МЕДВЕДЬ',
  'cell phone':'ТЕРМИНАЛ', bottle:'ЁМКОСТЬ', backpack:'РЮКЗАК',
  chair:'КРЕСЛО', tv:'МОНИТОР', laptop:'ЛЕПТОП',
  mouse:'МАНИПУЛЯТОР', keyboard:'КЛАВИАТУРА',
  bench:'СКАМЬЯ', 'potted plant':'РАСТЕНИЕ',
  umbrella:'ЗОНТ', handbag:'СУМКА', suitcase:'ЧЕМОДАН',
  'sports ball':'МЯЧ', skis:'ЛЫЖИ',
  knife:'НЕЙТРАЛИЗАТОР', scissors:'НОЖНИЦЫ',
  cup:'КОНТЕЙНЕР', bowl:'МИСКА', fork:'ВИЛКА', spoon:'ЛОЖКА',
  'dining table':'СТОЛ', bed:'КРОВАТЬ', 'toilet':'ТУАЛЕТ',
  refrigerator:'ХОЛОДИЛЬНИК', oven:'ПЕЧЬ', sink:'РАКОВИНА',
  clock:'ЧАСЫ', vase:'ВАЗОН', book:'ДОКУМЕНТ',
  remote:'ПУЛЬТ', microwave:'МИКРОВОЛНА',
  toothbrush:'ЩЁТКА', 'hair drier':'ФЕН',
  airplane:'ВС', boat:'СУДНО', train:'ЛОКОМОТИВ',
  'parking meter':'ПАРКОМАТ', 'baseball bat':'ДУБИНА',
  'baseball glove':'ПЕРЧАТКА', skateboard:'СКЕЙТ',
  surfboard:'ДОСКА', 'tennis racket':'РАКЕТКА',
  'wine glass':'БОКАЛ', banana:'БАНАН', apple:'ЯБЛОКО',
  sandwich:'СЭНДВИЧ', orange:'АПЕЛЬСИН', pizza:'ПИЦЦА',
  donut:'ПОНЧИК', cake:'ТОРТ', 'hot dog':'ХОТДОГ',
  carrot:'МОРКОВЬ', broccoli:'БРОККОЛИ',
  'potted plant':'РАСТЕНИЕ', 'teddy bear':'МЕДВЕЖОНОК',
};
const USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');

function getAlias(cls) {
  return USER_MEM[cls] || DEFAULT_ALIASES[cls] || cls.toUpperCase();
}

const OBJ_H = {
  person:1.75, car:1.55, truck:2.9, bus:3.3, motorcycle:1.15,
  bicycle:1.05, 'fire hydrant':.65, 'stop sign':.8, 'traffic light':.45,
  dog:.5, cat:.3, horse:1.6, cow:1.4, sheep:.9, bear:1.3,
  'cell phone':.15, bottle:.28, backpack:.55, chair:.9, tv:.6,
  laptop:.35, airplane:4.5, boat:2.8, train:3.5, default:1.0
};

const THREAT = new Set(['person','car','truck','bus','motorcycle','knife','baseball bat']);

const COLORS = {
  person:'#ffff00', car:'#ff2244', truck:'#ff3355', bus:'#ff4466',
  motorcycle:'#ff6600', bicycle:'#ffaa00',
  knife:'#ff0000', 'baseball bat':'#ff0000',
  'cell phone':'#88aaff', laptop:'#aabbff',
  bottle:'#88ff88', backpack:'#00ffff',
  _d:'#00ff41'
};

const DESC = {
  person:'Биологический объект. Классификация: ЖИВОЙ. Оценка траектории активна.',
  car:'Транспортное средство. Классификация: Гражданское. Анализ угрозы: НИЗКАЯ.',
  truck:'Тяжёлая техника. Зона повышенной опасности. Дистанция критична.',
  bus:'Транспорт повышенной вместимости. Мониторинг пассажиропотока.',
  motorcycle:'Двухколёсное ТС. Высокая манёвренность. Угроза: СРЕДНЯЯ.',
  bicycle:'Немоторизованный объект. Скорость: НИЗ.',
  knife:'⚠ ОПАСНЫЙ ПРЕДМЕТ. Статус: УГРОЗА. Активировать протокол безопасности.',
  'cell phone':'Мобильное устройство связи. Анализ: АКТИВНЫЙ.',
  backpack:'Внешний модуль хранения. Содержимое: НЕИЗВЕСТНО.',
  laptop:'Вычислительная система. Сетевой статус: НЕ ОПРЕДЕЛЁН.',
  dog:'Биологический объект класса: ЖИВОТНОЕ. Угроза: ПОТЕНЦИАЛЬНАЯ.',
  cat:'Биологический объект класса: ЖИВОТНОЕ. Статус: НЕЙТРАЛЬНЫЙ.',
  airplane:'Воздушное судно. Классификация: ГРАЖДАНСКОЕ. Мониторинг активен.',
  _d:'Объект идентифицирован. Данные загружены в кэш.'
};

function getColor(cls) { return COLORS[cls] || COLORS._d; }
function getDesc(cls)  { return DESC[cls] || DESC._d; }

/* ══════════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════════ */
function hexToRGBA(hex, a) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function estimateDist(bbox, cls) {
  const rh = OBJ_H[cls] || OBJ_H.default;
  const px = Math.max(bbox[2], bbox[3]);
  if (px < 2) return 999;
  return Math.min(999, parseFloat((CFG.FOCAL * rh / px).toFixed(1)));
}

function iou(a, b) {
  const ix = Math.max(a[0], b[0]), iy = Math.max(a[1], b[1]);
  const iw = Math.min(a[0]+a[2], b[0]+b[2]) - ix;
  const ih = Math.min(a[1]+a[3], b[1]+b[3]) - iy;
  if (iw <= 0 || ih <= 0) return 0;
  return (iw * ih) / (a[2]*a[3] + b[2]*b[3] - iw*ih);
}

/* ══════════════════════════════════════════════════════════════
   TRACKER
══════════════════════════════════════════════════════════════ */
class Tracker {
  constructor() { this.tracks = {}; this.nextId = 1; }

  update(preds) {
    // Age all tracks
    for (const id in this.tracks) {
      this.tracks[id].age++;
      if (this.tracks[id].age > CFG.TTL) delete this.tracks[id];
    }

    // Match predictions to tracks
    for (const p of preds) {
      let best = null, bestScore = CFG.IOU;
      for (const id in this.tracks) {
        const t = this.tracks[id];
        if (t.cls !== p.class) continue;
        const s = iou(t.smooth, p.bbox);
        if (s > bestScore) { bestScore = s; best = t; }
      }
      if (best) {
        best.smooth = best.smooth.map((v,i) => v + (p.bbox[i] - v) * CFG.SMOOTH);
        best.score  = best.score + (p.score - best.score) * CFG.SMOOTH;
        best.age    = 0;
        p._tid      = best.id;
      } else {
        const id = this.nextId++;
        this.tracks[id] = {
          id, cls:p.class, smooth:[...p.bbox],
          score:p.score, age:0, born:Date.now(), plate: null
        };
        p._tid = id;
      }
    }

    // Return visible tracks
    return Object.values(this.tracks).filter(t => t.age < 3);
  }
}

/* ══════════════════════════════════════════════════════════════
   PLATE RECOGNITION (OCR via Tesseract.js CDN)
══════════════════════════════════════════════════════════════ */
let tesseractWorker = null;
let plateEnabled    = false;
let plateQueue      = false; // throttle

async function loadTesseract() {
  return new Promise((res, rej) => {
    if (window.Tesseract) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function ensureTesseract() {
  if (tesseractWorker) return true;
  try {
    log('ЗАГРУЗКА OCR МОДУЛЯ...', 'info');
    await loadTesseract();
    tesseractWorker = await Tesseract.createWorker('eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/worker.min.js',
      corePath:   'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.0/tesseract-core-simd-lstm.wasm.js',
    });
    await tesseractWorker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ',
      tessedit_pageseg_mode:   '7',
    });
    log('OCR МОДУЛЬ: ГОТОВ', 'ok');
    return true;
  } catch (e) {
    log('OCR ОШИБКА: ' + e.message, 'alert');
    tesseractWorker = null;
    return false;
  }
}

async function recognizePlate(track) {
  if (!plateEnabled || plateQueue || !tesseractWorker) return;
  const vehicleClasses = new Set(['car','truck','bus','motorcycle']);
  if (!vehicleClasses.has(track.cls)) return;
  if (track.plate !== null) return; // already has result

  const [x, y, w, h] = track.smooth;
  if (w < 40 || h < 30) return;

  // Crop bottom-third (plate area)
  const pX = Math.max(0, x + w * 0.1);
  const pW = w * 0.8;
  const pY = Math.max(0, y + h * 0.65);
  const pH = h * 0.3;

  const offscreen = document.createElement('canvas');
  offscreen.width  = Math.round(pW * 2);
  offscreen.height = Math.round(pH * 2);
  const oc = offscreen.getContext('2d');
  oc.imageSmoothingEnabled = true;
  oc.imageSmoothingQuality = 'high';
  oc.filter = 'contrast(2.5) brightness(1.3) grayscale(1)';
  oc.drawImage(video, pX, pY, pW, pH, 0, 0, offscreen.width, offscreen.height);

  plateQueue = true;
  try {
    const { data: { text, confidence } } = await tesseractWorker.recognize(offscreen);
    const clean = text.replace(/[^A-Z0-9А-Я]/g, '').trim();
    if (clean.length >= 4 && confidence > 30) {
      track.plate = clean;
      log(`НОМЕР РАСПОЗНАН: ${clean} (${Math.round(confidence)}%)`, 'warn');
    } else {
      track.plate = '';
    }
  } catch (_) {
    track.plate = '';
  }
  plateQueue = false;
}

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let model     = null;
let running   = false;
let lastPred  = [];
let fpsCnt    = 0;
let lastFpsT  = 0;
let nightMode = false;
let showLines = true;
let showASCII = false;
let selTid    = null;
let logThrottle = {};
let termQueue = [];

const tracker = new Tracker();
const animFrameMap = {}; // per-track animation phase

/* ══════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════ */
async function bootSeq() {
  const logEl = document.getElementById('boot-log');
  const pbEl  = document.getElementById('pb');
  const STEPS = [
    [0,   'INIT VISION_OS v4.0...'],
    [300, 'MEMORY_SYNC: USER_ALIASES'],
    [550, 'МОДЕЛЬ: COCO-SSD (80 КЛАССОВ)'],
    [800, 'ДОПОЛНЕНИЕ: TESSERACT OCR'],
    [1050,'КАЛИБРОВКА: FOCAL=950'],
    [1280,'ТРЕКЕР: MULTI-OBJECT IOU'],
    [1500,'ИНТЕРФЕЙС: ГОТОВ'],
  ];
  for (let i = 0; i < STEPS.length; i++) {
    const delay = i === 0 ? 0 : STEPS[i][0] - STEPS[i-1][0];
    await sleep(delay);
    const d = document.createElement('div');
    d.className = 'bl';
    d.textContent = '> ' + STEPS[i][1];
    logEl.appendChild(d);
    pbEl.style.width = ((i+1) / STEPS.length * 100) + '%';
  }
  model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  document.getElementById('btn-start').style.display = 'block';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ══════════════════════════════════════════════════════════════
   CAMERA
══════════════════════════════════════════════════════════════ */
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('boot').style.display = 'none';
      document.getElementById('app').style.display  = 'flex';
      running = true;
      log('VISION_OS v4.0 АКТИВИРОВАНА', 'ok');
      requestAnimationFrame(renderLoop);
    };
  } catch (e) {
    log('ОШИБКА: КАМЕРА НЕДОСТУПНА', 'alert');
  }
}

/* ══════════════════════════════════════════════════════════════
   TERMINAL
══════════════════════════════════════════════════════════════ */
function log(txt, type = 'ok') {
  termQueue.push({ txt, type });
  if (termQueue.length > 5) termQueue.shift();
  const el = document.getElementById('term-lines');
  el.innerHTML = '';
  termQueue.forEach(q => {
    const d = document.createElement('div');
    d.className = 'tl t' + q.type;
    d.textContent = '> ' + q.txt;
    el.appendChild(d);
  });
}

function canLog(cls, id) {
  const key = cls + id, now = Date.now();
  if (!logThrottle[key] || now - logThrottle[key] > 8000) {
    logThrottle[key] = now;
    return true;
  }
  return false;
}

/* ══════════════════════════════════════════════════════════════
   TOGGLES
══════════════════════════════════════════════════════════════ */
function toggleNight() {
  nightMode = !nightMode;
  video.classList.toggle('night', nightMode);
  document.getElementById('btn-night').classList.toggle('toggled', nightMode);
  log('NIGHT_MODE: ' + (nightMode ? 'ВКЛ' : 'ВЫКЛ'), nightMode ? 'warn' : 'ok');
}

function togglePlate() {
  plateEnabled = !plateEnabled;
  document.getElementById('btn-plate').classList.toggle('toggled', plateEnabled);
  if (plateEnabled) {
    ensureTesseract();
    log('РАСПОЗНАНИЕ НОМЕРОВ: ВКЛ', 'warn');
  } else {
    log('РАСПОЗНАНИЕ НОМЕРОВ: ВЫКЛ', 'ok');
  }
}

function toggleLines() {
  showLines = !showLines;
  document.getElementById('btn-lines').classList.toggle('toggled', !showLines);
  log('ЛИНИИ ПЕРСПЕКТИВЫ: ' + (showLines ? 'ВКЛ' : 'ВЫКЛ'), 'info');
}

function toggleASCII() {
  showASCII = !showASCII;
  document.getElementById('btn-ascii').classList.toggle('toggled', showASCII);
  log('ASCII РЕЖИМ: ' + (showASCII ? 'ВКЛ' : 'ВЫКЛ'), 'info');
}

/* ══════════════════════════════════════════════════════════════
   MAIN RENDER LOOP
══════════════════════════════════════════════════════════════ */
let frameN = 0;
async function renderLoop(now) {
  if (!running) { requestAnimationFrame(renderLoop); return; }

  // FPS counter
  fpsCnt++;
  if (now - lastFpsT > 1000) {
    document.getElementById('b-fps').textContent = fpsCnt + ' FPS';
    fpsCnt = 0; lastFpsT = now;
  }

  // Run detection every other frame to save CPU
  if (video.readyState === 4) {
    if (frameN % 2 === 0) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      const raw = await model.detect(video, CFG.MAX_DET, CFG.CONF);
      lastPred = tracker.update(raw);
    }
    frameN++;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (showLines) drawScanLine();
  drawBoxes();
  updateHUD();

  // Async plate recognition (throttled)
  if (plateEnabled) {
    const vehicle = lastPred.find(p =>
      ['car','truck','bus','motorcycle'].includes(p.cls) && p.plate === undefined && p.score > 0.5
    );
    if (vehicle) {
      const track = tracker.tracks[vehicle.id];
      if (track) recognizePlate(track);
    }
  }

  requestAnimationFrame(renderLoop);
}

/* ══════════════════════════════════════════════════════════════
   DRAW: SCAN LINE
══════════════════════════════════════════════════════════════ */
function drawScanLine() {
  const W = canvas.width, H = canvas.height;
  const scanY = H * 0.5 + Math.sin(Date.now() * 0.0018) * 4;
  const col = nightMode ? 'rgba(0,200,255,0.4)' : 'rgba(0,255,65,0.25)';

  ctx.lineWidth = 1.5;
  ctx.strokeStyle = col;
  ctx.setLineDash([8, 12]);
  ctx.beginPath();
  ctx.moveTo(W * 0.04, scanY);
  ctx.lineTo(W * 0.96, scanY);
  ctx.stroke();
  ctx.setLineDash([]);
}

/* ══════════════════════════════════════════════════════════════
   DRAW: ASCII SILHOUETTE
══════════════════════════════════════════════════════════════ */
const ASCII_CHARS = '01$#@!^X&%*▓▒░';
function drawASCIIFill(x, y, w, h, color) {
  const fs = 13;
  ctx.font = `bold ${fs}px 'Share Tech Mono'`;
  ctx.fillStyle = color;
  for (let fy = y + fs; fy < y + h; fy += fs * 0.9) {
    for (let fx = x; fx < x + w; fx += fs * 0.58) {
      if (Math.random() > 0.18) {
        const ch = ASCII_CHARS[Math.floor(Math.random() * ASCII_CHARS.length)];
        ctx.globalAlpha = 0.28 + Math.random() * 0.38;
        ctx.fillText(ch, fx, fy);
      }
    }
  }
  ctx.globalAlpha = 1;
}

/* ══════════════════════════════════════════════════════════════
   DRAW: BOXES
══════════════════════════════════════════════════════════════ */
function drawBoxes() {
  const W = canvas.width, H = canvas.height;
  const cX = W / 2, cY = H * 0.5;
  const now = Date.now();

  lastPred.forEach(p => {
    const [x, y, w, h] = p.smooth || p.sm || p.bbox;
    const col   = getColor(p.cls);
    const isSel = p.id === selTid;
    const d     = estimateDist([x,y,w,h], p.cls);
    const alias = getAlias(p.cls);
    const track = tracker.tracks[p.id];
    const plate = track ? track.plate : null;

    // ── perspective lines from center
    if (showLines) {
      ctx.setLineDash([4, 8]);
      ctx.strokeStyle = hexToRGBA(col, 0.22);
      ctx.lineWidth = 0.8;
      [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([px,py]) => {
        ctx.beginPath();
        ctx.moveTo(cX, cY);
        ctx.lineTo(px, py);
        ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // ── ASCII fill
    if (showASCII || nightMode) {
      drawASCIIFill(x, y, w, h, col);
    }

    // ── main box fill
    ctx.fillStyle = hexToRGBA(col, isSel ? 0.14 : 0.035);
    ctx.fillRect(x, y, w, h);

    // ── animated dashed border (offset scrolls)
    const dashOffset = (now / 40) % 20;
    ctx.strokeStyle  = hexToRGBA(col, isSel ? 1 : 0.85);
    ctx.lineWidth    = isSel ? 2.5 : 1.5;
    ctx.setLineDash([6, 4]);
    ctx.lineDashOffset = -dashOffset;
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;

    // ── corner brackets (solid, bright)
    const cs = Math.min(16, w * 0.22, h * 0.22);
    ctx.strokeStyle = col;
    ctx.lineWidth   = isSel ? 3 : 2;
    ctx.shadowColor = col;
    ctx.shadowBlur  = isSel ? 10 : 5;
    ctx.beginPath();
    // TL
    ctx.moveTo(x, y+cs); ctx.lineTo(x, y); ctx.lineTo(x+cs, y);
    // TR
    ctx.moveTo(x+w-cs, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+cs);
    // BL
    ctx.moveTo(x, y+h-cs); ctx.lineTo(x, y+h); ctx.lineTo(x+cs, y+h);
    // BR
    ctx.moveTo(x+w-cs, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-cs);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ── label background
    const labelH  = plate ? 40 : 28;
    const labelW  = Math.max(96, w * 0.7);
    ctx.fillStyle = 'rgba(0,0,0,.88)';
    ctx.fillRect(x, y - labelH, labelW, labelH);

    // ── class label
    ctx.fillStyle = col;
    ctx.font = `bold 10px 'Share Tech Mono'`;
    ctx.fillText(`${alias} #${p.id}`, x+5, y - labelH + 12);
    ctx.font = `8px 'Share Tech Mono'`;
    ctx.fillStyle = hexToRGBA(col, 0.75);
    ctx.fillText(`${d}m | ${Math.round(p.score*100)}%`, x+5, y - labelH + 23);

    // ── plate number (animated)
    if (plate) {
      const flash = Math.sin(now / 300) > 0;
      ctx.fillStyle = flash ? '#ffff00' : '#cccc00';
      ctx.font = `bold 11px 'Orbitron'`;
      ctx.fillText(plate, x+5, y - 4);
    } else if (plateEnabled && ['car','truck','bus','motorcycle'].includes(p.cls)) {
      // scanning indicator
      const dots = '.'.repeat(1 + Math.floor((now / 400) % 3));
      ctx.fillStyle = 'rgba(255,170,0,0.5)';
      ctx.font = `8px 'Share Tech Mono'`;
      ctx.fillText('OCR' + dots, x+5, y - 4);
    }

    // ── threat indicator (red pulse ring)
    if (THREAT.has(p.cls) && d < 10) {
      const pulse = 0.4 + 0.4 * Math.sin(now / 200);
      ctx.strokeStyle = `rgba(255,34,68,${pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.rect(x - 4, y - 4, w + 8, h + 8);
      ctx.stroke();
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   HUD UPDATE
══════════════════════════════════════════════════════════════ */
function updateHUD() {
  const total = lastPred.length;
  document.getElementById('b-obj').textContent = total + ' OBJ';
  document.getElementById('b-obj').className   = 'badge ' + (total > 0 ? 'active' : '');

  let threats = 0, maxDist = 0, sumConf = 0;
  lastPred.forEach(p => {
    const d = estimateDist(p.smooth || p.sm || p.bbox, p.cls);
    sumConf += p.score;
    if (d > maxDist && d < 999) maxDist = d;
    if (THREAT.has(p.cls)) threats++;
    if (canLog(p.cls, p.id)) {
      log(
        `${getAlias(p.cls)} #${p.id} — ${d}m ${THREAT.has(p.cls)?'⚠':''}`,
        THREAT.has(p.cls) ? 'warn' : 'info'
      );
    }
  });

  document.getElementById('s-thr').textContent  = threats;
  document.getElementById('s-conf').textContent = total > 0 ? Math.round((sumConf/total)*100)+'%' : '---';
  document.getElementById('s-dist').textContent = maxDist > 0 ? Math.round(maxDist)+'m' : '---';
  document.getElementById('s-trk').textContent  = Object.keys(tracker.tracks).length;

  const thrBadge = document.getElementById('b-mode');
  thrBadge.textContent = threats > 0 ? '⚠ УГРОЗА' : 'СКАН';
  thrBadge.className   = 'badge ' + (threats > 0 ? 'alert' : '');
}

/* ══════════════════════════════════════════════════════════════
   TAP → INFO PANEL
══════════════════════════════════════════════════════════════ */
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length > 0) handleTap(e.changedTouches[0]);
}, { passive: false });

function handleTap(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * sx;
  const cy = (e.clientY - rect.top)  * sy;

  const hit = lastPred.find(p => {
    const [x,y,w,h] = p.smooth || p.sm || p.bbox;
    return cx >= x && cx <= x+w && cy >= y && cy <= y+h;
  });

  if (hit) {
    selTid = hit.id;
    const d     = estimateDist(hit.smooth || hit.smooth || hit.bbox, hit.cls);
    const col   = getColor(hit.cls);
    const track = tracker.tracks[hit.id];
    const plate = track ? track.plate : null;

    const titleEl = document.getElementById('info-title');
    titleEl.textContent = getAlias(hit.cls);
    titleEl.dataset.cls = hit.cls;
    titleEl.style.color = col;

    let extraRows = '';
    if (plate) {
      extraRows = `<div class="ik">НОМЕР</div><div class="iv plate">${plate}</div>`;
    } else if (plateEnabled && ['car','truck','bus','motorcycle'].includes(hit.cls)) {
      extraRows = `<div class="ik">НОМЕР</div><div class="iv">СКАНИРОВАНИЕ...</div>`;
    }

    document.getElementById('info-grid').innerHTML = `
      <div class="ik">ID ТРЕКА</div><div class="iv">#${hit.id}</div>
      <div class="ik">КЛАСС</div><div class="iv">${hit.cls.toUpperCase()}</div>
      <div class="ik">ДИСТАНЦИЯ</div><div class="iv">${d}m</div>
      <div class="ik">УВЕРЕН.</div><div class="iv">${Math.round(hit.score*100)}%</div>
      <div class="ik">УГРОЗА</div><div class="iv">${THREAT.has(hit.cls)?'⚠ ДА':'НЕТ'}</div>
      ${extraRows}
    `;
    document.getElementById('info-desc').textContent = getDesc(hit.cls);
    document.getElementById('info-panel').classList.add('open');
    log(`ОТЧЁТ #${hit.id} — ТАП ПО НАЗВАНИЮ ДЛЯ ПЕРЕИМЕНОВАНИЯ`, 'tap');
  } else {
    closeInfo();
  }
}

function closeInfo() {
  selTid = null;
  document.getElementById('info-panel').classList.remove('open');
}

/* ══════════════════════════════════════════════════════════════
   RENAME
══════════════════════════════════════════════════════════════ */
function renameObject() {
  const titleEl = document.getElementById('info-title');
  const cls     = titleEl.dataset.cls;
  if (!cls) return;
  const oldAlias = titleEl.textContent;
  const newAlias = prompt(`ПЕРЕИМЕНОВАТЬ "${cls.toUpperCase()}" В:`, oldAlias);
  if (newAlias !== null && newAlias.trim() !== '') {
    USER_MEM[cls] = newAlias.trim().toUpperCase();
    localStorage.setItem('myeye_mem', JSON.stringify(USER_MEM));
    log('ПСЕВДОНИМ СОХРАНЁН: ' + newAlias.trim().toUpperCase(), 'warn');
    titleEl.textContent = newAlias.trim().toUpperCase();
  }
}

bootSeq();
