<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
:root{ --g:#00ff41; --panel:rgba(2,8,4,.8); --blue:#00aaff; --red: #ff3333; }
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--g); -webkit-tap-highlight-color: transparent;}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:42px;color:var(--g);text-shadow:0 0 15px var(--g);letter-spacing:5px;}
#pb-wrap{width:100%;max-width:300px;height:2px;background:#111;margin-top:20px;position:relative;overflow:hidden;}
#pb{height:100%;width:0;background:var(--g);transition:width .3s;box-shadow: 0 0 10px var(--g);}
#btn-start{margin-top:40px;display:none;background:none;border:1px solid var(--g);color:var(--g);padding:15px 50px;cursor:pointer;font-family:'Orbitron';text-transform:uppercase;letter-spacing:2px;transition: 0.3s;}
#btn-start:active{background:var(--g);color:#000;}

#app{position:fixed;inset:0;display:none;flex-direction:column;background:#000;}
#vp{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;}
video{display:none;}
canvas{position:absolute;width:100%;height:100%;object-fit:cover;z-index:2;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:grid;grid-template-columns: 1fr auto; gap:10px; padding:15px;pointer-events:none;background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);}
.badge{font-size:10px;padding:4px 8px;border:1px solid rgba(0,255,65,.3);background:var(--panel);display:inline-block;margin-left:5px; backdrop-filter: blur(4px);}

#terminal{height:120px;background:rgba(0,0,0,0.9);border-top:1px solid rgba(0,255,65,0.3);padding:10px;font-size:10px;overflow:hidden;display:flex;flex-direction:column-reverse;z-index:20;}
.tl{color:var(--g);margin-bottom:3px;font-family:'Share Tech Mono';text-transform:uppercase;opacity:0.9;animation: fadeIn 0.2s ease-out;}
.tl span {color: #888; margin-right: 8px;}
.tl.obj {color: var(--blue);}

@keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

/* Mobile Optimization */
@media (max-width: 600px) {
  #boot-logo { font-size: 32px; }
  #topbar { font-size: 12px; padding: 10px; }
  .badge { font-size: 9px; padding: 3px 6px; }
  #terminal { height: 100px; padding: 5px; }
}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log" style="font-size:10px; margin-top:10px; letter-spacing: 1px;">loading...</div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="startApp()">open system</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="topbar">
      <div style="font-family:'Orbitron'; font-weight:700; font-size: 11px;">myEYE</div>
      <div style="text-align: right;">
        <span class="badge" id="b-fps">0 fps</span>
        <span class="badge" id="b-obj">scanning...</span>
      </div>
    </div>
  </div>
  <div id="terminal"></div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const term = document.getElementById('terminal');

let objectDetector, lastFps = 0, frameCount = 0;
let currentDetectionBox = null;
const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d');

// Справочник цветов для различных категорий
const classColors = {
  person: '#00ff41',
  vehicle: '#ff3333', // car, bus, truck, motorcycle
  animal: '#ffff00',  // dog, cat, bird, horse
  device: '#00aaff',  // cell phone, laptop, tv, mouse
  indoor: '#ff00ff',  // chair, bed, dining table, bottle
  default: '#ffffff'
};

function getObjectColor(label) {
  if (label === 'person') return classColors.person;
  if (['car', 'bus', 'truck', 'motorcycle', 'bicycle', 'train', 'airplane'].includes(label)) return classColors.vehicle;
  if (['dog', 'cat', 'bird', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe'].includes(label)) return classColors.animal;
  if (['cell phone', 'laptop', 'mouse', 'remote', 'keyboard', 'tv', 'microwave', 'oven', 'refrigerator'].includes(label)) return classColors.device;
  if (['chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'bottle', 'cup', 'fork', 'knife', 'spoon', 'bowl'].includes(label)) return classColors.indoor;
  return classColors.default;
}

function log(msg, type = '') {
  const line = document.createElement('div');
  line.className = `tl ${type}`;
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  line.innerHTML = `<span>[${ts}]</span> > ${msg}`;
  term.prepend(line);
  if (term.childNodes.length > 15) term.lastChild.remove();
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true, minDetectionConfidence: 0.5 });

async function initModels() {
  log("LOADING TENSOR CORE...");
  objectDetector = await cocoSsd.load();
  document.getElementById('pb').style.width = '50%';
  log("OBJECT_DETECTOR: READY");
  
  await pose.initialize();
  document.getElementById('pb').style.width = '100%';
  document.getElementById('boot-log').innerText = "SYSTEM CALIBRATED // OPTICS STABLE";
  document.getElementById('btn-start').style.display = 'block';
  log("POSE_ENGINE: ACTIVE");
}

pose.onResults((results) => {
  if (!results.poseLandmarks || !currentDetectionBox) return;
  
  const { x, y, w, h } = currentDetectionBox;
  const landmarks = results.poseLandmarks;

  if (results.segmentationMask) {
    canvasCtx.save();
    offscreenCanvas.width = canvasElement.width;
    offscreenCanvas.height = canvasElement.height;
    offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    offscreenCtx.drawImage(results.segmentationMask, x, y, w, h);
    offscreenCtx.globalCompositeOperation = 'source-in';
    offscreenCtx.fillStyle = 'rgba(0, 255, 65, 0.2)';
    offscreenCtx.fillRect(0,0, offscreenCanvas.width, offscreenCanvas.height);
    canvasCtx.drawImage(offscreenCanvas, 0, 0);
    canvasCtx.restore();
  }

  const adj = landmarks.map(lp => ({
    x: (lp.x * w + x) / canvasElement.width,
    y: (lp.y * h + y) / canvasElement.height
  }));

  drawConnectors(canvasCtx, adj, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 2});
  drawLandmarks(canvasCtx, adj, {color: '#00ff41', fillColor: '#00ff41', lineWidth: 1, radius: 1});

  const nose = adj[0];
  const lE = adj[7], rE = adj[8];
  const dist = Math.sqrt(Math.pow((rE.x - lE.x)*canvasElement.width, 2) + Math.pow((rE.y - lE.y)*canvasElement.height, 2));
  const rW = dist * 0.9; 
  const rH = rW * 1.3;

  canvasCtx.beginPath();
  canvasCtx.ellipse(nose.x * canvasElement.width, (nose.y * canvasElement.height) - (rH * 0.1), rW, rH, 0, 0, Math.PI * 2);
  canvasCtx.strokeStyle = '#00ff41';
  canvasCtx.lineWidth = 1.5;
  canvasCtx.stroke();
});

async function draw() {
  const vw = videoElement.videoWidth;
  const vh = videoElement.videoHeight;
  if(vw === 0) return;

  canvasElement.width = vw;
  canvasElement.height = vh;
  canvasCtx.drawImage(videoElement, 0, 0, vw, vh);

  // Сетка HUD
  canvasCtx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
  canvasCtx.lineWidth = 1;
  for(let i=0; i<vw; i+=50) { canvasCtx.beginPath(); canvasCtx.moveTo(i,0); canvasCtx.lineTo(i,vh); canvasCtx.stroke(); }
  for(let i=0; i<vh; i+=50) { canvasCtx.beginPath(); canvasCtx.moveTo(0,i); canvasCtx.lineTo(vw,i); canvasCtx.stroke(); }

  // Порог обнаружения 0.6 для уменьшения ложных срабатываний
  const objs = await objectDetector.detect(videoElement);
  const filteredObjs = objs.filter(o => o.score > 0.6);
  document.getElementById('b-obj').innerText = filteredObjs.length + " TARGETS";

  for (const o of filteredObjs) {
    const [bx, by, bw, bh] = o.bbox;
    const targetColor = getObjectColor(o.class);
    
    // Рисуем рамку объекта
    canvasCtx.strokeStyle = targetColor;
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeRect(bx, by, bw, bh);
    
    // Подпись
    canvasCtx.fillStyle = targetColor;
    canvasCtx.font = '12px Share Tech Mono';
    canvasCtx.fillText(`[ ${o.class.toUpperCase()} ${Math.round(o.score*100)}% ]`, bx + 5, by + 15);

    if(o.class === 'person') {
      currentDetectionBox = { x: bx, y: by, w: bw, h: bh };
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = bw; tempCanvas.height = bh;
      tempCanvas.getContext('2d').drawImage(videoElement, bx, by, bw, bh, 0, 0, bw, bh);
      await pose.send({image: tempCanvas});
      
      if(frameCount % 30 === 0) log(`HUMAN_ID_CONFIRMED: ${Math.round(o.score*100)}%`);
    } else {
      if(frameCount % 60 === 0) log(`OBJ_DETECTED: ${o.class.toUpperCase()}`, 'obj');
    }
  }

  frameCount++;
  const now = performance.now();
  if (now - lastFps > 1000) {
    document.getElementById('b-fps').innerText = frameCount + " FPS";
    frameCount = 0; lastFps = now;
  }
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  log("SYSTEM_START: SUCCESS");
  
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  const camera = new Camera(videoElement, {
    onFrame: async () => { await draw(); },
    width: 1280,
    height: 720,
    facingMode: isMobile ? "environment" : "user"
  });
  camera.start();
}

initModels();
</script>
</body>
</html>
