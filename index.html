<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
/* ═══════════════════ ROOT ═══════════════════ */
:root{
  --g:#00ff41; --g2:#00cc33; --g3:#003a12; --g4:#001508;
  --b:#00aaff; --r:#ff3333; --y:#ffe600; --o:#ff9900; --p:#cc44ff;
  --panel:rgba(2,8,4,.92); --border:rgba(0,255,65,.2);
  --term-h: 160px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  -webkit-tap-highlight-color:transparent;user-select:none;}

/* ═══════════════════ BOOT ═══════════════════ */
#boot{position:fixed;inset:0;background:#000;z-index:300;
display:flex;flex-direction:column;justify-content:center;align-items:center;gap:0;padding:24px;}

#boot-hex{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:.04;}
#boot-hex svg{width:100%;height:100%;}

#boot-logo-wrap{position:relative;margin-bottom:10px;}
#boot-logo{font-family:‘Orbitron’,sans-serif;font-weight:900;
font-size:clamp(42px,12vw,80px);letter-spacing:.18em;
color:transparent;-webkit-text-stroke:1px rgba(0,255,65,.25);}
.bc{display:inline-block;opacity:0;color:var(–g);-webkit-text-stroke:0;
text-shadow:0 0 24px rgba(0,255,65,.6),0 0 60px rgba(0,255,65,.2);
animation:charDrop .55s cubic-bezier(.22,1,.36,1) forwards;}
.bc:nth-child(1){animation-delay:.05s;} .bc:nth-child(2){animation-delay:.17s;}
.bc:nth-child(3){animation-delay:.29s;} .bc:nth-child(4){animation-delay:.41s;}
.bc:nth-child(5){animation-delay:.53s;}
#boot-logo-glitch{position:absolute;inset:0;font-family:‘Orbitron’,sans-serif;
font-weight:900;font-size:clamp(42px,12vw,80px);letter-spacing:.18em;
color:var(–g);pointer-events:none;opacity:0;animation:glitchLoop 5s 1.5s infinite;}
#boot-scan{position:absolute;left:0;right:0;height:2px;top:0;
background:linear-gradient(90deg,transparent,var(–g),transparent);
box-shadow:0 0 12px var(–g);animation:scanDown 1.8s ease-in-out infinite;}

#boot-sub{font-size:8px;letter-spacing:.5em;color:var(–g2);
margin:6px 0 22px;opacity:0;animation:fi .5s .9s forwards;text-transform:uppercase;}

#boot-log{width:min(360px,88vw);font-size:8.5px;color:var(–g2);
min-height:100px;line-height:2;}
#boot-log .bl{opacity:0;animation:fi .18s forwards;
padding-left:5px;border-left:2px solid var(–g3);margin-bottom:2px;}
#boot-log .bl.ok::before{content:’✔ ’;color:var(–g);}
#boot-log .bl.warn::before{content:’⚡ ’;color:var(–o);}
#boot-log .bl.err::before{content:’✕ ’;color:var(–r);}

#pb-wrap{width:min(360px,88vw);}
#pb-track{height:2px;background:var(–g3);}
#pb{height:100%;width:0;background:linear-gradient(90deg,var(–g2),var(–g));
box-shadow:0 0 12px var(–g);transition:width .35s cubic-bezier(.22,1,.36,1);}
#pb-pct{font-size:7px;color:var(–g2);text-align:right;margin-top:3px;letter-spacing:.2em;}

#btn-start{margin-top:22px;display:none;background:none;
border:1px solid var(–g);color:var(–g);font-family:‘Orbitron’,sans-serif;
font-size:10px;letter-spacing:.35em;padding:13px 44px;cursor:pointer;
position:relative;overflow:hidden;transition:color .25s;}
#btn-start::before{content:’’;position:absolute;inset:0;background:var(–g);
transform:scaleX(0);transform-origin:left;
transition:transform .28s cubic-bezier(.22,1,.36,1);z-index:-1;}
#btn-start:hover::before,#btn-start:active::before{transform:scaleX(1);}
#btn-start:hover,#btn-start:active{color:#000;}

/* ═══════════════════ APP ═══════════════════ */
#app{position:fixed;inset:0;display:none;flex-direction:column;}

/* ── Viewport ── */
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;min-height:0;}
video{display:none;}
canvas#output_canvas{position:absolute;inset:0;width:100%;height:100%;
object-fit:cover;z-index:2;cursor:crosshair;}

/* scanlines */
#vp::after{content:’’;position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,
rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);animation:scanroll 8s linear infinite;}

/* vignette */
#vignette{position:absolute;inset:0;z-index:4;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.85) 100%);}

/* grid */
#grid-ov{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:.025;
background-image:linear-gradient(var(–g) 1px,transparent 1px),
linear-gradient(90deg,var(–g) 1px,transparent 1px);
background-size:48px 48px;}

/* alert flash */
#alert-flash{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;}
#alert-flash.on{animation:alertFlash 1.2s ease-out forwards;}

/* corners */
.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:’’;position:absolute;background:var(–g);box-shadow:0 0 6px var(–g);}
.hc::before{width:2px;height:18px;}.hc::after{width:18px;height:2px;}
#hc-tl{top:0;left:0;}#hc-tl::before{top:0;left:0;}#hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}#hc-tr::before{top:0;right:0;}#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;}#hc-bl::before{bottom:0;left:0;}#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}

/* ── Topbar ── */
#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 100%);}
#sys-id{font-family:‘Orbitron’,sans-serif;font-size:13px;font-weight:900;
letter-spacing:.2em;color:var(–g);text-shadow:0 0 20px rgba(0,255,65,.5);}
#sys-id small{font-weight:400;font-size:9px;opacity:.4;letter-spacing:.08em;}
#badges{display:flex;gap:5px;align-items:center;}
.badge{font-size:7.5px;letter-spacing:.1em;padding:3px 8px;
border:1px solid var(–border);background:var(–panel);
color:var(–g2);display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px);}
.bdot{width:4px;height:4px;border-radius:50%;background:var(–g);flex-shrink:0;
animation:dotBlink 1.5s ease-in-out infinite;box-shadow:0 0 5px var(–g);}
#b-fps .bdot{background:var(–b);box-shadow:0 0 5px var(–b);}
#b-threat{display:none;border-color:rgba(255,51,51,.4);color:var(–r);}
#b-threat .bdot{background:var(–r);box-shadow:0 0 5px var(–r);animation-duration:.6s;}

/* ── Status bar bottom ── */
#statusbar{position:absolute;bottom:0;left:0;right:0;z-index:9;pointer-events:none;
display:flex;justify-content:space-between;padding:4px 14px;
background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%);}
.sbi{font-size:7px;color:rgba(0,255,65,.32);letter-spacing:.1em;}

/* ── Info card (выезжает над терминалом при тапе) ── */
#info-card{position:absolute;bottom:0;left:0;right:0;z-index:30;
background:rgba(1,6,2,.98);border-top:1px solid rgba(0,255,65,.5);
transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
pointer-events:none;}
#info-card.open{transform:translateY(0);pointer-events:all;}
#info-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(–g),transparent);
animation:sweepLine 3s linear infinite;}
#ic-close{position:absolute;top:10px;right:12px;background:none;
border:1px solid rgba(0,255,65,.3);color:var(–g2);
font-family:‘Share Tech Mono’,monospace;font-size:8px;
padding:3px 10px;cursor:pointer;letter-spacing:.12em;transition:all .2s;}
#ic-close:hover{border-color:var(–g);color:var(–g);}

#ic-body{padding:12px 14px 10px;}
#ic-row1{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
#ic-name{font-family:‘Orbitron’,sans-serif;font-size:17px;font-weight:700;
letter-spacing:.18em;cursor:pointer;transition:opacity .2s;}
#ic-name:hover{opacity:.7;}
#ic-sub{font-size:7.5px;color:rgba(0,255,65,.4);letter-spacing:.25em;}

#ic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px 8px;
font-size:8px;margin-bottom:7px;}
.ick{color:rgba(0,255,65,.4);font-size:7px;letter-spacing:.08em;}
.icv{color:var(–g);}
.icv.warn{color:var(–o);}.icv.alert{color:var(–r);}

#ic-desc{font-size:8px;color:rgba(0,255,65,.48);line-height:1.65;
border-top:1px solid var(–border);padding-top:6px;}

#ic-tbar{margin-top:6px;display:flex;align-items:center;gap:8px;}
#ic-tl{font-size:7px;color:rgba(0,255,65,.4);letter-spacing:.1em;white-space:nowrap;}
#ic-tt{flex:1;height:2px;background:var(–g3);overflow:hidden;}
#ic-tf{height:100%;width:0;transition:width .5s,background .3s;}
#ic-tv{font-size:8px;color:var(–g);min-width:26px;text-align:right;}

/* rename badge */
#ic-rename-hint{font-size:7px;color:rgba(0,255,65,.3);letter-spacing:.15em;
margin-top:4px;cursor:pointer;}
#ic-rename-hint:hover{color:var(–g);}

/* ═══════════════════ TERMINAL ═══════════════════ */
#terminal-wrap{flex:0 0 auto;background:rgba(0,0,0,.95);
border-top:1px solid var(–border);z-index:20;display:flex;flex-direction:column;
height:var(–term-h);}

#term-header{display:flex;align-items:center;justify-content:space-between;
padding:4px 12px;border-bottom:1px solid rgba(0,255,65,.1);flex-shrink:0;}
#term-title{font-size:7px;letter-spacing:.25em;color:rgba(0,255,65,.3);}
#term-clear{background:none;border:none;color:rgba(0,255,65,.3);
font-family:‘Share Tech Mono’,monospace;font-size:7px;letter-spacing:.15em;
cursor:pointer;padding:0;}
#term-clear:hover{color:var(–g);}

/* Колонки */
#term-cols{display:grid;
grid-template-columns:70px 72px 1fr 70px 80px;
gap:0 6px;padding:2px 12px;border-bottom:1px solid rgba(0,255,65,.08);
flex-shrink:0;}
.tcl{font-size:6.5px;color:rgba(0,255,65,.25);letter-spacing:.15em;text-transform:uppercase;}

#term-body{flex:1;overflow-y:auto;padding:4px 0;
scrollbar-width:thin;scrollbar-color:var(–g3) transparent;}
#term-body::-webkit-scrollbar{width:3px;}
#term-body::-webkit-scrollbar-thumb{background:var(–g3);border-radius:2px;}

.trow{display:grid;grid-template-columns:70px 72px 1fr 70px 80px;
gap:0 6px;padding:2px 12px;font-size:8px;line-height:1.5;
border-left:2px solid transparent;transition:background .15s;}
.trow:hover{background:rgba(0,255,65,.04);}
.trow.person{border-left-color:var(–g);}
.trow.vehicle{border-left-color:var(–r);}
.trow.animal{border-left-color:var(–y);}
.trow.device{border-left-color:var(–b);}
.trow.warn{border-left-color:var(–o);}
.trow.system{border-left-color:var(–p);}
.tc-time{color:rgba(0,255,65,.35);font-size:7.5px;}
.tc-date{color:rgba(0,255,65,.25);font-size:7px;}
.tc-event{color:var(–g);}
.tc-type{font-size:7.5px;}
.tc-group{font-size:7px;color:rgba(0,255,65,.4);}

/* ═══════════════════ CACHE INDICATOR ═══════════════════ */
#cache-badge{position:absolute;top:38px;left:14px;z-index:16;
font-size:7px;color:rgba(0,255,65,.35);letter-spacing:.15em;pointer-events:none;}

/* ═══════════════════ KEYFRAMES ═══════════════════ */
@keyframes charDrop{
0%{opacity:0;transform:translateY(-16px) scaleY(2);color:transparent;-webkit-text-stroke:1px var(–g);}
60%{color:var(–g);-webkit-text-stroke:0;}
100%{opacity:1;transform:none;color:var(–g);}
}
@keyframes glitchLoop{
0%,87%,100%{opacity:0;}
88%{opacity:.7;transform:translateX(-3px);clip-path:polygon(0 15%,100% 15%,100% 40%,0 40%);color:var(–r);}
90%{opacity:.5;transform:translateX(4px);clip-path:polygon(0 55%,100% 55%,100% 78%,0 78%);color:var(–b);}
92%{opacity:0;}
}
@keyframes scanDown{
0%{top:0;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:100%;opacity:0;}
}
@keyframes fi{to{opacity:1;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 80px;}}
@keyframes sweepLine{from{background-position:-200% 0;}to{background-position:200% 0;}}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:.15;}}
@keyframes alertFlash{0%{opacity:1;background:rgba(255,51,51,.07);}100%{opacity:0;}}
@keyframes lockExpand{0%{opacity:.8;transform:scale(1.5);}100%{opacity:0;transform:scale(1);}}
@keyframes rowIn{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:none;}}
</style>

</head>

<script>
/* ═══════════════════════════════════════════
   USER CACHE — локальное хранилище
═══════════════════════════════════════════ */
const CACHE_KEY = 'myeye_cache_v2';
let userCache = (() => {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; }
  catch(e) { return {}; }
})();

// cache.aliases  = { 'person': 'ЧЕЛОВЕК', ... }
// cache.events   = [ { ts, cls, score, group }, ... ]  (последние 200)
// cache.counts   = { 'person': 42, ... }
// cache.lastSeen = { 'person': timestamp, ... }

if (!userCache.aliases) userCache.aliases = {};
if (!userCache.events)  userCache.events  = [];
if (!userCache.counts)  userCache.counts  = {};
if (!userCache.lastSeen) userCache.lastSeen = {};

function saveCache() {
  // Обрезаем events до 200 записей
  if (userCache.events.length > 200) userCache.events = userCache.events.slice(-200);
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(userCache)); } catch(e) {}
  updateCacheBadge();
}

function updateCacheBadge() {
  const el = document.getElementById('cache-badge');
  if (el) el.textContent = `CACHE: ${Object.keys(userCache.counts).length} CLASSES / ${userCache.events.length} EVENTS`;
}

  cat:{threat:.1,desc:'Felis catus. Автономный агент. Высокая мобильность.'},
  'cell phone':{threat:.18,desc:'Активный EMF-источник. Возможна передача данных.'},
  backpack:{threat:.38,desc:'Носимый контейнер. Содержимое неизвестно.'},
  _d:{threat:.2,desc:'Объект идентифицирован. Расширенный анализ выполняется.'}
};

function getGroup(cls) { return GROUPS[cls] || 'OBJECT'; }
function getColor(cls) { return GROUP_COLORS[getGroup(cls)] || '#ffffff'; }
function getKB(cls) { return KB[cls] || KB._d; }
function getAlias(cls) { return userCache.aliases[cls] || cls.toUpperCase(); }

/* ═══════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════ */
const video  = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx    = canvas.getContext('2d');

let objectDetector = null;
let poseModel      = null;
let cameraRunning  = false;
let frameCount     = 0;
let fpsCounter     = 0;
let lastFpsTime    = 0;
let lastObjects    = [];
let selectedObj    = null;
let threatActive   = false;
let poseActive     = false; // флаг: поза загружена

// Пул временных canvas для pose (переиспользуем)
let poseCanvas = null;
let poseCtx    = null;

// Дедупликация событий в лог (не логируем одно и то же чаще раза в 8с)
const logThrottle = {};

/* ═══════════════════════════════════════════
   BOOT SEQUENCE
═══════════════════════════════════════════ */
async function initModels() {
  const blogEl = document.getElementById('boot-log');
  const pbEl   = document.getElementById('pb');
  const pctEl  = document.getElementById('pb-pct');

  function bLog(txt, cls='ok') {
    const d = document.createElement('div');
    d.className = 'bl ' + cls;
    d.textContent = txt;
    blogEl.appendChild(d);
  }

  function setPb(p) {
    pbEl.style.width = p + '%';
    pctEl.textContent = p + '%';
  }

  bLog('INIT VISION OS v5.1');  setPb(10);
  await sleep(180);
  bLog('USER CACHE: LOADED (' + Object.keys(userCache.aliases).length + ' ALIASES)'); setPb(20);
  await sleep(180);

  try {
    bLog('MODEL: COCO-SSD LITE_MV2 — LOADING...','warn');
    objectDetector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    setPb(60);
    bLog('OBJECT DETECTOR: READY');
  } catch(e) {
    bLog('DETECTOR ERROR: ' + e.message, 'err');
  }

  // Pose — необязательный модуль, не блокируем старт при ошибке
  try {
    bLog('POSE ENGINE: LOADING...','warn');
    poseModel = new Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
    });
    poseModel.setOptions({
      modelComplexity: 0,      // 0=lite — быстрее на мобильных
      smoothLandmarks: true,
      enableSegmentation: false, // отключаем сегментацию — экономим CPU
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    poseModel.onResults(onPoseResults);
    await poseModel.initialize();
    poseActive = true;
    setPb(90);
    bLog('POSE ENGINE: ACTIVE');
  } catch(e) {
    bLog('POSE: NOT AVAILABLE (SKELETAL HUD DISABLED)','warn');
    poseActive = false;
  }

  setPb(100);
  await sleep(200);
  bLog('ALL SYSTEMS OPERATIONAL');
  document.getElementById('btn-start').style.display = 'block';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ═══════════════════════════════════════════
   POSE RESULTS
═══════════════════════════════════════════ */
let poseResult = null;
let poseBox    = null;

function onPoseResults(results) {
  poseResult = results;
}

function drawPoseOnCanvas(box) {
  if (!poseResult || !poseResult.poseLandmarks || !box) return;
  const { bx, by, bw, bh } = box;

  // Пересчитываем ландмарки из координат кропа в координаты canvas
  const adj = poseResult.poseLandmarks.map(lp => ({
    x: (lp.x * bw + bx) / canvas.width,
    y: (lp.y * bh + by) / canvas.height,
    visibility: lp.visibility
  }));

  // Рисуем только видимые кости
  if (typeof POSE_CONNECTIONS !== 'undefined') {
    drawConnectors(ctx, adj, POSE_CONNECTIONS, {
      color: 'rgba(0,255,65,.7)', lineWidth: 2
    });
  }
  drawLandmarks(ctx, adj, {
    color: '#00ff41', fillColor: 'rgba(0,255,65,.5)',
    lineWidth: 1, radius: 3
  });
}

/* ═══════════════════════════════════════════
   START APP
═══════════════════════════════════════════ */
function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display  = 'flex';
  updateCacheBadge();
  sysLog('SYSTEM START: SUCCESS', 'SYSTEM', 'SYS');

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // Используем @mediapipe Camera если доступна, иначе — нативный getUserMedia
  if (typeof Camera !== 'undefined') {
    const cam = new Camera(video, {
      onFrame: renderFrame,
      width: 1280, height: 720,
      facingMode: isMobile ? 'environment' : 'user'
    });
    cam.start();
  } else {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: isMobile ? 'environment' : 'user',
               width: { ideal: 1280 }, height: { ideal: 720 } }
    }).then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        (function loop() { renderFrame(); requestAnimationFrame(loop); })();
      };
    }).catch(e => sysLog('CAMERA ERROR: ' + e.message, 'ERROR', 'SYS'));
  }

  // Часы
  setInterval(() => {
    document.getElementById('sb-time').textContent =
      new Date().toTimeString().slice(0, 8);
  }, 1000);
}

/* ═══════════════════════════════════════════
   MAIN RENDER FRAME
═══════════════════════════════════════════ */
let detecting = false; // guard — не запускаем detect параллельно

async function renderFrame() {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !objectDetector) return;

  canvas.width  = vw;
  canvas.height = vh;

  // Рисуем видео
  ctx.drawImage(video, 0, 0, vw, vh);

  // Лёгкая виньетка
  const vig = ctx.createRadialGradient(vw/2, vh/2, vw*.25, vw/2, vh/2, vw*.7);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, vw, vh);

  // FPS
  fpsCounter++;
  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    document.getElementById('fps-txt').textContent = fpsCounter + ' FPS';
    fpsCounter = 0;
    lastFpsTime = now;
  }
  frameCount++;

  // Object detection — каждый кадр, но с guard
  if (!detecting) {
    detecting = true;
    try {
      // maxNumBoxes=50, minScore=0.35 — баланс скорость/качество
      const raw = await objectDetector.detect(video, 50, 0.35);
      lastObjects = raw;
    } catch(e) {}
    detecting = false;
  }

  // Рисуем объекты
  drawObjects(vw, vh);

  // Pose — только для person, каждые 3 кадра (экономия CPU)
  if (poseActive && frameCount % 3 === 0) {
    const person = lastObjects.find(o => o.class === 'person');
    if (person) {
      const [bx, by, bw, bh] = person.bbox;
      poseBox = { bx, by, bw, bh };
      // кроп для pose
      if (!poseCanvas) { poseCanvas = document.createElement('canvas'); poseCtx = poseCanvas.getContext('2d'); }
      poseCanvas.width  = Math.round(bw);
      poseCanvas.height = Math.round(bh);
      if (poseCanvas.width > 0 && poseCanvas.height > 0) {
        poseCtx.drawImage(video, bx, by, bw, bh, 0, 0, bw, bh);
        poseModel.send({ image: poseCanvas }).catch(() => {});
      }
    } else {
      poseResult = null;
      poseBox    = null;
    }
  }

  // Рисуем скелет поверх
  if (poseActive && poseBox) drawPoseOnCanvas(poseBox);

  // HUD
  updateHUD();
}

/* ═══════════════════════════════════════════
   DRAW OBJECTS
═══════════════════════════════════════════ */
function drawObjects(vw, vh) {
  const t = frameCount;
  const hasThreat = lastObjects.some(o =>
    ['person','car','truck','bus','motorcycle'].includes(o.class));

  // Threat badge
  const tb = document.getElementById('b-threat');
  if (hasThreat !== threatActive) {
    threatActive = hasThreat;
    tb.style.display = hasThreat ? 'flex' : 'none';
    if (hasThreat) {
      const af = document.getElementById('alert-flash');
      af.classList.remove('on'); void af.offsetWidth; af.classList.add('on');
    }
  }

  document.getElementById('obj-txt').textContent = lastObjects.length + ' TARGETS';

  lastObjects.forEach(obj => {
    const [bx, by, bw, bh] = obj.bbox;
    const col   = getColor(obj.class);
    const isSel = selectedObj && selectedObj.class === obj.class &&
                  Math.abs(selectedObj.cx - (bx+bw/2)) < bw * 0.5;

    // Pulse для угроз
    const pulse = ['person','car','truck','bus','motorcycle'].includes(obj.class)
      ? 0.6 + 0.4 * Math.sin(t * 0.12)
      : 1;

    // Рамка — толще (lineWidth 3 обычная, 4 выбранная)
    ctx.strokeStyle = hexA(col, pulse);
    ctx.lineWidth   = isSel ? 4 : 3;
    ctx.strokeRect(bx, by, bw, bh);

    // Заливка
    ctx.fillStyle = hexA(col, isSel ? 0.14 : 0.04);
    ctx.fillRect(bx, by, bw, bh);

    // Угловые скобки
    const cs = Math.min(20, bw * 0.2, bh * 0.2);
    const ao = isSel ? Math.sin(t * 0.1) * 2 : 0;
    ctx.strokeStyle = col;
    ctx.lineWidth   = isSel ? 3.5 : 2.5;
    ctx.shadowColor = col; ctx.shadowBlur = isSel ? 12 : 6;
    ctx.beginPath();
    // TL
    ctx.moveTo(bx-ao, by+cs-ao); ctx.lineTo(bx-ao, by-ao); ctx.lineTo(bx+cs-ao, by-ao);
    // TR
    ctx.moveTo(bx+bw-cs+ao, by-ao); ctx.lineTo(bx+bw+ao, by-ao); ctx.lineTo(bx+bw+ao, by+cs-ao);
    // BL
    ctx.moveTo(bx-ao, by+bh-cs+ao); ctx.lineTo(bx-ao, by+bh+ao); ctx.lineTo(bx+cs-ao, by+bh+ao);
    // BR
    ctx.moveTo(bx+bw-cs+ao, by+bh+ao); ctx.lineTo(bx+bw+ao, by+bh+ao); ctx.lineTo(bx+bw+ao, by+bh-cs+ao);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Сканирующая линия (выбранный)
    if (isSel) {
      const sy = by + ((t * 2.5 % 100) / 100) * bh;
      const sg = ctx.createLinearGradient(bx, sy-10, bx, sy+10);
      sg.addColorStop(0, hexA(col, 0)); sg.addColorStop(.5, hexA(col, .4)); sg.addColorStop(1, hexA(col, 0));
      ctx.fillStyle = sg; ctx.fillRect(bx, sy-10, bw, 20);
    }

    // Лейбл — крупнее
    const alias  = getAlias(obj.class);
    const label1 = `${alias}`;
    const label2 = `${Math.round(obj.score * 100)}%`;
    const upward = by > 34;
    const lY     = upward ? by - 6 : by + bh + 20;

    ctx.font = "bold 15px 'Share Tech Mono'";
    const lw = ctx.measureText(label1).width + 10;

    ctx.fillStyle = hexA(col, .92);
    ctx.fillRect(bx, upward ? lY - 22 : lY - 16, lw, 24);
    ctx.fillStyle = '#000';
    ctx.font = "bold 15px 'Share Tech Mono'";
    ctx.fillText(label1, bx + 4, upward ? lY - 9 : lY - 3);

    // Малый тег уверенности
    ctx.font = "11px 'Share Tech Mono'";
    ctx.fillStyle = hexA(col, .85);
    ctx.fillText(label2, bx + lw + 4, upward ? lY - 9 : lY - 3);

    // Группа (правый верхний)
    if (bw > 70) {
      ctx.fillStyle = hexA(col, .12);
      ctx.fillRect(bx + bw - 62, by + 3, 60, 13);
      ctx.fillStyle = hexA(col, .65);
      ctx.font = "7.5px 'Share Tech Mono'";
      ctx.fillText(getGroup(obj.class), bx + bw - 60, by + 13);
    }

    // Логируем новые объекты (не чаще раза в 8с)
    const lk = obj.class;
    const now = Date.now();
    if (!logThrottle[lk] || now - logThrottle[lk] > 8000) {
      logThrottle[lk] = now;
      sysLog(alias, obj.class.toUpperCase(), getGroup(obj.class));

      // Сохраняем в кэш
      userCache.counts[obj.class] = (userCache.counts[obj.class] || 0) + 1;
      userCache.lastSeen[obj.class] = now;
      userCache.events.push({ ts: now, cls: obj.class,
        score: Math.round(obj.score * 100), group: getGroup(obj.class) });
      saveCache();
    }
  });
}

/* ═══════════════════════════════════════════
   HUD
═══════════════════════════════════════════ */
function updateHUD() {}

/* ═══════════════════════════════════════════
   TERMINAL — скроллируемый с колонками
═══════════════════════════════════════════ */
const termBody = document.getElementById('term-body');

function sysLog(event, type = 'SYSTEM', group = 'SYS') {
  const now  = new Date();
  const time = now.toTimeString().slice(0, 8);
  const date = `${now.getDate().toString().padStart(2,'0')}.` +
               `${(now.getMonth()+1).toString().padStart(2,'0')}.` +
               `${now.getFullYear()}`;

  const groupClass = {
    HUMAN:'person', VEHICLE:'vehicle', ANIMAL:'animal',
    DEVICE:'device', SYS:'system'
  }[group] || '';

  const row = document.createElement('div');
  row.className = `trow ${groupClass}`;
  row.style.animation = 'rowIn .18s ease-out forwards';
  row.innerHTML =
    `<span class="tc-time">${time}</span>` +
    `<span class="tc-date">${date}</span>` +
    `<span class="tc-event">${event}</span>` +
    `<span class="tc-type" style="color:${GROUP_COLORS[group]||'var(--g)'}">${type}</span>` +
    `<span class="tc-group">${group}</span>`;

  termBody.appendChild(row);
  // Авто-скролл вниз только если уже у дна (иначе не ломаем ручной скролл)
  const atBottom = termBody.scrollHeight - termBody.scrollTop - termBody.clientHeight < 40;
  if (atBottom) termBody.scrollTop = termBody.scrollHeight;

  // Ограничение строк в DOM
  while (termBody.childNodes.length > 200) termBody.firstChild.remove();
}

function clearLog() {
  termBody.innerHTML = '';
  sysLog('LOG CLEARED', 'SYSTEM', 'SYS');
}

/* ═══════════════════════════════════════════
   TAP ON CANVAS → Info Card
═══════════════════════════════════════════ */
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx   = canvas.width  / rect.width;
  const sy   = canvas.height / rect.height;
  const cx   = (e.clientX - rect.left) * sx;
  const cy   = (e.clientY - rect.top)  * sy;

  const hit = lastObjects.find(o => {
    const [bx, by, bw, bh] = o.bbox;
    return cx >= bx && cx <= bx + bw && cy >= by && cy <= by + bh;
  });

  if (hit) {
    const [bx, by, bw, bh] = hit.bbox;
    selectedObj = { class: hit.class, cx: bx + bw/2, cy: by + bh/2 };
    openCard(hit);
    sysLog(`LOCK-ON: ${getAlias(hit.class)}`, hit.class.toUpperCase(), getGroup(hit.class));
  } else {
    closeCard();
  }
});

function openCard(obj) {
  const col   = getColor(obj.class);
  const kb    = getKB(obj.class);
  const alias = getAlias(obj.class);
  const group = getGroup(obj.class);
  const [bx, by, bw, bh] = obj.bbox;
  const score = Math.round(obj.score * 100);
  const threat = Math.round(kb.threat * 100);

  const nameEl = document.getElementById('ic-name');
  nameEl.textContent = alias;
  nameEl.style.color = col;
  nameEl.style.textShadow = `0 0 18px ${col}`;
  nameEl.dataset.cls = obj.class;

  const seen = userCache.counts[obj.class] || 0;

  document.getElementById('ic-grid').innerHTML = `
    <div class="ick">КЛАСС</div>     <div class="icv">${obj.class.toUpperCase()}</div>
    <div class="ick">ГРУППА</div>    <div class="icv">${group}</div>
    <div class="ick">СИГНАЛ</div>    <div class="icv">${score}%</div>
    <div class="ick">В КЭШЕ</div>    <div class="icv">${seen} РАЗ</div>
    <div class="ick">ШИРИНА</div>    <div class="icv">${Math.round(bw)}px</div>
    <div class="ick">ВЫСОТА</div>    <div class="icv">${Math.round(bh)}px</div>
    <div class="ick">КООРД X</div>   <div class="icv">${Math.round(bx)}</div>
    <div class="ick">КООРД Y</div>   <div class="icv">${Math.round(by)}</div>`;

  document.getElementById('ic-desc').textContent = kb.desc;

  const tf = document.getElementById('ic-tf');
  tf.style.width      = threat + '%';
  tf.style.background = threat > 60 ? 'var(--r)' : threat > 35 ? 'var(--o)' : 'var(--g)';
  tf.style.boxShadow  = `0 0 8px ${threat > 60 ? 'var(--r)' : threat > 35 ? 'var(--o)' : 'var(--g)'}`;
  document.getElementById('ic-tv').textContent = threat + '%';

  document.getElementById('info-card').classList.add('open');
}

function closeCard() {
  selectedObj = null;
  document.getElementById('info-card').classList.remove('open');
}

/* ═══════════════════════════════════════════
   RENAME OBJECT CLASS
═══════════════════════════════════════════ */
// Клик по имени или кнопке rename
document.getElementById('ic-name').addEventListener('click', renameObj);

function renameObj() {
  const nameEl = document.getElementById('ic-name');
  const cls    = nameEl.dataset.cls;
  if (!cls) return;
  const cur = userCache.aliases[cls] || cls.toUpperCase();
  const nv  = prompt(`ПЕРЕИМЕНОВАТЬ КЛАСС "${cls.toUpperCase()}" →`, cur);
  if (nv !== null && nv.trim()) {
    const newName = nv.trim().toUpperCase();
    userCache.aliases[cls] = newName;
    saveCache();
    nameEl.textContent = newName;
    sysLog(`ALIAS: ${cls.toUpperCase()} → ${newName}`, 'RENAME', 'SYS');
  }
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function hexA(hex, a) {
  // Принимает '#rrggbb' или 'rgb(...)'
  let r, g, b;
  if (hex.startsWith('#')) {
    r = parseInt(hex.slice(1,3),16);
    g = parseInt(hex.slice(3,5),16);
    b = parseInt(hex.slice(5,7),16);
  } else {
    const m = hex.match(/\d+/g);
    [r,g,b] = m ? m : [255,255,255];
  }
  return `rgba(${r},${g},${b},${a})`;
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
initModels();
</script>
