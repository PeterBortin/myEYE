<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE // VISION OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;--g4:#001a08;
  --y:#ffe600;--o:#ff9900;--r:#ff2244;--b:#00c8ff;--p:#bf00ff;
  --bg:#010603;--panel:rgba(1,6,3,.97);--border:rgba(0,255,65,.18);
  --glow: 0 0 20px rgba(0,255,65,.4), 0 0 40px rgba(0,255,65,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* ═══════════════════════════════ BOOT ═══════════════════════════════ */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}

#boot-hex-bg{position:absolute;inset:0;overflow:hidden;opacity:0.06;}
#boot-hex-bg svg{width:100%;height:100%;}

#boot-eye{width:90px;height:90px;position:relative;margin-bottom:22px;}
#boot-eye svg{width:100%;height:100%;}
.eye-iris{animation:eyePulse 2.5s ease-in-out infinite;}
.eye-scan{animation:eyeScan 2s linear infinite;}

#boot-logo{font-family:‘Orbitron’,sans-serif;font-weight:900;
font-size:clamp(32px,8vw,56px);letter-spacing:.2em;color:var(–g);
text-shadow:var(–glow);position:relative;}
#boot-logo::after{content:’’;position:absolute;bottom:-4px;left:0;right:0;
height:1px;background:linear-gradient(90deg,transparent,var(–g),transparent);
animation:scanLine 2s ease-in-out infinite;}

#boot-sub{font-family:‘Rajdhani’,sans-serif;font-size:10px;letter-spacing:.5em;
color:var(–g2);margin:8px 0 30px;opacity:0.6;text-transform:uppercase;}

#boot-log{width:min(380px,88vw);font-size:9px;color:var(–g2);min-height:120px;line-height:2;}
#boot-log .bl{opacity:0;animation:fi .2s forwards;padding-left:4px;
border-left:2px solid var(–g3);}
#boot-log .bl.ok::before{content:’✔ ’;color:var(–g);}
#boot-log .bl.warn::before{content:’⚡ ’;color:var(–o);}
#boot-log .bl.err::before{content:’✕ ’;color:var(–r);}

#pb-wrap{width:min(380px,88vw);margin-top:20px;position:relative;}
#pb-track{height:2px;background:var(–g3);overflow:hidden;}
#pb{height:100%;width:0;background:linear-gradient(90deg,var(–g2),var(–g));
box-shadow:0 0 15px var(–g);transition:width 0.4s cubic-bezier(.22,1,.36,1);}
#pb-pct{font-size:8px;color:var(–g2);text-align:right;margin-top:4px;letter-spacing:.15em;}

#btn-start{margin-top:28px;display:none;background:none;
border:1px solid var(–g);color:var(–g);font-family:‘Orbitron’,sans-serif;
font-size:10px;letter-spacing:.4em;padding:14px 48px;cursor:pointer;
position:relative;overflow:hidden;transition:color .3s;}
#btn-start::before{content:’’;position:absolute;inset:0;
background:var(–g);transform:scaleX(0);transform-origin:left;
transition:transform .3s cubic-bezier(.22,1,.36,1);z-index:-1;}
#btn-start:hover::before{transform:scaleX(1);}
#btn-start:hover{color:#000;box-shadow:0 0 30px var(–g);}

/* ═══════════════════════════════ APP ═══════════════════════════════ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}

video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.52) contrast(1.4) saturate(.82);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

/* Scanlines */
#vp::after{content:’’;position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,
rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);animation:scanroll 8s linear infinite;}

/* Vignette */
#vignette{position:absolute;inset:0;z-index:6;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.85) 100%);}

/* Grid overlay */
#grid-overlay{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.035;
background-image:linear-gradient(var(–g) 1px,transparent 1px),
linear-gradient(90deg,var(–g) 1px,transparent 1px);
background-size:40px 40px;}

/* Corner HUD frames */
.hc{position:absolute;width:60px;height:60px;z-index:10;pointer-events:none;}
.hc-inner{position:absolute;inset:0;}
.hc-inner::before,.hc-inner::after,.hc-inner .arm3,.hc-inner .arm4{
content:’’;position:absolute;background:var(–g);box-shadow:0 0 8px var(–g);}
.hc-inner::before{width:2px;height:22px;}
.hc-inner::after{width:22px;height:2px;}
.hc-inner .arm3{width:2px;height:22px;}
.hc-inner .arm4{width:22px;height:2px;}

#hc-tl{top:0;left:0;}
#hc-tl .hc-inner::before{top:0;left:0;}
#hc-tl .hc-inner::after{top:0;left:0;}
#hc-tr{top:0;right:0;}
#hc-tr .hc-inner::before{top:0;right:0;}
#hc-tr .hc-inner::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;}
#hc-bl .hc-inner::before{bottom:0;left:0;}
#hc-bl .hc-inner::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}
#hc-br .hc-inner::before{bottom:0;right:0;}
#hc-br .hc-inner::after{bottom:0;right:0;}

/* Animated corner pulse */
.hc-pulse{position:absolute;inset:-4px;border:1px solid var(–g);opacity:0;
animation:cornerPulse 3s ease-out infinite;}
#hc-tl .hc-pulse{animation-delay:0s;}
#hc-tr .hc-pulse{animation-delay:.75s;}
#hc-bl .hc-pulse{animation-delay:1.5s;}
#hc-br .hc-pulse{animation-delay:2.25s;}

/* Crosshair */
#xhair{position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:28px;height:28px;margin:-14px;animation:xhairRotate 20s linear infinite;}
#xhair svg{width:100%;height:100%;}

/* Radar sweep (decorative) */
#radar{position:absolute;bottom:130px;right:16px;z-index:12;pointer-events:none;
width:70px;height:70px;opacity:0.6;}
#radar svg{width:100%;height:100%;}
.radar-sweep{animation:radarSweep 3s linear infinite;transform-origin:50% 50%;}
.radar-blip{animation:blipFade 3s ease-out infinite;}

/* ── Top Bar ── */
#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;
background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 100%);}
#sys-id{font-family:‘Orbitron’,sans-serif;font-size:13px;font-weight:900;
letter-spacing:.25em;color:var(–g);text-shadow:var(–glow);}
#sys-id span{font-weight:400;font-size:10px;opacity:.5;letter-spacing:.1em;}
#badges{display:flex;gap:5px;align-items:center;}
.badge{font-size:7.5px;letter-spacing:.12em;padding:3px 8px;
border:1px solid var(–border);background:var(–panel);color:var(–g2);
position:relative;overflow:hidden;}
.badge::before{content:’’;position:absolute;top:0;left:-100%;width:40%;height:100%;
background:linear-gradient(90deg,transparent,rgba(0,255,65,.1),transparent);
animation:badgeSweep 4s linear infinite;}
#b-fps{border-color:rgba(0,200,255,.3);color:var(–b);}
#b-fps::before{background:linear-gradient(90deg,transparent,rgba(0,200,255,.1),transparent);}
#b-threat{border-color:rgba(255,34,68,.3);color:var(–r);}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(–g);
display:inline-block;margin-right:4px;animation:dotBlink 1.5s ease-in-out infinite;
box-shadow:0 0 6px var(–g);}

/* ── Status bar (bottom of vp) ── */
#statusbar{position:absolute;bottom:0;left:0;right:0;z-index:14;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;
padding:6px 14px;
background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 100%);}
.sb-item{font-size:8px;color:var(–g2);letter-spacing:.12em;}
#sb-coords{color:rgba(0,255,65,.4);}
#sb-time{color:rgba(0,255,65,.4);}

/* ── Night / Mode buttons ── */
#ctrl-btns{position:absolute;top:42px;right:14px;z-index:20;
display:flex;flex-direction:column;gap:5px;}
.ctrl-btn{background:var(–panel);border:1px solid var(–border);
color:var(–g2);font-family:‘Share Tech Mono’,monospace;
font-size:8px;padding:5px 10px;cursor:pointer;letter-spacing:.1em;
transition:all .2s;text-align:center;}
.ctrl-btn:hover,.ctrl-btn.active{border-color:var(–g);color:var(–g);
box-shadow:0 0 12px rgba(0,255,65,.3);}

/* ── Alert flash ── */
#alert-flash{position:absolute;inset:0;z-index:13;pointer-events:none;
opacity:0;background:rgba(255,34,68,.04);animation:alertFlash 0s;}
#alert-flash.active{animation:alertFlash 1.5s ease-out forwards;}

/* ── Info Panel ── */
#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:linear-gradient(0deg,rgba(1,6,3,.99) 0%,rgba(1,10,4,.97) 100%);
border-top:1px solid var(–g);
padding:14px 16px 12px;transform:translateY(100%);
transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-panel::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(–g),var(–g2),var(–g),transparent);
animation:scanLine 3s linear infinite;}

#info-close{position:absolute;top:12px;right:14px;background:none;
border:1px solid rgba(0,255,65,.3);color:var(–g2);font-family:‘Share Tech Mono’,monospace;
font-size:8px;padding:4px 10px;cursor:pointer;letter-spacing:.15em;transition:all .2s;}
#info-close:hover{border-color:var(–g);color:var(–g);}

#info-header{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
#info-title{font-family:‘Orbitron’,sans-serif;font-size:14px;font-weight:700;
letter-spacing:.2em;color:var(–g);cursor:pointer;display:inline-block;
transition:text-shadow .3s;}
#info-title:hover{text-shadow:var(–glow);}
#info-title-sub{font-size:8px;color:var(–g2);opacity:.6;letter-spacing:.2em;}

#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:8.5px;
margin-bottom:8px;}
.ik{color:rgba(0,255,65,.5);letter-spacing:.12em;font-size:8px;}
.iv{color:var(–g);letter-spacing:.08em;}
.iv.warn{color:var(–o);}
.iv.alert{color:var(–r);}

#info-desc{font-size:8.5px;color:rgba(0,255,65,.55);line-height:1.7;
border-top:1px solid var(–border);padding-top:8px;}

#info-threat-bar{margin-top:8px;display:flex;align-items:center;gap:8px;}
#info-threat-label{font-size:7.5px;color:var(–g2);letter-spacing:.12em;}
#info-threat-track{flex:1;height:3px;background:var(–g3);position:relative;overflow:hidden;}
#info-threat-fill{height:100%;background:var(–g);width:0%;
transition:width .5s,background .3s;box-shadow:0 0 8px var(–g);}

/* ── Terminal ── */
#terminal{flex:0 0 auto;height:114px;background:var(–bg);
border-top:1px solid var(–border);padding:9px 14px;overflow:hidden;z-index:20;
position:relative;}
#terminal::before{content:‘SYSTEM LOG’;position:absolute;top:4px;right:12px;
font-size:7px;letter-spacing:.2em;color:rgba(0,255,65,.2);}
#term-lines{font-size:8.5px;line-height:1.75;}
.tl{opacity:0;animation:si .16s forwards;display:flex;align-items:baseline;gap:6px;}
.tl-ts{color:rgba(0,255,65,.3);font-size:7.5px;flex-shrink:0;}
.tl-txt{flex:1;}
.tok{color:var(–g);}.twarn{color:var(–o);}.talert{color:var(–r);}
.tinfo{color:var(–b);}.ttap{color:var(–y);}.tsys{color:var(–p);}

/* ═════════════════ KEYFRAMES ═════════════════ */
@keyframes eyePulse{
0%,100%{opacity:1;transform:scale(1);}
50%{opacity:.7;transform:scale(.95);}
}
@keyframes eyeScan{
from{stroke-dashoffset:0;}to{stroke-dashoffset:-120;}
}
@keyframes fi{to{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-6px);}to{opacity:.92;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 80px;}}
@keyframes scanLine{from{background-position:0 0;}to{background-position:200% 0;}}
@keyframes cornerPulse{
0%{opacity:.7;transform:scale(1);}
100%{opacity:0;transform:scale(1.8);}
}
@keyframes xhairRotate{
from{transform:rotate(0deg);}to{transform:rotate(360deg);}
}
@keyframes dotBlink{
0%,100%{opacity:1;box-shadow:0 0 6px var(–g);}
50%{opacity:.3;box-shadow:none;}
}
@keyframes badgeSweep{
0%{left:-100%;}100%{left:200%;}
}
@keyframes alertFlash{
0%{opacity:1;}50%{opacity:.6;}100%{opacity:0;}
}
@keyframes radarSweep{
from{transform:rotate(0deg);}to{transform:rotate(360deg);}
}
@keyframes blipFade{
0%,100%{opacity:0;r:2;}
30%,70%{opacity:1;r:3;}
}
@keyframes bootGlow{
0%,100%{opacity:1;}50%{opacity:.7;}
}
@keyframes lockOn{
0%{transform:scale(1.4);opacity:0;}
50%{opacity:1;}
100%{transform:scale(1);opacity:0;}
}
@keyframes glitchH{
0%,100%{clip-path:none;transform:translateX(0);}
92%{clip-path:none;transform:translateX(0);}
93%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);transform:translateX(-4px);}
94%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translateX(4px);}
95%{clip-path:none;transform:translateX(0);}
}
@keyframes threatPulse{
0%,100%{box-shadow:inset 0 0 0 0 rgba(255,34,68,0);}
50%{box-shadow:inset 0 0 40px 10px rgba(255,34,68,.08);}
}
@keyframes dataScroll{
from{transform:translateY(0);}to{transform:translateY(-50%);}
}
</style>

</head>

let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');
const CFG={FOCAL:950,CONF:0.11,MAX_DET:60,SMOOTH:0.22,TTL:38,IOU:0.22};
const OBJ_H={
  person:1.75,car:1.55,truck:2.9,bus:3.3,motorcycle:1.15,bicycle:1.05,
  'fire hydrant':0.65,'stop sign':0.8,'traffic light':0.45,dog:0.5,cat:0.3,

};

const COL={
  person:'#ffe600',car:'#ff2244',truck:'#ff4455',bus:'#ff6677',
  motorcycle:'#ff8800',bicycle:'#88ff88','cell phone':'#00aaff',
  backpack:'#ff00aa',dog:'#ffaa44',cat:'#88ffff',
  laptop:'#44aaff',tv:'#4488ff',_d:'#00ff41'
};
function getAlias(cls){return USER_MEM[cls]||DEFAULT_ALIASES[cls]||cls.toUpperCase();}
function getCol(c){return COL[c]||COL._d;}
function dist(bbox,cls){
  const rh=OBJ_H[cls]||OBJ_H.default;
  const px=Math.max(bbox[2],bbox[3]);
  return px<2?999:Math.min(999,+(CFG.FOCAL*rh/px).toFixed(1));
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function iou(a,b){
  const ix=Math.max(a[0],b[0]),iy=Math.max(a[1],b[1]);
  const iw=Math.min(a[0]+a[2],b[0]+b[2])-ix,ih=Math.min(a[1]+a[3],b[1]+b[3])-iy;
  if(iw<=0||ih<=0)return 0;
  return(iw*ih)/(a[2]*a[3]+b[2]*b[3]-iw*ih);
}

// ══════════════════════════════════════════════════
// TRACKER
// ══════════════════════════════════════════════════
class Tracker{
  constructor(){this.tracks={};this.nid=1;}
  update(preds){
    for(const k in this.tracks){
      this.tracks[k].age++;this.tracks[k].seen=false;
      if(this.tracks[k].age>CFG.TTL) delete this.tracks[k];
    }
    for(const p of preds){
      let best=null,bs=CFG.IOU;
      for(const id in this.tracks){
        const t=this.tracks[id];
        if(t.cls!==p.class)continue;
        const s=iou(t.sm,p.bbox);
        if(s>bs){bs=s;best=t;}
      }
      if(best){
        best.sm=best.sm.map((v,i)=>v+(p.bbox[i]-v)*CFG.SMOOTH);
        best.score=best.score+(p.score-best.score)*CFG.SMOOTH;
        best.age=0;best.seen=true;p._tid=best.id;
      }else{
        const id=this.nid++;
        this.tracks[id]={id,cls:p.class,sm:[...p.bbox],score:p.score,age:0,seen:true,born:Date.now()};
        p._tid=id;
      }
    }
    return Object.values(this.tracks).filter(t=>t.age<3);
  }
}

async function renderLoop(now){

  fpsCnt++;frameCount++;
  if(now-lastFpsT>1000){
    document.getElementById('b-fps').textContent=fpsCnt+' FPS';
    fpsCnt=0;lastFpsT=now;
  }
  if(video.readyState===4){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    const raw=await model.detect(video,CFG.MAX_DET,CFG.CONF);
    lastPred=tracker.update(raw);
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(edgeMode) drawEdgeEffect();
  draw();
  drawLockAnims();
  updateHUD();
  requestAnimationFrame(renderLoop);
}

// LOCK-ON ANIMATIONS
// ══════════════════════════════════════════════════
function addLockAnim(x,y,w,h,col){
  lockAnims.push({x,y,w,h,col,t:0,maxT:30});
}
function drawLockAnims(){
  lockAnims=lockAnims.filter(a=>{
    const prog=a.t/a.maxT;
    const alpha=(1-prog);
    const expand=prog*40;
    ctx.strokeStyle=hexA(a.col,alpha*.8);
    ctx.lineWidth=2;
    ctx.strokeRect(a.x-expand,a.y-expand,a.w+expand*2,a.h+expand*2);
    // Corner diamonds
    const cx=a.x+a.w/2,cy=a.y+a.h/2;
    const r=8+expand;
    ctx.beginPath();
    ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);
    ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);
    ctx.closePath();
    ctx.strokeStyle=hexA(a.col,alpha*.5);
    ctx.stroke();
    a.t++;
    return a.t<a.maxT;
  });
}

// ══════════════════════════════════════════════════
// MAIN DRAW
// ══════════════════════════════════════════════════
function draw(){
  const t=frameCount;
  const cX=canvas.width/2, cY=canvas.height*0.48;

  lastPred.forEach(p=>{
    const [x,y,w,h]=p.sm;
    const col=getCol(p.cls);
    const d=dist(p.sm,p.cls);
    const isSel=p.id===selTid;
    const name=getAlias(p.cls);
    const kb=getKB(p.cls);
    const isThreat=THREAT_SET.has(p.cls);
    const age=(Date.now()-p.born)/1000;

    // ── Perspective lines to vanishing point ──
    ctx.setLineDash([3,8]);
    ctx.lineWidth=.7;
    const corners=[[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
    corners.forEach(([cx2,cy2])=>{
      const grad=ctx.createLinearGradient(cX,cY,cx2,cy2);
      grad.addColorStop(0,hexA(col,0));
      grad.addColorStop(1,hexA(col,.25));
      ctx.strokeStyle=grad;
      ctx.beginPath();ctx.moveTo(cX,cY);ctx.lineTo(cx2,cy2);ctx.stroke();
    });
    ctx.setLineDash([]);

    // ── Main bounding box ──
    ctx.lineWidth=isSel?3:1.5;

    // Pulse effect for threats
    if(isThreat&&!isSel){
      const pulse=Math.sin(t*0.15)*0.3+0.7;
      ctx.strokeStyle=hexA(col,pulse);
    } else {
      ctx.strokeStyle=col;
    }
    ctx.strokeRect(x,y,w,h);

    // Fill
    ctx.fillStyle=hexA(col, isSel?0.18:(isThreat?0.06:0.03));
    ctx.fillRect(x,y,w,h);

    // ── Animated corner brackets ──
    const cs=Math.min(18,w*.22,h*.22);
    const animOffset=isSel?(Math.sin(t*0.1)*2):0;
    ctx.strokeStyle=col;
    ctx.lineWidth=isSel?3:2;
    ctx.shadowColor=col;ctx.shadowBlur=isSel?12:6;

    // TL
    ctx.beginPath();
    ctx.moveTo(x-animOffset,y+cs-animOffset);ctx.lineTo(x-animOffset,y-animOffset);ctx.lineTo(x+cs-animOffset,y-animOffset);
    ctx.stroke();
    // TR
    ctx.beginPath();
    ctx.moveTo(x+w-cs+animOffset,y-animOffset);ctx.lineTo(x+w+animOffset,y-animOffset);ctx.lineTo(x+w+animOffset,y+cs-animOffset);
    ctx.stroke();
    // BL
    ctx.beginPath();
    ctx.moveTo(x-animOffset,y+h-cs+animOffset);ctx.lineTo(x-animOffset,y+h+animOffset);ctx.lineTo(x+cs-animOffset,y+h+animOffset);
    ctx.stroke();
    // BR
    ctx.beginPath();
    ctx.moveTo(x+w-cs+animOffset,y+h+animOffset);ctx.lineTo(x+w+animOffset,y+h+animOffset);ctx.lineTo(x+w+animOffset,y+h-cs+animOffset);
    ctx.stroke();
    ctx.shadowBlur=0;

    // ── Scanning line (for selected) ──
    if(isSel){
      const scanY=y+(((t*2)%100)/100)*h;
      const scanGrad=ctx.createLinearGradient(x,scanY-8,x,scanY+8);
      scanGrad.addColorStop(0,hexA(col,0));
      scanGrad.addColorStop(.5,hexA(col,.5));
      scanGrad.addColorStop(1,hexA(col,0));
      ctx.fillStyle=scanGrad;
      ctx.fillRect(x,scanY-8,w,16);
    }

    // ── Target reticle (center dot) ──
    const objCX=x+w/2, objCY=y+h/2;
    ctx.strokeStyle=hexA(col,.5);
    ctx.lineWidth=1;
    const rl=8;
    ctx.beginPath();
    ctx.moveTo(objCX-rl,objCY);ctx.lineTo(objCX-3,objCY);
    ctx.moveTo(objCX+3,objCY);ctx.lineTo(objCX+rl,objCY);
    ctx.moveTo(objCX,objCY-rl);ctx.lineTo(objCX,objCY-3);
    ctx.moveTo(objCX,objCY+3);ctx.lineTo(objCX,objCY+rl);
    ctx.stroke();

    // ── Label background ──
    const labelY=y>28?y-4:y+h+16;
    const upward=y>28;
    const label1=`${name} #${p.id}`;
    const label2=`${d}m | ${Math.round(p.score*100)}%`;

    ctx.font="bold 11px 'Share Tech Mono'";
    const lw=Math.max(ctx.measureText(label1).width, ctx.measureText(label2).width)+10;

    ctx.fillStyle=hexA(col,.9);
    ctx.fillRect(x, upward?labelY-22:labelY-11, lw, 22);

    ctx.fillStyle='#000';
    ctx.font="bold 11px 'Share Tech Mono'";
    ctx.fillText(label1, x+4, upward?labelY-12:labelY-1);
    ctx.font="9px 'Share Tech Mono'";
    ctx.fillText(label2, x+4, upward?labelY-3:labelY+8);

    // ── Type badge (top-right of box) ──
    if(w>80){
      ctx.fillStyle=hexA(col,.15);
      ctx.fillRect(x+w-60, y+2, 58, 12);
      ctx.strokeStyle=hexA(col,.4);
      ctx.lineWidth=.5;
      ctx.strokeRect(x+w-60,y+2,58,12);
      ctx.fillStyle=col;
      ctx.font="7px 'Share Tech Mono'";
      ctx.fillText(kb.type, x+w-58, y+11);
    }

    // ── Distance arc ──
    if(d<30){
      const arcR=Math.min(w,h)*0.38;
      const arcProg=Math.max(0,1-d/30);
      ctx.strokeStyle=hexA(col,arcProg*0.4);
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.arc(objCX,objCY,arcR,Math.PI*1.5,Math.PI*1.5+Math.PI*2*arcProg);
      ctx.stroke();
    }
  });
}

// ══════════════════════════════════════════════════
// HUD UPDATE
// ══════════════════════════════════════════════════
function updateHUD(){
  const total=lastPred.length;
  document.getElementById('b-obj').textContent=total+' OBJ';

  const hasThreats=lastPred.some(p=>THREAT_SET.has(p.cls));
  const threatBadge=document.getElementById('b-threat');
  if(hasThreats!==threatActive){
    threatActive=hasThreats;
    threatBadge.style.display=hasThreats?'flex':'none';
    if(hasThreats){ triggerAlert(); log('УГРОЗА ОБНАРУЖЕНА','alert'); }
    else { log('УГРОЗЫ НЕ ОБНАРУЖЕНЫ','ok'); }
  }

  const statuses=['SCANNING','TRACKING','ANALYZING'];
  document.getElementById('sb-status').textContent=
    total>0?'TRACKING '+total:'SCANNING';

  lastPred.forEach(p=>{
    const d=dist(p.sm,p.cls);
    if(canLog(p.cls,p.id)){
      const type=THREAT_SET.has(p.cls)?'warn':'info';
      log(`${getAlias(p.cls)} #${p.id} → ${d}м | ${Math.round(p.score*100)}%`,type);
    }
  });
}

// ══════════════════════════════════════════════════
// TAP / CLICK HANDLER
// ══════════════════════════════════════════════════
canvas.addEventListener('click',handleTap);
function handleTap(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;

  const hit=lastPred.find(p=>{
    const [x,y,w,h]=p.sm;
    return cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h;
  });

  if(hit){
    selTid=hit.id;
    addLockAnim(hit.sm[0],hit.sm[1],hit.sm[2],hit.sm[3],getCol(hit.cls));
    const d=dist(hit.sm,hit.cls);
    const kb=getKB(hit.cls);
    const col=getCol(hit.cls);

    const titleEl=document.getElementById('info-title');
    titleEl.textContent=getAlias(hit.cls);
    titleEl.dataset.cls=hit.cls;
    titleEl.style.color=col;
    titleEl.style.textShadow=`0 0 16px ${col}`;

    const threat=Math.round(kb.threat*100);
    const threatFill=document.getElementById('info-threat-fill');
    const threatVal=document.getElementById('info-threat-val');
    threatFill.style.width=threat+'%';
    threatFill.style.background=threat>60?'var(--r)':threat>35?'var(--o)':'var(--g)';
    threatFill.style.boxShadow=`0 0 8px ${threat>60?'var(--r)':threat>35?'var(--o)':'var(--g)'}`;
    threatVal.textContent=threat+'%';

    const tagsHtml=kb.tags.map(t=>`<span style="border:1px solid ${col};color:${col};
      padding:1px 5px;font-size:7px;margin-right:3px;opacity:.7">${t}</span>`).join('');

    document.getElementById('info-grid').innerHTML=`
      <div class="ik">ID ТРЕКА</div><div class="iv">#${hit.id}</div>
      <div class="ik">КЛАСС</div><div class="iv">${hit.cls.toUpperCase()}</div>
      <div class="ik">ТИП</div><div class="iv">${kb.type}</div>
      <div class="ik">ПОДТИП</div><div class="iv" style="font-size:7.5px">${kb.subtype}</div>
      <div class="ik">ДИСТАНЦИЯ</div><div class="iv ${d<5?'alert':d<15?'warn':''}">${d}м</div>
      <div class="ik">УВЕРЕННОСТЬ</div><div class="iv">${Math.round(hit.score*100)}%</div>
      <div class="ik" style="grid-column:1/-1;margin-top:4px">${tagsHtml}</div>
    `;
    document.getElementById('info-desc').textContent=kb.desc;
    document.getElementById('info-panel').classList.add('open');
    log(`LOCK-ON: ${getAlias(hit.cls)} #${hit.id}`,'ok');
  }else{
    closeInfo();
  }
}

function closeInfo(){
  selTid=null;
  document.getElementById('info-panel').classList.remove('open');
}

// ══════════════════════════════════════════════════
// RENAME
// ══════════════════════════════════════════════════
function renameObject(){
  const titleEl=document.getElementById('info-title');
  const cls=titleEl.dataset.cls;
  const oldAlias=titleEl.textContent;
  const newAlias=prompt(`ПЕРЕИМЕНОВАТЬ "${cls.toUpperCase()}" →`,oldAlias);
  if(newAlias!==null&&newAlias.trim()!==''){
    USER_MEM[cls]=newAlias.trim().toUpperCase();
    localStorage.setItem('myeye_mem',JSON.stringify(USER_MEM));
    log('КЭШ ОБНОВЛЁН. ПЕРЕЗАГРУЗКА...','warn');
    setTimeout(()=>location.reload(),700);
  }
}
