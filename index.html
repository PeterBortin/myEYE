<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>myEYE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --g:#3dff6e;--g2:#28cc50;--g3:#0d4a1f;
  --y:#e8e000;--o:#d97700;--r:#cc1133;
  --bg:#030a04;--panel:rgba(3,10,4,.96);--bord:rgba(61,255,110,.16);
  --fm:'Share Tech Mono',monospace;--fh:'Orbitron',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;background:#000;overflow:hidden;
  font-family:var(--fm);color:var(--g);
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation
}

/* ─── BOOT ──────────────────────────────────────────── */
#boot{
position:fixed;inset:0;background:#000;z-index:400;
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:0 24px;
}
#boot-logo{
font-family:var(–fh);font-weight:900;
font-size:clamp(36px,10vw,64px);letter-spacing:.22em;
color:var(–g);text-shadow:0 0 24px var(–g),0 0 60px #002a10;
animation:glow 3s ease-in-out infinite;
}
#boot-sub{font-size:9px;letter-spacing:.5em;color:var(–g2);margin:4px 0 28px}
#boot-steps{width:min(360px,90vw)}
.step{
display:flex;align-items:center;gap:10px;
font-size:9.5px;color:var(–g2);line-height:1;
margin-bottom:11px;opacity:0;transition:opacity .15s;
}
.step.vis{opacity:1}
.step-name{min-width:170px;font-size:9px}
.step-bar-wrap{flex:1;height:2px;background:#0b1e0e}
.step-bar{height:100%;width:0;background:var(–g);box-shadow:0 0 6px var(–g);transition:width .42s linear}
.step-lbl{font-size:8px;min-width:26px;text-align:right;color:var(–g2)}
.step-lbl.ok{color:var(–g)}
#btn-start{
margin-top:24px;display:none;
background:none;border:1px solid var(–g);color:var(–g);
font-family:var(–fh);font-size:11px;letter-spacing:.28em;
padding:12px 40px;cursor:pointer;position:relative;overflow:hidden;transition:color .2s;
}
#btn-start::before{
content:’’;position:absolute;inset:0;background:var(–g);
transform:translateX(-101%);transition:transform .22s ease;z-index:0;
}
#btn-start span{position:relative;z-index:1}
#btn-start:hover::before,#btn-start:active::before{transform:translateX(0)}
#btn-start:hover,#btn-start:active{color:#000}

/* ─── APP ───────────────────────────────────────────── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000}

video{
position:absolute;inset:0;width:100%;height:100%;
object-fit:cover;z-index:1;
filter:brightness(.52) contrast(1.4) saturate(.8) sepia(.12) hue-rotate(10deg);
transition:filter .5s;
}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}

/* CRT scanlines */
#vp::after{
content:’’;position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(61,255,110,.011) 3px,rgba(61,255,110,.011) 4px);
animation:scan 14s linear infinite;
}
/* vignette */
#vp::before{
content:’’;position:absolute;inset:0;z-index:6;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.62) 100%);
}

/* ─── CORNERS ───────────────────────────────────────── */
.hc{position:absolute;width:50px;height:50px;z-index:10;pointer-events:none}
.hc::before,.hc::after{content:’’;position:absolute;background:var(–g);box-shadow:0 0 5px var(–g)}
.hc::before{width:2px;height:18px}.hc::after{width:18px;height:2px}
#hc-tl{top:0;left:0}   #hc-tl::before{top:0;left:0}   #hc-tl::after{top:0;left:0}
#hc-tr{top:0;right:0}  #hc-tr::before{top:0;right:0}  #hc-tr::after{top:0;right:0}
#hc-bl{bottom:0;left:0}#hc-bl::before{bottom:0;left:0}#hc-bl::after{bottom:0;left:0}
#hc-br{bottom:0;right:0}#hc-br::before{bottom:0;right:0}#hc-br::after{bottom:0;right:0}

/* crosshair */
#xh{
position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:28px;height:28px;margin:-14px;
}
#xh::before{content:’’;position:absolute;top:13px;left:0;width:28px;height:2px;background:rgba(61,255,110,.28)}
#xh::after {content:’’;position:absolute;left:13px;top:0;width:2px;height:28px;background:rgba(61,255,110,.28)}
#xh-ring{
position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:20px;height:20px;margin:-10px;
border:1px solid rgba(61,255,110,.2);border-radius:50%;
animation:ring 5s ease-out infinite;
}

/* ─── TOPBAR ─────────────────────────────────────────── */
#topbar{
position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;
padding:10px 14px;
background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);
}
#sys-id{
font-family:var(–fh);font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(–g);text-shadow:0 0 12px var(–g);
}
#badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{
font-size:8px;letter-spacing:.1em;padding:3px 8px;
border:1px solid var(–bord);background:var(–panel);color:var(–g2);
transition:all .3s;
}
.badge.on {border-color:var(–g);color:var(–g)}
.badge.thr{border-color:var(–r);color:var(–r);animation:blink .65s ease-in-out infinite}

/* ─── NIGHT BTN ─────────────────────────────────────── */
#btn-night{
position:absolute;top:10px;left:50%;transform:translateX(-50%);
z-index:20;background:var(–panel);border:1px solid var(–bord);
color:var(–g2);font-family:var(–fm);font-size:8px;
padding:5px 14px;cursor:pointer;letter-spacing:.12em;transition:all .2s;
}
#btn-night:hover,#btn-night:active,#btn-night.on{border-color:var(–g);color:var(–g)}

/* ─── STATBAR ─────────────────────────────────────── */
#statbar{
position:absolute;bottom:0;left:0;right:0;z-index:15;
display:flex;gap:1px;pointer-events:none;
}
.sc{
flex:1;padding:5px 3px;background:var(–panel);
border-top:1px solid var(–bord);
font-size:7px;letter-spacing:.06em;color:var(–g2);text-align:center;
}
.sc span{display:block;color:var(–g);font-size:10px;font-weight:bold;margin-top:1px}

/* ─── INFO PANEL ────────────────────────────────────── */
#info-panel{
position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(1,5,2,.97);border-top:2px solid var(–g);
padding:12px 16px 14px;max-height:52%;overflow-y:auto;
transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
pointer-events:none;
}
#info-panel.open{transform:translateY(0);pointer-events:all}
#info-close{
position:absolute;top:10px;right:14px;
background:none;border:1px solid var(–g2);color:var(–g2);
font-family:var(–fm);font-size:9px;padding:3px 10px;cursor:pointer;letter-spacing:.1em;
}
#info-close:hover{border-color:var(–r);color:var(–r)}
#info-title{
font-family:var(–fh);font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(–g);margin-bottom:8px;
display:inline-block;cursor:pointer;
border-bottom:1px dashed transparent;transition:.2s;
}
#info-title:hover{border-bottom-color:currentColor}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;font-size:9px;margin-bottom:8px}
.ik{color:var(–g2)}.iv{color:var(–g)}
.iv.plate{color:var(–y);font-size:12px;letter-spacing:.22em;font-weight:bold}
#info-desc{font-size:9px;color:var(–g2);line-height:1.65;border-top:1px solid var(–bord);padding-top:6px}

/* ─── TERMINAL ──────────────────────────────────────── */
#terminal{
flex:0 0 auto;height:102px;background:var(–bg);
border-top:1px solid var(–bord);padding:7px 14px;overflow:hidden;z-index:20;
}
#term-hdr{
font-family:var(–fh);font-size:7px;letter-spacing:.28em;
color:var(–g3);margin-bottom:5px;display:flex;align-items:center;gap:8px;
}
#term-hdr::before{content:’’;flex:1;height:1px;background:var(–g3)}
#term-lines{font-size:9px;line-height:1.75}
.tl{opacity:0;animation:si .17s forwards}
.tok{color:var(–g)}.twarn{color:var(–o)}.talert{color:var(–r)}.tinfo{color:var(–g2)}.ttap{color:var(–y)}

/* ─── KEYFRAMES ─────────────────────────────────────── */
@keyframes glow{
0%,100%{text-shadow:0 0 20px var(–g),0 0 40px #002a10}
50%{text-shadow:0 0 50px var(–g),0 0 100px #00aa44}
}
@keyframes scan{from{background-position:0 0}to{background-position:0 120px}}
@keyframes ring{
0%{box-shadow:0 0 0 0 rgba(61,255,110,.4)}
70%{box-shadow:0 0 0 55px rgba(61,255,110,0)}
100%{box-shadow:0 0 0 0 rgba(61,255,110,0)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes si{from{opacity:0;transform:translateX(-5px)}to{opacity:.92;transform:none}}
</style>

</head>

<script>
/* ══ CONFIG ══════════════════════════════════════════ */
const CFG={FOCAL:950,CONF:.12,MAX_DET:60,SMOOTH:.22,TTL:40,IOU:.20};

/* ══ ALIASES ═════════════════════════════════════════ */
const DEF={
  person:'СУБЪЕКТ',car:'АВТОМОБИЛЬ',truck:'ГРУЗОВИК',bus:'АВТОБУС',
  motorcycle:'МОТОЦИКЛ',bicycle:'ВЕЛОСИПЕД',
  'fire hydrant':'ГИДРАНТ','stop sign':'СТОП-ЗНАК','traffic light':'СВЕТОФОР',
  dog:'ПЁС',cat:'КОТ',bird:'ПТИЦА',horse:'ЛОШАДЬ',cow:'КРС',sheep:'ОВЦА',
  'cell phone':'ТЕРМИНАЛ',bottle:'ЁМКОСТЬ',backpack:'РЮКЗАК',
  chair:'КРЕСЛО',tv:'МОНИТОР',laptop:'ЛЕПТОП',
  mouse:'МАНИПУЛЯТОР',keyboard:'КЛАВИАТУРА',
  bench:'СКАМЬЯ','potted plant':'РАСТЕНИЕ',
  umbrella:'ЗОНТ',handbag:'СУМКА',suitcase:'ЧЕМОДАН',
  knife:'НЕЙТРАЛИЗАТОР',scissors:'НОЖНИЦЫ',
  cup:'КОНТЕЙНЕР',clock:'ЧАСЫ',book:'ДОКУМЕНТ',
  airplane:'ВОЗДУШНОЕ СУ',boat:'СУДНО',train:'ЛОКОМОТИВ',
  'dining table':'СТОЛ',bed:'КРОВАТЬ',refrigerator:'ХОЛОДИЛЬНИК',
  'wine glass':'БОКАЛ',fork:'ВИЛКА',spoon:'ЛОЖКА',
  'teddy bear':'МЕДВЕЖОНОК',remote:'ПУЛЬТ',vase:'ВАЗОН'
};
const MEM=JSON.parse(localStorage.getItem('myeye_mem')||'{}');
const getAlias=c=>MEM[c]||DEF[c]||c.toUpperCase();

const OBJ_H={
  person:1.75,car:1.55,truck:2.9,bus:3.3,motorcycle:1.15,bicycle:1.05,
  'fire hydrant':.65,'stop sign':.8,'traffic light':.45,
  dog:.5,cat:.3,horse:1.6,cow:1.4,'cell phone':.15,
  bottle:.28,backpack:.55,chair:.9,tv:.6,laptop:.35,
  airplane:4.5,boat:2.8,train:3.5,default:1.0
};
const THREAT=new Set(['person','car','truck','bus','motorcycle','knife']);
const VEHICLE=new Set(['car','truck','bus','motorcycle']);
const COLS={
  person:'#e8e000',car:'#ff2244',truck:'#ff3355',bus:'#ff4466',
  motorcycle:'#ff7700',bicycle:'#ffaa00',
  knife:'#ff0000','fire hydrant':'#00ffcc',
  'cell phone':'#99bbff',laptop:'#aabbff',
  bottle:'#88ff99',backpack:'#00ffcc',_d:'#3dff6e'
};
const getCol=c=>COLS[c]||COLS._d;
const DESCS={
  person:'Биологический объект. Классификация: ЖИВОЙ. Оценка траектории активна.',
  car:'Транспортное средство. Классификация: ГРАЖДАНСКОЕ. Угроза: НИЗКАЯ.',
  truck:'Тяжёлая техника. Зона повышенной опасности. Дистанция критична.',
  bus:'ТС повышенной вместимости. Мониторинг пассажиропотока.',
  motorcycle:'Двухколёсное ТС. Высокая манёвренность. Угроза: СРЕДНЯЯ.',
  knife:'⚠ ОПАСНЫЙ ПРЕДМЕТ. Протокол безопасности АКТИВИРОВАН.',
  'cell phone':'Мобильный терминал связи. Сигнал: АКТИВЕН.',
  backpack:'Внешний модуль хранения. Содержимое: НЕИЗВЕСТНО.',
  dog:'Биологический объект. Класс: ЖИВОТНОЕ. Угроза: ПОТЕНЦИАЛЬНАЯ.',
  airplane:'Воздушное судно. Курс: ОПРЕДЕЛЯЕТСЯ.',_d:'Объект идентифицирован. Данные в кэше.'
};
const getDesc=c=>DESCS[c]||DESCS._d;

/* ══ UTILS ═══════════════════════════════════════════ */
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function eDist(bb,cls){
  const rh=OBJ_H[cls]||OBJ_H.default,px=Math.max(bb[2],bb[3]);
  return px<2?999:Math.min(999,parseFloat((CFG.FOCAL*rh/px).toFixed(1)));
}
function iou(a,b){
  const ix=Math.max(a[0],b[0]),iy=Math.max(a[1],b[1]);
  const iw=Math.min(a[0]+a[2],b[0]+b[2])-ix,ih=Math.min(a[1]+a[3],b[1]+b[3])-iy;
  if(iw<=0||ih<=0)return 0;
  return(iw*ih)/(a[2]*a[3]+b[2]*b[3]-iw*ih);
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ══ TRACKER ═════════════════════════════════════════ */
class Tracker{
  constructor(){this.t={};this.n=1}
  update(preds){
    for(const id in this.t){this.t[id].age++;if(this.t[id].age>CFG.TTL)delete this.t[id]}
    for(const p of preds){
      let best=null,bs=CFG.IOU;
      for(const id in this.t){
        const t=this.t[id];if(t.cls!==p.class)continue;
        const s=iou(t.sm,p.bbox);if(s>bs){bs=s;best=t}
      }
      if(best){
        best.sm=best.sm.map((v,i)=>v+(p.bbox[i]-v)*CFG.SMOOTH);
        best.score+=( p.score-best.score)*CFG.SMOOTH;
        best.age=0;p._tid=best.id;
      }else{
        const id=this.n++;
        this.t[id]={id,cls:p.class,sm:[...p.bbox],score:p.score,age:0,plate:undefined};
        p._tid=id;
      }
    }
    return Object.values(this.t).filter(t=>t.age<3);
  }
}

/* ══ OCR ═════════════════════════════════════════════ */
let ocrW=null,ocrBusy=false,ocrReady=false;

async function initOCR(){
  if(ocrW)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  ocrW=await Tesseract.createWorker('eng',1,{
    workerPath:'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/worker.min.js',
    corePath:'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.0.0/tesseract-core-simd-lstm.wasm.js'
  });
  await ocrW.setParameters({
    tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
    tessedit_pageseg_mode:'7'
  });
  ocrReady=true;
  log('OCR: ГОТОВ К РАБОТЕ','tok');
}

async function tryPlate(track){
  if(!ocrReady||ocrBusy)return;
  if(!VEHICLE.has(track.cls))return;
  if(track.plate!==undefined)return;
  const[x,y,w,h]=track.sm;
  if(w<60||h<40)return;
  const ox=document.createElement('canvas');
  const pw=Math.round(w*.75),ph=Math.round(h*.28);
  const px=Math.round(x+w*.12),py=Math.round(y+h*.65);
  ox.width=pw*2.5;ox.height=ph*2.5;
  const oc=ox.getContext('2d');
  oc.filter='contrast(2.8) brightness(1.4) grayscale(1)';
  oc.drawImage(video,px,py,pw,ph,0,0,ox.width,ox.height);
  ocrBusy=true;
  try{
    const{data:{text,confidence}}=await ocrW.recognize(ox);
    const clean=text.replace(/[^A-Z0-9]/g,'').trim();
    track.plate=(clean.length>=4&&confidence>28)?clean:'';
    if(track.plate)log(`НОМЕР: ${track.plate} (${Math.round(confidence)}%)','twarn`);
  }catch(_){track.plate=''}
  ocrBusy=false;
}

/* ══ BOOT ════════════════════════════════════════════ */

  showStep('s1');fillStep('sb1',20,'sl1','...');
  model=await cocoSsd.load({base:'lite_mobilenet_v2'});
  fillStep('sb1',100,'sl1','ОК');
  showStep('s2');fillStep('sb2',20,'sl2','...');
  initOCR()
    .then(()=>fillStep('sb2',100,'sl2','ОК'))
    .catch(()=>fillStep('sb2',100,'sl2','ERR'));
  await sleep(60);
  showStep('s3');fillStep('sb3',100,'sl3','ОК');
  document.getElementById('btn-start').style.display='block';
})();

/* ══ CAMERA ══════════════════════════════════════════ */
async function initCamera(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
    });
    video.srcObject=s;
    video.onloadedmetadata=()=>{
      video.play();
      document.getElementById('boot').style.display='none';
      document.getElementById('app').style.display='flex';
      running=true;
      log('VISION OS v5.0 — ОНЛАЙН','tok');
      requestAnimationFrame(loop);
    };
  }catch(e){log('КАМЕРА НЕДОСТУПНА','talert')}
}

/* ══ TERMINAL ════════════════════════════════════════ */
function log(txt,type='tok'){
  tq.push({txt,type});if(tq.length>5)tq.shift();
  const el=document.getElementById('term-lines');
  el.innerHTML='';
  tq.forEach(q=>{
    const d=document.createElement('div');
    d.className='tl '+q.type;d.textContent='> '+q.txt;
    el.appendChild(d);
  });
}
function canLog(cls,id){
  const k=cls+id,now=Date.now();
  if(!logT[k]||now-logT[k]>9000){logT[k]=now;return true}
  return false;
}

/* ══ NIGHT ═══════════════════════════════════════════ */
function toggleNight(){
  night=!night;
  video.style.filter=night
    ?'brightness(.32) contrast(2.5) saturate(0) sepia(1) hue-rotate(78deg)'
    :'brightness(.52) contrast(1.4) saturate(.8) sepia(.12) hue-rotate(10deg)';
  document.getElementById('btn-night').classList.toggle('on',night);
  log('НОЧНОЙ РЕЖИМ: '+(night?'ВКЛ':'ВЫКЛ'),night?'twarn':'tok');
}

/* ══ LOOP ════════════════════════════════════════════ */
async function loop(now){
  if(!running){requestAnimationFrame(loop);return}
  fpsCnt++;
  if(now-lastFpsT>1000){
    document.getElementById('b-fps').textContent=fpsCnt+' FPS';
    fpsCnt=0;lastFpsT=now;
  }
  if(video.readyState===4){
    if(frame%2===0){
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      const raw=await model.detect(video,CFG.MAX_DET,CFG.CONF);
      lastPred=tracker.update(raw);
      if(ocrReady&&!ocrBusy){
        const v=lastPred.find(p=>VEHICLE.has(p.cls)&&tracker.t[p._tid||p.id]?.plate===undefined&&p.score>.5);
        if(v){const tr=tracker.t[v._tid||v.id];if(tr)tryPlate(tr)}
      }
    }
    frame++;
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawLine();
  drawBoxes(now);
  updateHUD();
  requestAnimationFrame(loop);
}

/* ══ DRAW: SCAN LINE ═════════════════════════════════ */
function drawLine(){
  const W=canvas.width,H=canvas.height;
  const y=H*.5+Math.sin(Date.now()*.0017)*4;
  ctx.strokeStyle='rgba(61,255,110,.18)';ctx.lineWidth=1.2;
  ctx.setLineDash([6,10]);
  ctx.beginPath();ctx.moveTo(W*.04,y);ctx.lineTo(W*.96,y);ctx.stroke();
  ctx.setLineDash([]);
}

/* ══ DRAW: BOXES ═════════════════════════════════════ */
function drawBoxes(now){
  const W=canvas.width,H=canvas.height,cX=W/2,cY=H*.5;
  lastPred.forEach(p=>{
    const[x,y,w,h]=p.sm;
    const c=getCol(p.cls),isSel=p.id===selTid||p._tid===selTid;
    const d=eDist(p.sm,p.cls),name=getAlias(p.cls);
    const tid=p._tid||p.id;
    const track=tracker.t[tid];
    const plate=track?.plate||null;

    /* perspective lines */
    ctx.setLineDash([3,8]);ctx.strokeStyle=rgba(c,.16);ctx.lineWidth=.8;
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([px,py])=>{
      ctx.beginPath();ctx.moveTo(cX,cY);ctx.lineTo(px,py);ctx.stroke();
    });
    ctx.setLineDash([]);

    /* fill */
    ctx.fillStyle=rgba(c,isSel?.12:.03);
    ctx.fillRect(x,y,w,h);

    /* animated dashed border */
    const off=(now/38)%18;
    ctx.strokeStyle=rgba(c,isSel?1:.78);ctx.lineWidth=isSel?2.5:1.5;
    ctx.setLineDash([5,4]);ctx.lineDashOffset=-off;
    ctx.strokeRect(x,y,w,h);
    ctx.setLineDash([]);ctx.lineDashOffset=0;

    /* corner brackets + glow */
    const cs=Math.min(18,w*.22,h*.22);
    ctx.strokeStyle=c;ctx.lineWidth=isSel?3:2.2;
    ctx.shadowColor=c;ctx.shadowBlur=isSel?14:6;
    ctx.beginPath();
    ctx.moveTo(x,y+cs);ctx.lineTo(x,y);ctx.lineTo(x+cs,y);
    ctx.moveTo(x+w-cs,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+cs);
    ctx.moveTo(x,y+h-cs);ctx.lineTo(x,y+h);ctx.lineTo(x+cs,y+h);
    ctx.moveTo(x+w-cs,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w,y+h-cs);
    ctx.stroke();ctx.shadowBlur=0;

    /* threat pulse ring */
    if(THREAT.has(p.cls)&&d<8){
      const pulse=.3+.3*Math.sin(now/170);
      ctx.strokeStyle=`rgba(204,17,51,${pulse})`;ctx.lineWidth=2;
      ctx.strokeRect(x-5,y-5,w+10,h+10);
    }

    /* ── LABEL (large font) ── */
    const hasPlate=plate&&plate.length>0;
    const lblH=hasPlate?56:38;
    const lblW=Math.max(140,w*.85);
    ctx.fillStyle='rgba(0,0,0,.9)';
    ctx.fillRect(x,y-lblH,lblW,lblH);
    /* accent left bar */
    ctx.fillStyle=c;ctx.fillRect(x,y-lblH,2,lblH);

    /* class name */
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=7;
    ctx.font=`bold 15px 'Share Tech Mono'`;
    ctx.fillText(`${name} #${tid}`,x+7,y-lblH+17);
    ctx.shadowBlur=0;

    /* dist + conf */
    ctx.fillStyle=rgba(c,.7);ctx.font=`10px 'Share Tech Mono'`;
    ctx.fillText(`${d}м | ${Math.round(p.score*100)}%`,x+7,y-lblH+31);

    /* plate */
    if(hasPlate){
      const flash=Math.sin(now/260)>.0;
      ctx.fillStyle=flash?'#e8e000':'#a8a000';
      ctx.shadowColor='#e8e000';ctx.shadowBlur=flash?9:3;
      ctx.font=`bold 13px 'Orbitron'`;
      ctx.fillText(plate,x+7,y-lblH+49);
      ctx.shadowBlur=0;
    }else if(VEHICLE.has(p.cls)&&ocrReady&&track?.plate===undefined){
      const dots='.'.repeat(1+Math.floor(now/380)%3);
      ctx.fillStyle='rgba(200,140,0,.5)';ctx.font=`9px 'Share Tech Mono'`;
      ctx.fillText('OCR'+dots,x+7,y-5);
    }
  });
}

/* ══ HUD ═════════════════════════════════════════════ */
function updateHUD(){
  const total=lastPred.length;
  document.getElementById('b-obj').textContent=total+' OBJ';
  let thr=0,maxD=0,sumC=0;
  lastPred.forEach(p=>{
    const d=eDist(p.sm,p.cls);sumC+=p.score;
    if(d>maxD&&d<999)maxD=d;
    if(THREAT.has(p.cls))thr++;
    if(canLog(p.cls,p._tid||p.id))
      log(`${getAlias(p.cls)} #${p._tid||p.id} — ${d}м${THREAT.has(p.cls)?' ⚠':''}`,THREAT.has(p.cls)?'twarn':'tinfo');
  });
  document.getElementById('s-thr').textContent=thr;
  document.getElementById('s-conf').textContent=total?Math.round(sumC/total*100)+'%':'---';
  document.getElementById('s-dist').textContent=maxD?Math.round(maxD)+'м':'---';
  document.getElementById('s-trk').textContent=Object.keys(tracker.t).length;
  const bm=document.getElementById('b-mode');
  bm.textContent=thr?'⚠ УГРОЗА':'СКАН';
  bm.className='badge '+(thr?'thr':'');
}

/* ══ TAP ═════════════════════════════════════════════ */
canvas.addEventListener('click',tap);
canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.changedTouches[0])tap(e.changedTouches[0])},{passive:false});

function tap(e){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  const cx=(e.clientX-r.left)*sx,cy=(e.clientY-r.top)*sy;
  const hit=lastPred.find(p=>{const[x,y,w,h]=p.sm;return cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h});
  if(hit){
    const tid=hit._tid||hit.id;
    selTid=tid;
    const d=eDist(hit.sm,hit.cls),c=getCol(hit.cls);
    const track=tracker.t[tid];
    const plate=track?.plate;
    const titleEl=document.getElementById('info-title');
    titleEl.textContent=getAlias(hit.cls);titleEl.dataset.cls=hit.cls;titleEl.style.color=c;
    const plateRow=plate
      ?`<div class="ik">НОМЕР</div><div class="iv plate">${plate}</div>`
      :VEHICLE.has(hit.cls)?`<div class="ik">НОМЕР</div><div class="iv">СКАНИРОВАНИЕ...</div>`:'';
    document.getElementById('info-grid').innerHTML=`
      <div class="ik">ID ТРЕКА</div><div class="iv">#${tid}</div>
      <div class="ik">КЛАСС</div><div class="iv">${hit.cls.toUpperCase()}</div>
      <div class="ik">ДИСТАНЦИЯ</div><div class="iv">${d}м</div>
      <div class="ik">УВЕРЕН.</div><div class="iv">${Math.round(hit.score*100)}%</div>
      <div class="ik">УГРОЗА</div><div class="iv">${THREAT.has(hit.cls)?'⚠ ДА':'НЕТ'}</div>
      ${plateRow}`;
    document.getElementById('info-desc').textContent=getDesc(hit.cls);
    document.getElementById('info-panel').classList.add('open');
    log(`ОТЧЁТ #${tid} — ТАП ПО ИМЕНИ = ПЕРЕИМЕНОВАНИЕ`,'ttap');
  }else closeInfo();
}

function closeInfo(){selTid=null;document.getElementById('info-panel').classList.remove('open')}

function renameObject(){
  const el=document.getElementById('info-title'),cls=el.dataset.cls;if(!cls)return;
  const nw=prompt(`ПЕРЕИМЕНОВАТЬ "${cls.toUpperCase()}" В:`,el.textContent);
  if(nw&&nw.trim()){
    MEM[cls]=nw.trim().toUpperCase();
    localStorage.setItem('myeye_mem',JSON.stringify(MEM));
    el.textContent=nw.trim().toUpperCase();
    log('ПСЕВДОНИМ: '+nw.trim().toUpperCase(),'twarn');
  }
}
