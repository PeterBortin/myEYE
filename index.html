<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE v4.0 PRO | FUSION CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g),0 0 60px #004400;animation:gpulse 2s ease-in-out infinite;}
#boot-sub{font-size:9px;letter-spacing:.45em;color:var(--g2);margin:6px 0 32px;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(--g2);min-height:115px;line-height:1.9;}
#boot-log .bl{opacity:0;animation:fi .22s forwards;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px;
letter-spacing:.3em;padding:13px 42px;cursor:pointer;transition:all .2s;}
#btn-start:hover,#btn-start:active{background:var(--g);color:#000;box-shadow:0 0 20px var(--g);}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.65) contrast(1.2) saturate(1.1);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(0,255,65,.016) 3px,rgba(0,255,65,.016) 4px);
animation:scanroll 10s linear infinite;}

.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 5px var(--g);}
.hc::before{width:2px;height:20px;}.hc::after{width:20px;height:2px;}
#hc-tl{top:0;left:0;}#hc-tl::before{top:0;left:0;}#hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}#hc-tr::before{top:0;right:0;}#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;}#hc-bl::before{bottom:0;left:0;}#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(--g);text-shadow:0 0 12px var(--g);}
#badges{display:flex;gap:5px;}
.badge{font-size:8px;letter-spacing:.12em;padding:3px 8px;
border:1px solid var(--border);background:var(--panel);color:var(--g2);}
.badge.hi{border-color:var(--g);color:var(--g);}
.badge.warn{border-color:var(--y);color:var(--y);}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(2,8,4,.98);border-top:3px solid var(--g);
padding:18px 20px;transform:translateY(100%);
transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1);pointer-events:none;
box-shadow: 0 -20px 50px rgba(0,0,0,0.9);}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-close{position:absolute;top:15px;right:20px;background:none;
border:1px solid var(--g);color:var(--g);font-family:'Share Tech Mono',monospace;
font-size:10px;padding:5px 12px;cursor:pointer;letter-spacing:.1em;}
#info-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
letter-spacing:.15em;color:var(--r);margin-bottom:12px;display:inline-block;
text-transform:uppercase;text-shadow: 0 0 10px rgba(255,0,0,0.3);}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:10px;
border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px;}
.ik{color:var(--g2);text-transform:uppercase;}.iv{color:var(--g);font-weight:bold;}
#info-desc{font-size:11px;color:var(--g);line-height:1.6;letter-spacing:0.02em;}
.desc-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--g3);display:flex;flex-direction:column;gap:4px;}

#terminal{flex:0 0 auto;height:120px;background:var(--bg);
border-top:1px solid var(--border);padding:7px 14px;overflow:hidden;z-index:20;}
#term-hdr{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:.28em;
color:var(--g3);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
#term-hdr::before{content:'';flex:1;height:1px;background:var(--g3);}
#term-lines{font-size:9px;line-height:1.72;}
.tl{opacity:0;animation:si .18s forwards;}
.tok{color:var(--o);}.tinfo{color:var(--b);}.tplate{color:var(--b);font-weight:bold;}

@keyframes gpulse{0%,100%{text-shadow:0 0 20px var(--g),0 0 40px #003300;}
50%{text-shadow:0 0 45px var(--g),0 0 90px #00aa44;}}
@keyframes fi{to{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-5px);}to{opacity:.93;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 120px;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-sub">FUSION NEURAL CORE // v4.0 PRO</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">open system</button>
</div>

<div id="app" style="display:none;">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    
    <div id="topbar">
      <div id="sys-id">myEYE PRO</div>
      <div id="badges">
        <div class="badge hi" id="b-core">CORE: FUSION_HD</div>
        <div class="badge hi" id="b-fps">-- FPS</div>
        <div class="badge hi" id="b-obj">0 OBJ</div>
        <div class="badge warn" id="b-mode">ANPR_ACTIVE</div>
      </div>
    </div>

    <div id="info-panel">
      <button id="info-close" onclick="closeInfo()">✕ CLOSE</button>
      <div id="info-title">---</div>
      <div id="info-grid"></div>
      <div id="info-desc"></div>
    </div>
  </div>

  <div id="terminal">
    <div id="term-hdr"><span>NEURAL_FEED // SYSTEM_ACTIVE</span></div>
    <div id="term-lines"></div>
  </div>
</div>

<script>
const DEFAULT_ALIASES = {
  person: 'СУБЪЕКТ', car: 'АВТОМОБИЛЬ', truck: 'ГРУЗОВИК', bus: 'АВТОБУС',
  motorcycle: 'МОТОЦИКЛ', bicycle: 'ВЕЛОСИПЕД', dog: 'ПЕС', cat: 'КОТ',
  'cell phone': 'ТЕРМИНАЛ', bottle: 'ЕМКОСТЬ', backpack: 'РЮКЗАК'
};

const CFG={ FOCAL:950, CONF:0.18, MAX_DET:15, SMOOTH:0.12, TTL:45 };
const OBJ_H={ person:1.75, car:1.5, truck:2.8, bus:3.2, default:1.0 };
const THREAT=new Set(['person','car','truck','bus']);

function generateUAPlate() {
  const regions = ['KA', 'AA', 'BC', 'BH', 'AI', 'AE', 'BT', 'BK'];
  const chars = 'ABCEHIKMOPTX';
  const r = (n) => Math.floor(Math.random() * n);
  return `${regions[r(regions.length)]} ${r(10)}${r(10)}${r(10)}${r(10)} ${chars[r(12)]}${chars[r(12)]}`;
}

class Tracker {
  constructor() { this.tracks = {}; this.nid = 1; }
  update(preds) {
    const now = Date.now();
    for (const k in this.tracks) {
      this.tracks[k].age++;
      if (this.tracks[k].age > CFG.TTL) delete this.tracks[k];
    }
    preds.forEach(p => {
      let best = null, maxIou = 0.25;
      for (const id in this.tracks) {
        if (this.tracks[id].cls !== p.class) continue;
        const s = this.getIou(this.tracks[id].sm, p.bbox);
        if (s > maxIou) { maxIou = s; best = this.tracks[id]; }
      }
      if (best) {
        // Ультра-плавная интерполяция
        best.sm = best.sm.map((v, i) => v + (p.bbox[i] - v) * CFG.SMOOTH);
        best.score = p.score; best.age = 0;
        p._tid = best.id; p._plate = best.plate;
      } else {
        const id = this.nid++;
        const plate = (p.class === 'car' || p.class === 'truck') ? generateUAPlate() : null;
        this.tracks[id] = { id, cls: p.class, sm: [...p.bbox], score: p.score, age: 0, plate, tStart: now };
        p._tid = id; p._plate = plate;
      }
    });
    return Object.values(this.tracks).filter(t => t.age < 2);
  }
  getIou(a, b) {
    const ix = Math.max(a[0], b[0]), iy = Math.max(a[1], b[1]);
    const iw = Math.min(a[0] + a[2], b[0] + b[2]) - ix, ih = Math.min(a[1] + a[3], b[1] + b[3]) - iy;
    if (iw <= 0 || ih <= 0) return 0;
    return (iw * ih) / (a[2] * a[3] + b[2] * b[3] - iw * ih);
  }
}

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const termEl = document.getElementById('term-lines');
let model = null, running = false, lastPred = [], lastFpsT = 0, fpsCnt = 0;
let termQ = [], logThr = {}, selTid = null;
const tracker = new Tracker();

async function bootSeq() {
  const bootLog = document.getElementById('boot-log');
  const pbEl = document.getElementById('pb');
  const steps = ["INITIALIZING FUSION CORE...", "LIFTING NEURAL WEIGHTS...", "SYNCING ANPR_UA MODULE...", "OPTIMIZING INTERPOLATION...", "LINK ESTABLISHED"];
  for (let i = 0; i < steps.length; i++) {
    await new Promise(r => setTimeout(r, 250));
    const d = document.createElement('div'); d.className = 'bl'; d.textContent = '> ' + steps[i];
    bootLog.appendChild(d); pbEl.style.width = ((i + 1) / steps.length * 100) + '%';
  }
  model = await cocoSsd.load({ base: 'mobilenet_v2' });
  document.getElementById('btn-start').style.display = 'block';
}

async function initCamera() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
    video.srcObject = s;
    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('boot').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      running = true;
      log("NEURAL FEED ENCRYPTED", 'tinfo');
      requestAnimationFrame(renderLoop);
    };
  } catch (e) { log("HARDWARE_FAILURE", 'tinfo'); }
}

function log(txt, type = 'tok') {
  termQ.push({ txt, type }); if (termQ.length > 5) termQ.shift();
  termEl.innerHTML = '';
  termQ.forEach(q => {
    const d = document.createElement('div'); d.className = 'tl ' + q.type; d.textContent = '> ' + q.txt;
    termEl.appendChild(d);
  });
}

async function renderLoop(now) {
  if (!running) return requestAnimationFrame(renderLoop);
  fpsCnt++;
  if (now - lastFpsT > 1000) { document.getElementById('b-fps').textContent = fpsCnt + ' FPS'; fpsCnt = 0; lastFpsT = now; }
  if (video.readyState === 4) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const raw = await model.detect(video, CFG.MAX_DET, CFG.CONF);
    lastPred = tracker.update(raw);
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  draw();
  updateHUD();
  requestAnimationFrame(renderLoop);
}

function draw() {
  lastPred.forEach(p => {
    const [x, y, w, h] = p.sm;
    const isSel = p.id === selTid;
    const col = isSel ? '#ff2244' : '#00ff41';
    
    // Сетка объекта (внутренняя)
    ctx.strokeStyle = `rgba(0, 255, 65, 0.1)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y+h);
    ctx.moveTo(x, y + h/2); ctx.lineTo(x+w, y + h/2);
    ctx.stroke();

    // Основная рамка
    ctx.strokeStyle = col; ctx.lineWidth = isSel ? 3 : 1.5;
    ctx.strokeRect(x, y, w, h);

    // Угловые захваты
    const s = Math.min(w, h) * 0.2;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x, y+s); ctx.lineTo(x, y); ctx.lineTo(x+s, y);
    ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
    ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
    ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
    ctx.stroke();

    // Заголовок (увеличен)
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    const title = (DEFAULT_ALIASES[p.cls] || p.cls).toUpperCase();
    const tag = `#${p.id}`;
    ctx.font = "bold 15px 'Orbitron'";
    const tw = ctx.measureText(title).width;
    ctx.fillRect(x, y-30, tw + 60, 30);
    ctx.fillStyle = col;
    ctx.fillText(title, x+8, y-9);
    ctx.font = "11px 'Share Tech Mono'";
    ctx.fillStyle = '#fff';
    ctx.fillText(tag, x + tw + 15, y-10);

    // Номерной знак
    if (p.plate) {
      ctx.fillStyle = col;
      ctx.fillRect(x, y+h, 120, 18);
      ctx.fillStyle = '#000';
      ctx.font = "bold 12px 'Orbitron'";
      ctx.fillText(p.plate, x+5, y+h+14);
    }
  });
}

function updateHUD() {
  document.getElementById('b-obj').textContent = lastPred.length + ' OBJ';
  lastPred.forEach(p => {
    const key = p.cls + p.id;
    if (!logThr[key] || Date.now() - logThr[key] > 10000) {
      log(`${DEFAULT_ALIASES[p.cls] || p.cls.toUpperCase()} ACQUIRED`);
      if (p.plate) log(`PLATE DETECTED: ${p.plate}`, 'tplate');
      logThr[key] = Date.now();
    }
  });
}

function handleTap(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * sx, cy = (e.clientY - rect.top) * sy;
  const hit = lastPred.find(p => { const [x,y,w,h]=p.sm; return cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h; });

  if (hit) {
    selTid = hit.id;
    const dist = +(CFG.FOCAL * (OBJ_H[hit.cls] || OBJ_H.default) / Math.max(hit.sm[2], hit.sm[3])).toFixed(1);
    const lifeTime = Math.floor((Date.now() - hit.tStart)/1000);
    
    document.getElementById('info-title').textContent = DEFAULT_ALIASES[hit.cls] || hit.cls.toUpperCase();
    document.getElementById('info-grid').innerHTML = `
      <div class="ik">TARGET_INDEX</div><div class="iv">#00${hit.id}</div>
      <div class="ik">EST_DISTANCE</div><div class="iv">${dist} m</div>
      <div class="ik">AI_CONFIDENCE</div><div class="iv">${Math.round(hit.score*100)}%</div>
      <div class="ik">TRACK_TIME</div><div class="iv">${lifeTime}s</div>
      <div class="ik">ANPR_TAG</div><div class="iv" style="color:var(--y)">${hit.plate || 'NO_DATA'}</div>
      <div class="ik">THREAT_LVL</div><div class="iv" style="color:${THREAT.has(hit.cls)?'var(--r)':'var(--g)'}">${THREAT.has(hit.cls)?'HIGH':'LOW'}</div>
    `;
    
    document.getElementById('info-desc').innerHTML = `
      <span>Анализ объекта завершен. Визуальные характеристики соответствуют классу <b>${hit.cls.toUpperCase()}</b>.</span>
      <div class="desc-section">
        <span class="iv">> ПРОВЕРКА ПО БАЗЕ: ЧИСТО</span>
        <span class="iv">> ПОВЕДЕНИЕ: СТАБИЛЬНОЕ</span>
        <span class="iv">> ИДЕНТИФИКАТОР: ${hit.plate || 'ОТСУТСТВУЕТ'}</span>
      </div>
    `;
    document.getElementById('info-panel').classList.add('open');
  } else { closeInfo(); }
}

canvas.addEventListener('click', handleTap);
function closeInfo() { selTid = null; document.getElementById('info-panel').classList.remove('open'); }
bootSeq();
</script>
</body>
</html>
