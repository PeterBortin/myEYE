<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильтр цифрового зрения</title>
    <style>
        /* Mobile-first стили */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Скрыть прокрутку */
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #camera-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-feed {
            /* Скрыть оригинальное видео, оно нужно только для захвата кадров */
            display: none;
        }

        #output-canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        #permission-button {
            background-color: #33ff33; /* Ярко-зеленый для запроса */
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            z-index: 10;
        }

        /* Визуализация CRT-сетки (image_4, image_5) */
        #output-canvas::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <button id="permission-button">Разрешить доступ к камере</button>

    <div id="camera-container">
        <video id="video-feed" playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const button = document.getElementById('permission-button');

        button.addEventListener('click', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                const constraints = {
                    video: {
                        facingMode: 'user', // Использовать фронтальную камеру для селфи (как в image_0)
                        width: { ideal: 640 }, // Оптимальное разрешение для производительности фильтра
                        height: { ideal: 480 }
                    },
                    audio: false
                };

                navigator.mediaDevices.getUserMedia(constraints)
                    .then(stream => {
                        video.srcObject = stream;
                        video.play();
                        button.style.display = 'none'; // Скрыть кнопку после разрешения
                        requestAnimationFrame(processVideoFrame);
                    })
                    .catch(error => {
                        console.error("Ошибка доступа к камере: ", error);
                        alert('Доступ к камере отклонен. Включите доступ в настройках браузера.');
                    });
            } else {
                alert('Webcam api не поддерживается в этом браузере.');
            }
        });

        function processVideoFrame() {
            if (video.paused || video.ended) {
                return;
            }

            // Установка размера холста в соответствии с видеопотоком
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // Настройка холста перед рисованием
            ctx.filter = 'grayscale(100%)'; // Применим базовое ч/б (как в примерах)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Получение данных пикселей
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Сброс фильтра для ручного рендеринга
            ctx.filter = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Очистить, чтобы перерисовать

            // Сетка для точечной визуализации (по аналогии с image_4, image_2)
            const step = 8; // Размер точечного пикселя

            // Настройка общего тона (изумрудно-голубой, как в image_3)
            const tintR = 100;
            const tintG = 255;
            const tintB = 220;

            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const index = (y * canvas.width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];
                    const brightness = (r + g + b) / 3;

                    // Определение того, насколько яркий пиксель
                    const radius = (brightness / 255) * step / 1.5;

                    if (radius > 1) { // Рисовать только если есть яркость
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);

                        // Применение тонирования к яркости (как в image_3)
                        const tintFactor = brightness / 255;
                        const finalR = tintR * tintFactor;
                        const finalG = tintG * tintFactor;
                        const finalB = tintB * tintFactor;

                        ctx.fillStyle = `rgb(${finalR}, ${finalG}, ${finalB})`;
                        ctx.fill();
                    }
                }
            }

            // Добавление горизонтальных глитч-полос (по аналогии с image_1, image_5)
            if (Math.random() < 0.05) { // 5% шанс на кадр
                const stripY = Math.random() * canvas.height;
                const stripH = Math.random() * 20 + 5;
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, stripY, canvas.width, stripH);
            }

            // CRT скан-линии (как в image_4) - реализуются через CSS pseudo-element
            requestAnimationFrame(processVideoFrame);
        }
    </script>
</body>
</html>
