<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro | Neural HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">

<!-- Библиотеки -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
  --g:  #00ff41;  --g2: #00cc33;  --g3: #003a12;
  --b:  #00aaff;  --r:  #ff3333;  --y:  #ffe600;
  --o:  #ff9900;  --p:  #cc44ff;
  --panel:  rgba(2,8,4,.94);
  --border: rgba(0,255,65,.18);
  --card-h: 210px;
  --term-h: 150px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family:'Share Tech Mono','Courier New',monospace;
  color:var(--g); -webkit-tap-highlight-color:transparent; user-select:none;
}

/* ── BOOT ── */
#boot {
  position:fixed; inset:0; background:#000; z-index:300;
  display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px;
}
#boot-hex { position:absolute; inset:0; overflow:hidden; opacity:.05; pointer-events:none; }
#boot-hex svg { width:100%; height:100%; }
#boot-logo-wrap { position:relative; margin-bottom:10px; line-height:1; }
#boot-logo {
  font-family:'Orbitron','Arial Black',sans-serif; font-weight:900;
  font-size:clamp(42px,12vw,82px); letter-spacing:.18em; white-space:nowrap; color:transparent;
}
.bc {
  display:inline-block; opacity:0; color:var(--g);
  text-shadow:0 0 24px rgba(0,255,65,.55),0 0 60px rgba(0,255,65,.18);
  animation:charDrop .55s cubic-bezier(.22,1,.36,1) forwards;
}
.bc:nth-child(1){animation-delay:.05s} .bc:nth-child(2){animation-delay:.18s}
.bc:nth-child(3){animation-delay:.31s} .bc:nth-child(4){animation-delay:.44s}
.bc:nth-child(5){animation-delay:.57s}
#boot-logo-g {
  position:absolute; inset:0; font-family:'Orbitron','Arial Black',sans-serif; font-weight:900;
  font-size:clamp(42px,12vw,82px); letter-spacing:.18em; white-space:nowrap;
  color:var(--g); opacity:0; pointer-events:none; animation:glitchLoop 5s 1.6s infinite;
}
#boot-scan {
  position:absolute; left:0; right:0; height:2px; top:0;
  background:linear-gradient(90deg,transparent,var(--g),transparent);
  box-shadow:0 0 12px var(--g); animation:scanDown 3s ease-in-out infinite;
}
#boot-sub {
  font-size:8px; letter-spacing:.45em; color:var(--g2); text-transform:uppercase;
  margin:8px 0 22px; opacity:0; animation:fadeUp .5s .95s forwards;
}
#boot-log { width:min(360px,88vw); font-size:8.5px; color:var(--g2); min-height:90px; line-height:2; }
#boot-log .bl {
  opacity:0; animation:fadeUp .18s forwards;
  padding-left:5px; border-left:2px solid var(--g3); margin-bottom:2px;
}
#boot-log .bl.ok::before   { content:'✔ '; color:var(--g); }
#boot-log .bl.warn::before { content:'⚡ '; color:var(--o); }
#boot-log .bl.err::before  { content:'✕ '; color:var(--r); }
#pb-wrap { width:min(360px,88vw); margin-top:16px; }
#pb-track { height:2px; background:var(--g3); }
#pb { height:100%; width:0; background:linear-gradient(90deg,var(--g2),var(--g)); box-shadow:0 0 12px var(--g); transition:width .35s cubic-bezier(.22,1,.36,1); }
#pb-pct { font-size:7px; color:var(--g2); text-align:right; margin-top:3px; letter-spacing:.2em; }
#btn-start {
  margin-top:32px; display:none; background:none; border:1px solid var(--g); color:var(--g);
  font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:.35em; padding:13px 44px;
  cursor:pointer; position:relative; overflow:hidden; transition:color .25s;
}
#btn-start::before {
  content:''; position:absolute; inset:0; background:var(--g);
  transform:scaleX(0); transform-origin:left; transition:transform .28s cubic-bezier(.22,1,.36,1); z-index:-1;
}
#btn-start:hover::before,#btn-start:active::before { transform:scaleX(1); }
#btn-start:hover,#btn-start:active { color:#000; }

/* ── APP ── */
#app { position:fixed; inset:0; display:none; flex-direction:column; }
#vp  { position:relative; flex:1 1 0; min-height:0; overflow:hidden; background:#000; }
video { display:none; }
#output_canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; cursor:crosshair; }
#vp::after {
  content:''; position:absolute; inset:0; z-index:5; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);
  animation:scanroll 8s linear infinite;
}
#vignette { position:absolute; inset:0; z-index:4; pointer-events:none; background:radial-gradient(ellipse at center,transparent 36%,rgba(0,0,0,.88) 100%); }
#grid-ov  { position:absolute; inset:0; z-index:3; pointer-events:none; opacity:.025; background-image:linear-gradient(var(--g) 1px,transparent 1px),linear-gradient(90deg,var(--g) 1px,transparent 1px); background-size:48px 48px; }
#alert-flash { position:absolute; inset:0; z-index:6; pointer-events:none; opacity:0; }
#alert-flash.on { animation:alertFlash 1.2s ease-out forwards; }
.hc { position:absolute; width:52px; height:52px; z-index:10; pointer-events:none; }
.hc::before,.hc::after { content:''; position:absolute; background:var(--g); box-shadow:0 0 6px var(--g); }
.hc::before { width:2px; height:18px; } .hc::after { width:18px; height:2px; }
#hc-tl{top:0;left:0;} #hc-tl::before{top:0;left:0;} #hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;} #hc-tr::before{top:0;right:0;} #hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;} #hc-bl::before{bottom:0;left:0;} #hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;} #hc-br::before{bottom:0;right:0;} #hc-br::after{bottom:0;right:0;}
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:15; pointer-events:none;
  display:flex; align-items:center; justify-content:space-between; padding:10px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 100%);
}
#sys-id { font-family:'Orbitron','Arial Black',sans-serif; font-size:13px; font-weight:900; letter-spacing:.2em; color:var(--g); text-shadow:0 0 20px rgba(0,255,65,.5); }
#sys-id small { font-weight:400; font-size:9px; opacity:.4; letter-spacing:.08em; }
#badges { display:flex; gap:5px; align-items:center; }
.badge { font-size:7.5px; letter-spacing:.1em; padding:3px 8px; border:1px solid var(--border); background:var(--panel); color:var(--g2); display:flex; align-items:center; gap:4px; backdrop-filter:blur(4px); }
.bdot { width:4px; height:4px; border-radius:50%; background:var(--g); flex-shrink:0; animation:dotBlink 1.5s ease-in-out infinite; box-shadow:0 0 5px var(--g); }
#b-fps .bdot    { background:var(--b); box-shadow:0 0 5px var(--b); }
#b-threat       { display:none; border-color:rgba(255,51,51,.4); color:var(--r); }
#b-threat .bdot { background:var(--r); box-shadow:0 0 5px var(--r); animation-duration:.6s; }
#cache-badge { position:absolute; top:40px; left:14px; z-index:16; font-size:7px; color:rgba(0,255,65,.3); letter-spacing:.15em; pointer-events:none; }
#statusbar { position:absolute; bottom:0; left:0; right:0; z-index:9; pointer-events:none; display:flex; justify-content:space-between; padding:4px 14px; background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%); }
.sbi { font-size:7px; color:rgba(0,255,65,.32); letter-spacing:.1em; }

/* ── SCREENSHOT ── */
#shot-flash { position:absolute; inset:0; z-index:50; pointer-events:none; background:#fff; opacity:0; }
#shot-flash.snap { animation:shotFlash .45s ease-out forwards; }
@keyframes shotFlash { 0%{opacity:.85} 100%{opacity:0} }
#shot-indicator { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:51; pointer-events:none; font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:.3em; color:#fff; text-shadow:0 0 20px rgba(255,255,255,.8); opacity:0; }
#shot-indicator.snap { animation:shotInd .9s ease-out forwards; }
@keyframes shotInd { 0%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 60%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(.95)} }

/* ── INFO CARD ── */
#info-card { flex:0 0 var(--card-h); height:var(--card-h); overflow:hidden; background:rgba(1,5,2,.99); border-top:1px solid rgba(0,255,65,.45); position:relative; z-index:30; max-height:0; transition:max-height .28s cubic-bezier(.22,1,.36,1),border-color .28s; border-top-color:transparent; pointer-events:none; }
#info-card.open { max-height:var(--card-h); border-top-color:rgba(0,255,65,.45); pointer-events:all; }
#info-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--g),transparent); animation:sweepLine 3s linear infinite; }
#ic-close { position:absolute; top:8px; right:12px; background:none; border:1px solid rgba(0,255,65,.3); color:var(--g2); font-family:'Share Tech Mono',monospace; font-size:8px; padding:3px 10px; cursor:pointer; letter-spacing:.12em; transition:all .2s; z-index:2; }
#ic-close:hover { border-color:var(--g); color:var(--g); }
#ic-body { padding:10px 14px 8px; height:100%; overflow:hidden; }
#ic-row1 { display:flex; align-items:baseline; gap:10px; margin-bottom:5px; }
#ic-name { font-family:'Orbitron','Arial Black',sans-serif; font-size:17px; font-weight:700; letter-spacing:.18em; cursor:pointer; transition:opacity .2s; }
#ic-name:hover { opacity:.7; }
#ic-sub { font-size:7px; color:rgba(0,255,65,.35); letter-spacing:.2em; }
#ic-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px 8px; font-size:8px; margin-bottom:5px; }
.ick { color:rgba(0,255,65,.38); font-size:7px; letter-spacing:.06em; }
.icv { color:var(--g); } .icv.warn{color:var(--o)} .icv.alert{color:var(--r)}
#ic-desc { font-size:7.5px; color:rgba(0,255,65,.45); line-height:1.6; border-top:1px solid var(--border); padding-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#ic-tbar { margin-top:4px; display:flex; align-items:center; gap:8px; }
#ic-tl   { font-size:7px; color:rgba(0,255,65,.38); letter-spacing:.1em; white-space:nowrap; }
#ic-tt   { flex:1; height:2px; background:var(--g3); overflow:hidden; }
#ic-tf   { height:100%; width:0; transition:width .5s,background .3s; }
#ic-tv   { font-size:8px; color:var(--g); min-width:26px; text-align:right; }
#ic-actions { margin-top:5px; display:flex; align-items:center; gap:10px; }
#ic-rename { font-size:7px; color:rgba(0,255,65,.28); letter-spacing:.15em; cursor:pointer; transition:color .2s; }
#ic-rename:hover { color:var(--g); }
#ic-shot-btn { display:none; align-items:center; gap:5px; font-size:7px; letter-spacing:.15em; background:none; border:1px solid rgba(0,255,65,.35); color:var(--g2); padding:3px 9px; cursor:pointer; font-family:'Share Tech Mono',monospace; transition:all .2s; position:relative; overflow:hidden; }
#ic-shot-btn::before { content:''; position:absolute; inset:0; background:var(--g); transform:scaleX(0); transform-origin:left; transition:transform .22s ease; z-index:-1; }
#ic-shot-btn:hover::before { transform:scaleX(1); }
#ic-shot-btn:hover { color:#000; border-color:var(--g); }
#ic-shot-btn.ready  { display:flex; }
#ic-shot-btn.saving { color:var(--o); border-color:var(--o); pointer-events:none; }
#ic-thumb { display:none; width:32px; height:18px; border:1px solid rgba(0,255,65,.2); object-fit:cover; flex-shrink:0; }
#ic-thumb.ready { display:block; }

/* ── TERMINAL ── */
#terminal-wrap { flex:0 0 var(--term-h); height:var(--term-h); background:rgba(0,0,0,.96); border-top:1px solid var(--border); z-index:20; display:flex; flex-direction:column; overflow:hidden; }
#term-header { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:4px 12px; border-bottom:1px solid rgba(0,255,65,.1); }
#term-title { font-size:7px; letter-spacing:.25em; color:rgba(0,255,65,.3); }
#term-clear { background:none; border:none; color:rgba(0,255,65,.28); font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.15em; cursor:pointer; padding:0; }
#term-clear:hover { color:var(--g); }
#term-cols { flex:0 0 auto; display:grid; grid-template-columns:60px 68px 1fr 68px 74px; gap:0 4px; padding:2px 12px; border-bottom:1px solid rgba(0,255,65,.07); }
.tcl { font-size:6.5px; color:rgba(0,255,65,.22); letter-spacing:.15em; text-transform:uppercase; }
#term-body { flex:1 1 0; min-height:0; overflow-y:auto; padding:2px 0; scrollbar-width:thin; scrollbar-color:var(--g3) transparent; }
#term-body::-webkit-scrollbar { width:3px; }
#term-body::-webkit-scrollbar-thumb { background:var(--g3); border-radius:2px; }
.trow { display:grid; grid-template-columns:60px 68px 1fr 68px 74px; gap:0 4px; padding:2px 12px; font-size:8px; line-height:1.5; border-left:2px solid transparent; transition:background .12s; animation:rowIn .16s ease-out both; }
.trow:hover { background:rgba(0,255,65,.04); }
.trow.person  { border-left-color:var(--g); }
.trow.vehicle { border-left-color:var(--r); }
.trow.animal  { border-left-color:var(--y); }
.trow.device  { border-left-color:var(--b); }
.trow.system  { border-left-color:var(--p); }
.trow.other   { border-left-color:rgba(255,255,255,.3); }
.tc-time  { color:rgba(0,255,65,.32); font-size:7.5px; }
.tc-date  { color:rgba(0,255,65,.22); font-size:7px; }
.tc-event { color:var(--g); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-type  { font-size:7.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-group { font-size:7px; color:rgba(0,255,65,.38); }

/* ── KEYFRAMES ── */
@keyframes charDrop { 0%{opacity:0;transform:translateY(-18px) scaleY(2.2)} 100%{opacity:1;transform:none} }
@keyframes glitchLoop {
  0%,87%,100%{opacity:0;transform:none}
  88%{opacity:.7;transform:translateX(-3px);clip-path:polygon(0 12%,100% 12%,100% 38%,0 38%);color:var(--r)}
  90%{opacity:.5;transform:translateX(4px);clip-path:polygon(0 55%,100% 55%,100% 80%,0 80%);color:var(--b)}
  92%{opacity:0}
}
@keyframes scanDown { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
@keyframes sweepLine{ from{background-position:-200% 0} to{background-position:200% 0} }
@keyframes scanroll { from{background-position:0 0} to{background-position:0 80px} }
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:.15} }
@keyframes alertFlash { 0%{opacity:1;background:rgba(255,51,51,.07)} 100%{opacity:0} }
@keyframes rowIn    { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex">
    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="hxp" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse">
          <polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hxp)"/>
    </svg>
  </div>
  <div id="boot-logo-wrap">
    <div id="boot-logo" aria-label="myEYE">
      <span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span>
    </div>
    <div id="boot-logo-g" aria-hidden="true">myEYE</div>
    <div id="boot-scan"></div>
  </div>
  <div id="boot-sub">powered by bortin'2026</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div><div id="pb-pct">0%</div></div>
  <button id="btn-start" onclick="startApp()">ACTIVATE</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="grid-ov"></div>
    <div id="vignette"></div>
    <div id="alert-flash"></div>
    <div id="shot-flash"></div>
    <div id="shot-indicator">◉ CAPTURED</div>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="topbar">
      <div id="sys-id">myEYE <small>// PRO</small></div>
      <div id="badges">
        <div class="badge" id="b-fps"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge" id="b-obj"><span class="bdot"></span><span id="obj-txt">SCANNING</span></div>
        <div class="badge" id="b-threat"><span class="bdot"></span>THREAT</div>
      </div>
    </div>
    <div id="cache-badge">CACHE: 0 CLASSES</div>
    <div id="statusbar">
      <div class="sbi" id="sb-time">--:--:--</div>
      <div class="sbi" id="sb-mode">STANDARD</div>
      <div class="sbi">myEYE Pro</div>
    </div>
  </div>

  <div id="info-card">
    <button id="ic-close" onclick="closeCard()">✕ CLOSE</button>
    <div id="ic-body">
      <div id="ic-row1"><div id="ic-name">---</div><div id="ic-sub">// TAP NAME TO RENAME</div></div>
      <div id="ic-grid"></div>
      <div id="ic-desc"></div>
      <div id="ic-tbar">
        <div id="ic-tl">THREAT</div>
        <div id="ic-tt"><div id="ic-tf"></div></div>
        <div id="ic-tv">0%</div>
      </div>
      <div id="ic-actions">
        <div id="ic-rename" onclick="renameObj()">✎ RENAME CLASS</div>
        <img id="ic-thumb" alt="shot" />
        <button id="ic-shot-btn" onclick="downloadScreenshot()">⬇ SAVE PNG</button>
      </div>
    </div>
  </div>

  <div id="terminal-wrap">
    <div id="term-header">
      <span id="term-title">● SYSTEM LOG</span>
      <button id="term-clear" onclick="clearLog()">✕ CLEAR</button>
    </div>
    <div id="term-cols">
      <span class="tcl">TIME</span><span class="tcl">DATE</span>
      <span class="tcl">EVENT</span><span class="tcl">TYPE</span><span class="tcl">GROUP</span>
    </div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';

const CACHE_KEY = 'myeye_v53';
let UC = (() => {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; } catch(e) { return {}; }
})();
['aliases','counts','lastSeen','events'].forEach(k => { if (!UC[k]) UC[k] = k === 'events' ? [] : {}; });

function saveCache() {
  if (UC.events.length > 300) UC.events = UC.events.slice(-300);
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(UC)); } catch(e) {}
  const el = document.getElementById('cache-badge');
  if (el) el.textContent = `CACHE: ${Object.keys(UC.counts).length} CLASSES / ${UC.events.length} EVT`;
}

const GROUPS = {
  person:'HUMAN', car:'VEHICLE', truck:'VEHICLE', bus:'VEHICLE', motorcycle:'VEHICLE', dog:'ANIMAL', cat:'ANIMAL',
  'cell phone':'DEVICE', laptop:'DEVICE', mouse:'DEVICE', backpack:'ACCESSORY'
};
const GCOL = { HUMAN:'#00ff41', VEHICLE:'#ff3333', ANIMAL:'#ffe600', DEVICE:'#00aaff', OBJECT:'#ffffff' };
const KB = {
  person: {threat:.72, desc:'Homo sapiens. Скелет + кисти рук активны. Вектор вычисляется.'},
  car: {threat:.55, desc:'Колёсное ТС. Гражданский класс. Масса ~1200 кг.'},
  _d: {threat:.20, desc:'Объект идентифицирован. Расширенный анализ выполняется.'}
};

const getGroup = cls => GROUPS[cls] || 'OBJECT';
const getCol = cls => GCOL[getGroup(cls)] || '#fff';
const getKB = cls => KB[cls] || KB._d;
const getAlias = cls => UC.aliases[cls] || cls.toUpperCase();

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const termBody = document.getElementById('term-body');

let detector = null, mpPose = null, mpHands = null;
let poseReady = false, handsReady = false;
let lastPoseResult = null, lastHandsResult = null, lastObjects = [];
let selectedCls = null, threatActive = false, detecting = false;
let frameN = 0, fpsN = 0, lastFpsT = 0, screenshotBlob = null;
const logThrottle = {};

function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function nowStr() {
  const n = new Date();
  return { t: n.toTimeString().slice(0,8), d: `${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')}.${n.getFullYear()}` };
}

function sysLog(event, type='SYSTEM', group='SYS') {
  const { t, d } = nowStr();
  const cls = {HUMAN:'person',VEHICLE:'vehicle',ANIMAL:'animal',DEVICE:'device',SYS:'system'}[group] || 'other';
  const row = document.createElement('div');
  row.className = `trow ${cls}`;
  row.innerHTML = `<span class="tc-time">${t}</span><span class="tc-date">${d}</span><span class="tc-event">${event}</span><span class="tc-type" style="color:${GCOL[group]||'var(--g)'}">${type}</span><span class="tc-group">${group}</span>`;
  termBody.appendChild(row);
  termBody.scrollTop = termBody.scrollHeight;
}

async function captureScreenshot() {
  const frameDataURL = canvas.toDataURL('image/png');
  try {
    const shotCanvas = await html2canvas(document.getElementById('app'), {
      backgroundColor: '#000', useCORS: true, scale: 1,
      ignoreElements: el => ['shot-flash', 'shot-indicator'].includes(el.id),
      onclone: (doc) => {
        const cV = doc.getElementById('input_video'), cC = doc.getElementById('output_canvas');
        if (cV) cV.style.display = 'none';
        if (cC) { 
          const img = doc.createElement('img'); img.src = frameDataURL; 
          img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;';
          cC.replaceWith(img);
        }
      }
    });
    return new Promise(resolve => shotCanvas.toBlob(blob => resolve({ blob, dataURL: shotCanvas.toDataURL('image/png') }), 'image/png'));
  } catch(e) { return new Promise(resolve => canvas.toBlob(blob => resolve({ blob, dataURL: canvas.toDataURL('image/png') }), 'image/png')); }
}

async function downloadScreenshot() {
  if (!screenshotBlob) return;
  const btn = document.getElementById('ic-shot-btn');
  btn.classList.add('saving'); btn.textContent = '⏳ SAVING...';
  const url = URL.createObjectURL(screenshotBlob);
  const a = document.createElement('a'); a.href = url; a.download = `myEYE_${selectedCls||'cap'}_${Date.now()}.png`;
  a.click(); setTimeout(() => URL.revokeObjectURL(url), 3000);
  btn.classList.remove('saving'); btn.textContent = '⬇ SAVE PNG';
  sysLog('SCREENSHOT SAVED', 'PNG', 'SYS');
}

async function initModels() {
  const blogEl = document.getElementById('boot-log'), pbEl = document.getElementById('pb'), pctEl = document.getElementById('pb-pct');
  const bLog = (t, c='ok') => { const d = document.createElement('div'); d.className = 'bl '+c; d.textContent = t; blogEl.appendChild(d); };
  const setPb = p => { pbEl.style.width = p+'%'; pctEl.textContent = p+'%'; };

  bLog('INIT VISION OS v5.3 PRO'); setPb(10);
  detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' }); bLog('DETECTOR: READY'); setPb(40);

  mpPose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  mpPose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
  mpPose.onResults(res => { lastPoseResult = res; });
  await mpPose.initialize(); poseReady = true; bLog('POSE ENGINE: ACTIVE'); setPb(70);

  mpHands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  mpHands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.5 });
  mpHands.onResults(res => { lastHandsResult = res; });
  await mpHands.initialize(); handsReady = true; bLog('HANDS ENGINE: ACTIVE'); setPb(100);
  document.getElementById('btn-start').style.display = 'block';
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const cam = new Camera(video, {
    onFrame: async () => {
      if (!detecting && detector) { detecting = true; lastObjects = await detector.detect(video, 20, 0.35); detecting = false; }
      if (poseReady) await mpPose.send({ image: video });
      if (handsReady) await mpHands.send({ image: video });
      renderFrame();
    },
    width: 1280, height: 720
  });
  cam.start();
}

function renderFrame() {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw) return;
  canvas.width = vw; canvas.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);

  fpsN++; const now = performance.now();
  if (now - lastFpsT > 1000) { document.getElementById('fps-txt').textContent = fpsN + ' FPS'; fpsN = 0; lastFpsT = now; }
  frameN++;

  drawObjects(vw, vh);
  if (lastPoseResult) drawPose(vw, vh);
  if (lastHandsResult) drawHands(vw, vh);
}

function drawObjects(vw, vh) {
  const hasThreat = lastObjects.some(o => ['person','car'].includes(o.class));
  document.getElementById('b-threat').style.display = hasThreat ? 'flex' : 'none';
  document.getElementById('obj-txt').textContent = lastObjects.length + ' TARGETS';

  lastObjects.forEach(obj => {
    const [bx, by, bw, bh] = obj.bbox;
    const col = getCol(obj.class), isSel = obj.class === selectedCls;
    ctx.strokeStyle = col; ctx.lineWidth = isSel ? 4 : 2;
    ctx.strokeRect(bx, by, bw, bh);
    
    ctx.fillStyle = col; ctx.font = "bold 14px 'Share Tech Mono'";
    ctx.fillText(getAlias(obj.class), bx, by > 20 ? by - 5 : by + 15);

    const lk = obj.class, ts = Date.now();
    if (!logThrottle[lk] || ts - logThrottle[lk] > 10000) {
      logThrottle[lk] = ts; sysLog(getAlias(lk), lk.toUpperCase(), getGroup(lk));
      UC.counts[lk] = (UC.counts[lk]||0)+1; saveCache();
    }
  });
}

function drawPose(vw, vh) {
  const lm = lastPoseResult.poseLandmarks; if (!lm) return;
  const G = '#00ff41'; ctx.strokeStyle = G; ctx.lineWidth = 2;
  // Голова (v5.3 logic)
  const nose = lm[0], lEar = lm[7], rEar = lm[8];
  if (nose && lEar && rEar && nose.visibility > 0.5) {
    const rX = Math.abs(lEar.x - rEar.x) * vw * 0.8, rY = rX * 1.2;
    ctx.beginPath(); ctx.ellipse(nose.x*vw, nose.y*vh - rY*0.2, rX, rY, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,255,65,0.1)'; ctx.fill(); ctx.stroke();
  }
}

function drawHands(vw, vh) {
  lastHandsResult.multiHandLandmarks.forEach(landmarks => {
    ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 2;
    landmarks.forEach((p, i) => {
      ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(p.x*vw, p.y*vh, 3, 0, Math.PI*2); ctx.fill();
    });
  });
}

canvas.addEventListener('click', async (e) => {
  const rect = canvas.getBoundingClientRect(), sx = canvas.width/rect.width, sy = canvas.height/rect.height;
  const cx = (e.clientX-rect.left)*sx, cy = (e.clientY-rect.top)*sy;
  const hit = lastObjects.find(o => { const [bx,by,bw,bh] = o.bbox; return cx>=bx && cx<=bx+bw && cy>=by && cy<=by+bh; });
  if (hit) {
    selectedCls = hit.class; openCard(hit);
    const res = await captureScreenshot(); screenshotBlob = res.blob;
    document.getElementById('ic-thumb').src = res.dataURL;
    document.getElementById('ic-thumb').classList.add('ready');
    document.getElementById('ic-shot-btn').classList.add('ready');
  } else closeCard();
});

function openCard(obj) {
  const kb = getKB(obj.class);
  document.getElementById('ic-name').textContent = getAlias(obj.class);
  document.getElementById('ic-name').style.color = getCol(obj.class);
  document.getElementById('ic-desc').textContent = kb.desc;
  document.getElementById('ic-tf').style.width = (kb.threat*100)+'%';
  document.getElementById('ic-tv').textContent = (kb.threat*100)+'%';
  document.getElementById('info-card').classList.add('open');
}

function closeCard() { selectedCls = null; document.getElementById('info-card').classList.remove('open'); }
function renameObj() {
  const cls = selectedCls; if (!cls) return;
  const nv = prompt(`RENAME "${cls.toUpperCase()}" TO:`, getAlias(cls));
  if (nv) { UC.aliases[cls] = nv.toUpperCase(); saveCache(); openCard({class:cls, bbox:[0,0,0,0], score:0}); }
}

initModels();
</script>
