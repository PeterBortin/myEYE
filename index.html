<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE v3.2 - FIXED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.0.0/dist/pose-detection.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g);animation:gpulse 2s infinite;}
#boot-log{width:min(360px,86vw);font-size:10px;color:var(--g2);min-height:100px;margin-top:20px;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:10px;}
#pb{height:100%;width:0;background:var(--g);transition:width .3s;}
#btn-start{margin-top:25px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;padding:12px 40px;cursor:pointer;}

#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;filter:brightness(.6);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#topbar{position:absolute;top:0;inset:0;height:50px;z-index:10;padding:10px;display:flex;justify-content:space-between;pointer-events:none;}
.badge{background:var(--panel);border:1px solid var(--border);padding:3px 8px;font-size:9px;margin-left:5px;}

#statbar{position:absolute;bottom:0;width:100%;z-index:10;display:flex;background:var(--panel);border-top:1px solid var(--border);pointer-events:none;}
.sc{flex:1;padding:8px;text-align:center;font-size:8px;}
.sc span{display:block;font-size:11px;font-weight:bold;color:var(--g);}

#terminal{height:100px;background:#000;border-top:1px solid var(--border);padding:10px;font-size:10px;overflow:hidden;z-index:15;}
.tl{line-height:1.5;opacity:0.8;}
.talert{color:var(--r);} .tinfo{color:var(--b);}

#info-panel{position:absolute;bottom:0;width:100%;background:var(--panel);border-top:2px solid var(--g);padding:15px;transform:translateY(100%);transition:0.3s;z-index:50;}
#info-panel.open{transform:translateY(0);}

@keyframes gpulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="startSystem()">INITIALIZE</button>
</div>

<div id="app" style="display:none;">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="topbar">
      <div id="sys-id">myEYE OS 3.2</div>
      <div id="badges">
        <span class="badge" id="b-fps">0 FPS</span>
        <span class="badge" id="b-obj">0 OBJ</span>
      </div>
    </div>
    <div id="statbar">
      <div class="sc">THREATS<span id="s-thr">0</span></div>
      <div class="sc">DISTANCE<span id="s-dist">--</span></div>
      <div class="sc">STATUS<span style="color:var(--g)">ACTIVE</span></div>
    </div>
    <div id="info-panel">
      <div id="info-title" style="font-weight:bold;margin-bottom:10px;">OBJECT INFO</div>
      <div id="info-content" style="font-size:11px;"></div>
      <button onclick="closeInfo()" style="margin-top:10px;background:none;border:1px solid var(--g);color:var(--g);padding:5px 10px;">CLOSE</button>
    </div>
  </div>
  <div id="terminal" id="term-lines"></div>
</div>

<script>
const ALIASES = { person: 'СУБЪЕКТ', car: 'ТРАНСПОРТ', cell_phone: 'ТЕРМИНАЛ' };
const THREATS = ['person', 'car', 'truck', 'motorcycle'];

let model, detector;
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let lastPred = [];
let lastPoses = [];
let selId = null;

// Трекер для плавности
class Tracker {
  constructor() { this.tracks = {}; this.nextId = 1; }
  update(detections) {
    const currentFrame = {};
    detections.forEach(det => {
      let bestMatch = null;
      let maxIou = 0.3;
      for (let id in this.tracks) {
        let iou = this.getIou(det.bbox, this.tracks[id].bbox);
        if (iou > maxIou && this.tracks[id].class === det.class) {
          maxIou = iou;
          bestMatch = id;
        }
      }
      if (bestMatch) {
        this.tracks[bestMatch].bbox = det.bbox;
        this.tracks[bestMatch].score = det.score;
        this.tracks[bestMatch].age = 0;
        currentFrame[bestMatch] = this.tracks[bestMatch];
      } else {
        let id = this.nextId++;
        this.tracks[id] = { ...det, id, age: 0 };
        currentFrame[id] = this.tracks[id];
      }
    });
    for (let id in this.tracks) {
      this.tracks[id].age++;
      if (this.tracks[id].age > 20) delete this.tracks[id];
    }
    return Object.values(currentFrame);
  }
  getIou(a, b) {
    let x1 = Math.max(a[0], b[0]), y1 = Math.max(a[1], b[1]);
    let x2 = Math.min(a[0]+a[2], b[0]+b[2]), y2 = Math.min(a[1]+a[3], b[1]+b[3]);
    let w = Math.max(0, x2 - x1), h = Math.max(0, y2 - y1);
    let area = w * h;
    return area / (a[2]*a[3] + b[2]*b[3] - area);
  }
}
const tracker = new Tracker();

async function boot() {
  const log = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const updateLog = (txt, p) => {
    log.innerHTML += `<div>> ${txt}</div>`;
    pb.style.width = p + '%';
  };

  try {
    updateLog("LOADING COCO-SSD...", 30);
    model = await cocoSsd.load();
    updateLog("LOADING POSENET...", 60);
    detector = await poseDetection.createDetector(poseDetection.SupportedModels.PoseNet);
    updateLog("SYSTEM READY.", 100);
    document.getElementById('btn-start').style.display = 'block';
  } catch (e) {
    updateLog("ERROR: " + e.message, 0);
  }
}

async function startSystem() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
  video.srcObject = stream;
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    detect();
  };
}

async function detect() {
  if (video.paused || video.ended) return;

  const predictions = await model.detect(video);
  lastPred = tracker.update(predictions);

  if (lastPred.some(p => p.class === 'person')) {
    lastPoses = await detector.estimatePoses(video);
  }

  draw();
  updateHUD();
  requestAnimationFrame(detect);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  lastPred.forEach(p => {
    const [x, y, w, h] = p.bbox;
    const color = THREATS.includes(p.class) ? '#ff2244' : '#00ff41';
    
    // Рамка
    ctx.strokeStyle = color;
    ctx.lineWidth = (p.id === selId) ? 4 : 2;
    ctx.strokeRect(x, y, w, h);
    
    // Полупрозрачный фон
    ctx.fillStyle = color + '22';
    ctx.fillRect(x, y, w, h);

    // Подпись
    ctx.fillStyle = color;
    ctx.font = "12px 'Share Tech Mono'";
    ctx.fillText(`${ALIASES[p.class] || p.class.toUpperCase()} #${p.id}`, x, y - 5);

    // Скелет для людей
    if (p.class === 'person') {
      lastPoses.forEach(pose => {
        // Проверка: находится ли нос человека внутри текущей рамки
        const nose = pose.keypoints[0];
        if (nose.x > x && nose.x < x + w && nose.y > y && nose.y < y + h) {
          drawSkeleton(pose.keypoints);
        }
      });
    }
  });
}

function drawSkeleton(keypoints) {
  ctx.fillStyle = '#ffff00';
  ctx.strokeStyle = '#ffff00';
  ctx.lineWidth = 2;

  const connections = poseDetection.util.getAdjacentKeypoints(keypoints, poseDetection.SupportedModels.PoseNet);
  
  connections.forEach(([p1, p2]) => {
    if (p1.score > 0.5 && p2.score > 0.5) {
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
  });

  keypoints.forEach(kp => {
    if (kp.score > 0.5) {
      ctx.beginPath();
      ctx.arc(kp.x, kp.y, 3, 0, 2 * Math.PI);
      ctx.fill();
    }
  });
}

function updateHUD() {
  document.getElementById('b-obj').innerText = `${lastPred.length} OBJ`;
  const threats = lastPred.filter(p => THREATS.includes(p.class)).length;
  document.getElementById('s-thr').innerText = threats;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  const hit = lastPred.find(p => cx > p.bbox[0] && cx < p.bbox[0] + p.bbox[2] && cy > p.bbox[1] && cy < p.bbox[1] + p.bbox[3]);
  
  if (hit) {
    selId = hit.id;
    document.getElementById('info-panel').classList.add('open');
    document.getElementById('info-content').innerHTML = `
      CLASS: ${hit.class}<br>
      CONFIDENCE: ${Math.round(hit.score * 100)}%<br>
      ID: ${hit.id}
    `;
  } else {
    closeInfo();
  }
});

function closeInfo() {
  selId = null;
  document.getElementById('info-panel').classList.remove('open');
}

boot();
</script>
</body>
</html>
