<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
:root{ --g:#00ff41; --panel:rgba(2,8,4,.8); --blue:#00aaff; --red: #ff3333; }
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--g); -webkit-tap-highlight-color: transparent;}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:42px;color:var(--g);text-shadow:0 0 15px var(--g);letter-spacing:5px;}
#pb-wrap{width:100%;max-width:300px;height:2px;background:#111;margin-top:20px;position:relative;overflow:hidden;}
#pb{height:100%;width:0;background:var(--g);transition:width .3s;box-shadow: 0 0 10px var(--g);}
#btn-start{margin-top:40px;display:none;background:none;border:1px solid var(--g);color:var(--g);padding:15px 50px;cursor:pointer;font-family:'Orbitron';text-transform:uppercase;letter-spacing:2px;transition: 0.3s;}
#btn-start:active{background:var(--g);color:#000;}

#app{position:fixed;inset:0;display:none;flex-direction:column;background:#000;}
#vp{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;}
video{display:none;}
canvas{position:absolute;width:100%;height:100%;object-fit:cover;z-index:2;cursor: crosshair;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:grid;grid-template-columns: 1fr auto; gap:10px; padding:15px;pointer-events:none;background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);}
.badge{font-size:10px;padding:4px 8px;border:1px solid rgba(0,255,65,.3);background:var(--panel);display:inline-block;margin-left:5px; backdrop-filter: blur(4px);}

#terminal{height:120px;background:rgba(0,0,0,0.9);border-top:1px solid rgba(0,255,65,0.3);padding:10px;font-size:10px;overflow:hidden;display:flex;flex-direction:column-reverse;z-index:20;}
.tl{color:var(--g);margin-bottom:3px;font-family:'Share Tech Mono';text-transform:uppercase;opacity:0.9;animation: fadeIn 0.2s ease-out;}
.tl span {color: #888; margin-right: 8px;}
.tl.obj {color: var(--blue);}
.tl.info {color: #fff; background: rgba(0, 170, 255, 0.2); padding: 2px 5px; border-left: 2px solid var(--blue);}

@keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 600px) {
  #boot-logo { font-size: 32px; }
  #topbar { font-size: 12px; padding: 10px; }
  .badge { font-size: 9px; padding: 3px 6px; }
  #terminal { height: 100px; padding: 5px; }
}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log" style="font-size:10px; margin-top:10px; letter-spacing: 1px;">created by bortin`2026...</div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="startApp()">open system</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="topbar">
      <div style="font-family:'Orbitron'; font-weight:700; font-size: 11px;">myEYE Pro X-LR</div>
      <div style="text-align: right;">
        <span class="badge" id="b-fps">0 fps</span>
        <span class="badge" id="b-obj">scanning...</span>
      </div>
    </div>
  </div>
  <div id="terminal"></div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const term = document.getElementById('terminal');

let objectDetector, lastFps = 0, frameCount = 0;
let lastDetectedObjects = [];

const classColors = {
  person: '#00ff41',
  vehicle: '#ff3333',
  animal: '#ffff00',
  device: '#00aaff',
  indoor: '#ff00ff',
  default: '#ffffff'
};

function getObjectGroup(label) {
  if (label === 'person') return 'HUMAN';
  if (['car', 'bus', 'truck', 'motorcycle', 'bicycle', 'train', 'airplane'].includes(label)) return 'VEHICLE';
  if (['dog', 'cat', 'bird', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe'].includes(label)) return 'ANIMAL';
  if (['cell phone', 'laptop', 'mouse', 'remote', 'keyboard', 'tv', 'microwave', 'oven', 'refrigerator'].includes(label)) return 'DEVICE';
  if (['chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'bottle', 'cup', 'fork', 'knife', 'spoon', 'bowl'].includes(label)) return 'INDOOR';
  return 'UNKNOWN';
}

function getObjectColor(label) {
  const group = getObjectGroup(label);
  if (group === 'HUMAN') return classColors.person;
  if (group === 'VEHICLE') return classColors.vehicle;
  if (group === 'ANIMAL') return classColors.animal;
  if (group === 'DEVICE') return classColors.device;
  if (group === 'INDOOR') return classColors.indoor;
  return classColors.default;
}

function log(msg, type = '') {
  const line = document.createElement('div');
  line.className = `tl ${type}`;
  const now = new Date();
  const dateStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()}`;
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  line.innerHTML = `<span>[${ts}, ${dateStr}]</span> > ${msg}`;
  term.prepend(line);
  if (term.childNodes.length > 15) term.lastChild.remove();
}

canvasElement.addEventListener('click', (e) => {
  const rect = canvasElement.getBoundingClientRect();
  const scaleX = canvasElement.width / rect.width;
  const scaleY = canvasElement.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  lastDetectedObjects.forEach(o => {
    const [bx, by, bw, bh] = o.bbox;
    if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) {
      log(`DATA_FETCH: ${o.class.toUpperCase()} | CONF: ${(o.score * 100).toFixed(1)}%`, 'info');
      log(`COORDS: [${Math.round(bx)},${Math.round(by)}] | SIZE: ${Math.round(bw)}x${Math.round(bh)}`, 'info');
    }
  });
});

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5 });

async function initModels() {
  log("initializing long-range engine...");
  objectDetector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  document.getElementById('pb').style.width = '50%';
  await pose.initialize();
  document.getElementById('pb').style.width = '100%';
  document.getElementById('boot-log').innerText = "optics calibrated / lr-scan active";
  document.getElementById('btn-start').style.display = 'block';
  log("pose core: online");
}

let currentPoseResults = null;
pose.onResults((results) => {
  currentPoseResults = results;
});

function isDuplicate(bbox, list) {
    for (let item of list) {
        const [x1, y1, w1, h1] = bbox;
        const [x2, y2, w2, h2] = item.bbox;
        const intersection = Math.max(0, Math.min(x1 + w1, x2 + w2) - Math.max(x1, x2)) *
                             Math.max(0, Math.min(y1 + h1, y2 + h2) - Math.max(y1, y2));
        const area1 = w1 * h1;
        if (intersection / area1 > 0.5) return true;
    }
    return false;
}

async function draw() {
  const vw = videoElement.videoWidth;
  const vh = videoElement.videoHeight;
  if(vw === 0) return;

  canvasElement.width = vw;
  canvasElement.height = vh;

  canvasCtx.drawImage(videoElement, 0, 0, vw, vh);

  // Сетка
  canvasCtx.strokeStyle = 'rgba(0, 255, 65, 0.05)';
  for(let i=0; i<vw; i+=vw/10) { canvasCtx.beginPath(); canvasCtx.moveTo(i,0); canvasCtx.lineTo(i,vh); canvasCtx.stroke(); }
  for(let i=0; i<vh; i+=vh/10) { canvasCtx.beginPath(); canvasCtx.moveTo(0,i); canvasCtx.lineTo(vw,i); canvasCtx.stroke(); }

  // Детекция
  const fullScan = await objectDetector.detect(videoElement, 20, 0.4);
  const zoomCanvas = document.createElement('canvas');
  zoomCanvas.width = 640; zoomCanvas.height = 640;
  const zCtx = zoomCanvas.getContext('2d');
  zCtx.drawImage(videoElement, vw*0.25, vh*0.25, vw*0.5, vh*0.5, 0, 0, 640, 640);
  const zoomScan = await objectDetector.detect(zoomCanvas, 15, 0.35);
  
  const correctedZoom = zoomScan.map(o => ({
    ...o,
    bbox: [
        o.bbox[0] * (vw*0.5/640) + vw*0.25,
        o.bbox[1] * (vh*0.5/640) + vh*0.25,
        o.bbox[2] * (vw*0.5/640),
        o.bbox[3] * (vh*0.5/640)
    ]
  }));

  lastDetectedObjects = [...fullScan];
  correctedZoom.forEach(z => {
      if (!isDuplicate(z.bbox, fullScan)) lastDetectedObjects.push(z);
  });

  const hasPerson = lastDetectedObjects.some(o => o.class === 'person');
  if (hasPerson) {
      await pose.send({image: videoElement});
  } else {
      currentPoseResults = null;
  }

  document.getElementById('b-obj').innerText = lastDetectedObjects.length + " TARGETS";

  // СТРОГАЯ ОТРИСОВКА СКЕЛЕТА ТОЛЬКО ДЛЯ ЛЮДЕЙ
  lastDetectedObjects.forEach(o => {
    const [bx, by, bw, bh] = o.bbox;
    const targetColor = getObjectColor(o.class);
    
    // Рамки (Жирные)
    canvasCtx.strokeStyle = targetColor;
    canvasCtx.lineWidth = 3; 
    canvasCtx.globalAlpha = 0.8;
    canvasCtx.strokeRect(bx, by, bw, bh);
    
    // Подписи (Крупные)
    canvasCtx.fillStyle = targetColor;
    canvasCtx.globalAlpha = 1;
    canvasCtx.font = 'bold 16px Share Tech Mono';
    canvasCtx.fillText(`${o.class.toUpperCase()} [${Math.round(o.score*100)}%]`, bx, by > 20 ? by - 8 : by + 20);

    // Если это человек - рисуем скелет внутри его области
    if(o.class === 'person' && currentPoseResults && currentPoseResults.poseLandmarks) {
        const landmarks = currentPoseResults.poseLandmarks;
        
        // Рисуем только если центральная точка человека (нос) находится примерно в рамке
        const nose = landmarks[0];
        if (nose.x * vw > bx && nose.x * vw < bx + bw) {
            drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 2});
            drawLandmarks(canvasCtx, landmarks, {color: '#00ff41', fillColor: '#00ff41', lineWidth: 1, radius: 2});

            // Овал головы
            const lEye = landmarks[2];
            const rEye = landmarks[5];
            if(nose && lEye && rEye) {
                const eyeDist = Math.sqrt(Math.pow((rEye.x - lEye.x)*vw, 2) + Math.pow((rEye.y - lEye.y)*vh, 2));
                const headW = eyeDist * 2.2;
                const headH = eyeDist * 3.0;
                canvasCtx.beginPath();
                canvasCtx.setLineDash([5, 5]);
                canvasCtx.ellipse(nose.x * vw, nose.y * vh - (headH * 0.1), headW, headH, 0, 0, Math.PI * 2);
                canvasCtx.strokeStyle = '#00ff41';
                canvasCtx.lineWidth = 2;
                canvasCtx.stroke();
                canvasCtx.setLineDash([]);
            }
        }
    }

    if(frameCount % 120 === 0) log(`OBJECT_LOG: ${o.class.toUpperCase()} | DIST_FNT: ${Math.round(1500/bw)}m`, 'obj');
  });

  frameCount++;
  const now = performance.now();
  if (now - lastFps > 1000) {
    document.getElementById('b-fps').innerText = frameCount + " FPS";
    frameCount = 0; lastFps = now;
  }
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  log("LR-SCANNER: INITIALIZED");
  
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const camera = new Camera(videoElement, {
    onFrame: async () => { await draw(); },
    width: { ideal: 1280 },
    height: { ideal: 720 },
    facingMode: isMobile ? "environment" : "user"
  });
  camera.start();
}

initModels();
</script>
</body>
</html>
