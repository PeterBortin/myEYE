<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE // VISION OS v3.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g);animation:gpulse 2s ease-in-out infinite;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(--g2);min-height:115px;line-height:1.9;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px;padding:13px 42px;cursor:pointer;}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.55) contrast(1.38) saturate(.88);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,.015) 3px,rgba(0,255,65,.015) 4px);
animation:scanroll 10s linear infinite;}

/* HUD ELEMENTS */
.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 5px var(--g);}
.hc::before{width:2px;height:20px;}.hc::after{width:20px;height:2px;}
#hc-tl{top:0;left:0;}#hc-tr{top:0;right:0;}#hc-tr::before{right:0;}#hc-tr::after{right:0;}
#hc-bl{bottom:0;left:0;}#hc-bl::before{bottom:0;}#hc-bl::after{bottom:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}

#xhair{position:absolute;top:50%;left:50%;z-index:8;width:30px;height:30px;margin:-15px;pointer-events:none;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(0,255,65,.4);}
#xhair::before{top:14px;left:0;width:30px;height:2px;}
#xhair::after{left:14px;top:0;width:2px;height:30px;}

#radar{position:absolute;top:50%;left:50%;z-index:7;width:100px;height:100px;margin:-50px;
border:1px solid rgba(0,255,65,.1);border-radius:50%;pointer-events:none;animation:rpulse 4s linear infinite;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:flex;justify-content:space-between;padding:12px;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:.2em;text-shadow:0 0 10px var(--g);}
#badges{display:flex;gap:6px;}
.badge{font-size:8px;padding:3px 8px;border:1px solid var(--border);background:var(--panel);}

#night-btn{position:absolute;top:50px;left:12px;z-index:20;background:none;border:1px solid var(--border);
color:var(--g2);font-size:9px;padding:5px 12px;cursor:pointer;}

#statbar{position:absolute;bottom:0;left:0;right:0;z-index:15;display:flex;gap:1px;pointer-events:none;}
.sc{flex:1;padding:8px;background:var(--panel);border-top:1px solid var(--border);font-size:8px;text-align:center;}
.sc span{display:block;color:var(--g);font-size:11px;font-weight:bold;}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;background:var(--panel);
border-top:2px solid var(--g);padding:15px;transform:translateY(100%);transition:.3s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-title{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--g);cursor:pointer;margin-bottom:10px;}

#terminal{flex:0 0 auto;height:120px;background:var(--bg);border-top:1px solid var(--border);padding:10px;overflow:hidden;}
#term-lines{font-size:10px;line-height:1.6;}
.tl{opacity:0;animation:si .2s forwards;border-left:2px solid var(--g3);padding-left:8px;margin-bottom:2px;}

@keyframes gpulse{0%,100%{opacity:.8;}50%{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 100px;}}
@keyframes rpulse{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(2.5);opacity:0;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">INITIALIZE LINK</button>
</div>

<div id="app" style="display:none;">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="xhair"></div><div id="radar"></div>
    <button id="night-btn" onclick="toggleNight()">☾ NIGHT_VIS</button>

    <div id="topbar">
      <div id="sys-id">myEYE // V3.2</div>
      <div id="badges">
        <div class="badge" id="b-fps">00 FPS</div>
        <div class="badge" id="b-obj">0 OBJ</div>
      </div>
    </div>

    <div id="statbar">
      <div class="sc">THREATS<span id="s-thr">0</span></div>
      <div class="sc">DIST MAX<span id="s-dist">---</span></div>
      <div class="sc">CONFIDENCE<span id="s-conf">0%</span></div>
    </div>

    <div id="info-panel">
      <button style="float:right" onclick="closeInfo()">✕</button>
      <div id="info-title" onclick="renameObject()">---</div>
      <div id="info-grid" style="display:grid;grid-template-columns:1fr 1fr;font-size:11px;gap:5px;"></div>
      <div id="info-desc" style="margin-top:10px;font-size:10px;opacity:.7;border-top:1px solid var(--border);padding-top:5px;"></div>
    </div>
  </div>
  <div id="terminal"><div id="term-lines"></div></div>
</div>

<script>
const ALIASES = { person: 'СУБЪЕКТ', car: 'АВТО', truck: 'ГРУЗОВИК', cell_phone: 'ТЕРМИНАЛ' };
let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');
const THREATS = new Set(['person', 'car', 'truck', 'bus', 'motorcycle']);

// ASCII Poses for "person"
const POSES = {
  stand: ["  O  ", " /|\\ ", " / \\ "],
  walk:  ["  O  ", " /|\\ ", " / > "],
  alert: [" \\O/ ", "  |  ", " / \\ "]
};

let model, running=false, nightMode=false, selTid=null, lastPred=[];
const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d'), video=document.getElementById('video');

async function bootSeq(){
  const logBox = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const steps = ["BOOTING KERNEL...", "SYNCING NEURAL FEED...", "LOADING COCO_SSD...", "VISION READY."];
  for(let i=0; i<steps.length; i++){
    await new Promise(r=>setTimeout(r, 400));
    const d=document.createElement('div'); d.textContent='> '+steps[i]; logBox.appendChild(d);
    pb.style.width = ((i+1)/steps.length*100)+'%';
  }
  model = await cocoSsd.load({base: 'lite_mobilenet_v2'});
  document.getElementById('btn-start').style.display='block';
}

async function initCamera(){
  const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  video.srcObject=s;
  video.onloadedmetadata=()=>{
    video.play();
    document.getElementById('boot').style.display='none';
    document.getElementById('app').style.display='flex';
    running=true;
    requestAnimationFrame(loop);
  };
}

function log(msg, type='ok'){
  const lines = document.getElementById('term-lines');
  const d = document.createElement('div');
  d.className = 'tl';
  d.innerHTML = `<span style="opacity:.3">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
  lines.prepend(d);
  if(lines.childNodes.length > 6) lines.lastChild.remove();
}

function drawSkel(x, y, w, h, cls, isSel){
  if(cls !== 'person') return;
  const pose = POSES[Math.random() > 0.1 ? (Math.random() > 0.5 ? 'walk' : 'stand') : 'alert'];
  ctx.font = "bold 14px 'Share Tech Mono'";
  ctx.fillStyle = isSel ? '#fff' : '#00ff41';
  ctx.globalAlpha = 0.4;
  const step = h / 4;
  pose.forEach((line, i) => {
    ctx.fillText(line, x + w/2 - 15, y + step * (i+1));
  });
  ctx.globalAlpha = 1;
}

function loop(){
  if(!running) return;
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  model.detect(video, 20, 0.2).then(preds => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    // Draw Horizon
    ctx.strokeStyle = 'rgba(0,255,65,0.2)';
    ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    preds.forEach(p => {
      const [x,y,w,h] = p.bbox;
      const isSel = selTid === p.class + x;
      const col = THREATS.has(p.class) ? '#ff2244' : '#00ff41';
      
      // Box
      ctx.strokeStyle = col;
      ctx.lineWidth = isSel ? 4 : 1;
      ctx.strokeRect(x,y,w,h);
      ctx.fillStyle = col + '11';
      ctx.fillRect(x,y,w,h);

      // ASCII & Labels
      drawSkel(x,y,w,h,p.class, isSel);
      ctx.fillStyle = col;
      ctx.font = "10px Orbitron";
      ctx.fillText(`${(USER_MEM[p.class]||ALIASES[p.class]||p.class).toUpperCase()}`, x, y-5);
    });
    lastPred = preds;
    updateStats(preds);
    requestAnimationFrame(loop);
  });
}

function updateStats(preds){
  document.getElementById('b-obj').textContent = preds.length + ' OBJ';
  let thr = preds.filter(p => THREATS.has(p.class)).length;
  document.getElementById('s-thr').textContent = thr;
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width/rect.width);
  const y = (e.clientY - rect.top) * (canvas.height/rect.height);
  const hit = lastPred.find(p => x > p.bbox[0] && x < p.bbox[0]+p.bbox[2] && y > p.bbox[1] && y < p.bbox[1]+p.bbox[3]);
  if(hit){
    selTid = hit.class + hit.bbox[0];
    document.getElementById('info-title').textContent = (USER_MEM[hit.class]||ALIASES[hit.class]||hit.class).toUpperCase();
    document.getElementById('info-panel').classList.add('open');
    log(`LOCKED ON: ${hit.class.toUpperCase()}`);
  } else closeInfo();
});

function toggleNight(){
  nightMode = !nightMode;
  video.style.filter = nightMode ? 'brightness(0.5) contrast(2) sepia(1) hue-rotate(100deg)' : 'brightness(.55) contrast(1.38)';
  log(`NIGHT_MODE: ${nightMode?'ACTIVE':'OFF'}`);
}

function closeInfo(){ selTid=null; document.getElementById('info-panel').classList.remove('open'); }

function renameObject() {
  const current = document.getElementById('info-title').textContent;
  const hit = lastPred.find(p => (selTid === p.class + p.bbox[0]));
  if(!hit) return;
  const n = prompt("RENAME CLASS:", current);
  if(n) {
    USER_MEM[hit.class] = n.toUpperCase();
    localStorage.setItem('myeye_mem', JSON.stringify(USER_MEM));
    location.reload();
  }
}

bootSeq();
</script>
</body>
</html>
