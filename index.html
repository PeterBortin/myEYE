<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE v4.5 APEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;--p:#cc00ff;
  --bg:#020804;--panel:rgba(2,8,4,.96);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT STYLING */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;text-align:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g);animation:gpulse 2s ease-in-out infinite;}
#boot-sub{font-size:10px;letter-spacing:.5em;color:var(--g2);margin:10px 0 30px;text-transform:uppercase;}
#boot-log{width:min(360px,86vw);font-size:10px;color:var(--g2);min-height:120px;line-height:1.8;text-align:left;}
#boot-log .bl{opacity:0;animation:fi .2s forwards;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:20px;overflow:hidden;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 10px var(--g);transition:width .3s;}
#btn-start{margin-top:30px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron';font-size:12px;letter-spacing:.4em;padding:15px 45px;cursor:pointer;text-transform:uppercase;}
#btn-start:hover{background:var(--g);color:#000;box-shadow:0 0 30px var(--g);}

/* INTERFACE */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#vp{position:relative;flex:1;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.5) contrast(1.4) saturate(0.9);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

/* VIRTUAL OVERLAY */
#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
background-size: 100% 2px, 3px 100%; pointer-events: none;}

.hc{position:absolute;width:60px;height:60px;z-index:10;pointer-events:none;border:1px solid rgba(0,255,65,0.1);}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 8px var(--g);}
.hc::before{width:2px;height:25px;}.hc::after{width:25px;height:2px;}
#hc-tl{top:15px;left:15px;}#hc-tl::before{top:0;left:0;}#hc-tl::after{top:0;left:0;}
#hc-tr{top:15px;right:15px;}#hc-tr::before{top:0;right:0;}#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:15px;left:15px;}#hc-bl::before{bottom:0;left:0;}#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:15px;right:15px;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}

#xhair{position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;width:40px;height:40px;margin:-20px;}
#xhair::before{content:'';position:absolute;top:50%;left:0;width:100%;height:1px;background:var(--border);}
#xhair::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--border);}

#radar{position:absolute;top:50%;left:50%;z-index:7;width:10px;height:10px;margin:-5px;
border-radius:50%;background:var(--r);pointer-events:none;box-shadow:0 0 15px var(--r);
animation:rpulse 3s ease-out infinite;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);}
#sys-id{font-family:'Orbitron';font-weight:900;font-size:14px;letter-spacing:3px;color:var(--g);text-shadow:0 0 10px var(--g);}
.badge{font-size:9px;padding:4px 10px;border:1px solid var(--border);background:var(--panel);color:var(--g2);margin-left:6px;text-transform:uppercase;}
.badge.hi{border-color:var(--g);color:var(--g);}

#night-btn{position:absolute;top:60px;left:20px;z-index:20;background:rgba(0,0,0,0.4);border:1px solid var(--border);color:var(--g);font-size:10px;padding:6px 12px;cursor:pointer;letter-spacing:1px;transition:0.3s;}
#night-btn:hover{border-color:var(--b);color:var(--b);}

#statbar{position:absolute;bottom:108px;left:0;right:0;z-index:15;display:flex;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sc{flex:1;padding:10px;font-size:8px;letter-spacing:1px;color:var(--g2);text-align:center;border-right:1px solid var(--border);}
.sc span{display:block;color:var(--g);font-size:12px;font-weight:900;margin-top:4px;}

#info-panel{position:absolute;bottom:108px;left:0;right:0;z-index:100;background:var(--panel);border-top:3px solid var(--g);padding:20px;transform:translateY(100%);transition:0.4s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-close{position:absolute;top:15px;right:20px;background:none;border:1px solid var(--r);color:var(--r);font-size:10px;padding:5px 12px;cursor:pointer;font-family:'Share Tech Mono';}
#info-title{font-family:'Orbitron';font-size:20px;font-weight:900;letter-spacing:2px;color:var(--g);margin-bottom:10px;cursor:pointer;}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:11px;border-top:1px solid var(--border);padding-top:15px;}
.ik{color:#555;text-transform:uppercase;}.iv{color:var(--g);font-weight:bold;}

#terminal{flex:0 0 108px;background:#000;border-top:1px solid var(--border);padding:10px 20px;overflow:hidden;z-index:20;position:relative;}
#terminal::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.02) 2px, rgba(0,255,0,0.02) 4px);pointer-events:none;}
#term-lines{font-size:10px;line-height:1.6;}
.tl{opacity:0;animation:si .2s forwards;}
.talert{color:var(--r);text-shadow:0 0 5px var(--r);}.twarn{color:var(--o);}.tinfo{color:var(--b);}.tok{color:var(--g);}

@keyframes gpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.7;transform:scale(0.98);}}
@keyframes rpulse{0%{transform:scale(1);opacity:0.8;}100%{transform:scale(10);opacity:0;}}
@keyframes si{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 100%;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE v4.5</div>
  <div id="boot-sub">advanced tactical overlay // apex core</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">initiate link</button>
</div>

<div id="app">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="xhair"></div><div id="radar"></div>
    <button id="night-btn" onclick="toggleNight()">☾ OPTICS: STD</button>

    <div id="topbar">
      <div id="sys-id">NEURAL_APEX.v4</div>
      <div id="badges">
        <span class="badge hi" id="b-fps">-- FPS</span>
        <span class="badge" id="b-obj">0 OBJ</span>
        <span class="badge" id="b-mem">MEM: CLR</span>
      </div>
    </div>

    <div id="statbar">
      <div class="sc">THREATS<span id="s-thr">0</span></div>
      <div class="sc">RANGE_MAX<span id="s-dist">---</span></div>
      <div class="sc">UPLINK_CONF<span id="s-conf">---%</span></div>
      <div class="sc">TRACKS_ACT<span id="s-trk">0</span></div>
    </div>

    <div id="info-panel">
      <button id="info-close" onclick="closeInfo()">✕ DISMISS</button>
      <div id="info-title" onclick="renameObject()">---</div>
      <div id="info-grid"></div>
      <div id="info-desc" style="margin-top:15px; font-size:10px; color:var(--g2); line-height:1.5;"></div>
    </div>
  </div>

  <div id="terminal">
    <div id="term-lines"></div>
  </div>
</div>

<script>
const DEFAULT_ALIASES = {
  person: 'ИНФИЛЬТРАТОР', car: 'МОБИЛЬ', truck: 'ТРАНСПОРТЕР', bus: 'ШАТТЛ',
  dog: 'БИО_ДРОИД', cat: 'БИО_ДРОИД', 'cell phone': 'ТЕРМИНАЛ', backpack: 'ГРУЗ'
};

let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');

const CFG = {
  FOCAL: 950, CONF: 0.15, MAX_DET: 40, SMOOTH: 0.22, TTL: 40, IOU: 0.3
};

const OBJ_H = {
  person: 1.75, car: 1.5, truck: 2.8, dog: 0.5, 'cell phone': 0.15, default: 1.0
};

const THREATS = new Set(['person', 'car', 'truck', 'motorcycle']);

const COL = {
  person: '#ffff00', car: '#ff2244', truck: '#ff4400', 'cell phone': '#00aaff', _d: '#00ff41'
};

class Tracker {
  constructor() { this.tracks = {}; this.nid = 1; }
  update(preds) {
    for (const k in this.tracks) {
      this.tracks[k].age++;
      this.tracks[k].active = false;
      if (this.tracks[k].age > CFG.TTL) delete this.tracks[k];
    }
    for (const p of preds) {
      let best = null, bs = CFG.IOU;
      for (const id in this.tracks) {
        const t = this.tracks[id];
        if (t.cls !== p.class) continue;
        const s = this.iou(t.sm, p.bbox);
        if (s > bs) { bs = s; best = t; }
      }
      if (best) {
        const oldPos = [...best.sm];
        best.sm = best.sm.map((v, i) => v + (p.bbox[i] - v) * CFG.SMOOTH);
        best.vec = [best.sm[0] - oldPos[0], best.sm[1] - oldPos[1]]; // Вектор движения
        best.score = p.score; best.age = 0; best.active = true;
        p._tid = best.id;
      } else {
        const id = this.nid++;
        this.tracks[id] = { id, cls: p.class, sm: [...p.bbox], vec: [0, 0], score: p.score, age: 0, active: true, ocr: this.genHex() };
        p._tid = id;
      }
    }
    return Object.values(this.tracks).filter(t => t.age < 2);
  }
  iou(a, b) {
    const ix = Math.max(a[0], b[0]), iy = Math.max(a[1], b[1]);
    const iw = Math.min(a[0] + a[2], b[0] + b[2]) - ix, ih = Math.min(a[1] + a[3], b[1] + b[3]) - iy;
    if (iw <= 0 || ih <= 0) return 0;
    return (iw * ih) / (a[2] * a[3] + b[2] * b[3] - iw * ih);
  }
  genHex() { return '0x' + Math.random().toString(16).slice(2, 10).toUpperCase(); }
}

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tracker = new Tracker();
let model, running = false, lastPred = [], lastFpsT = 0, fpsCnt = 0, nightMode = false, selTid = null;
let termQ = [], logThr = {};

async function bootSeq() {
  const logEl = document.getElementById('boot-log');
  const STEPS = ["INITIALIZING APEX CORE...", "LINKING NEURAL_NET: COCO-SSD", "CALIBRATING OPTICS...", "SYNCING LOCAL MEMORY...", "READY."];
  for(let i=0; i<STEPS.length; i++) {
    await new Promise(r => setTimeout(r, 400));
    const d = document.createElement('div'); d.className='bl'; d.textContent='> ' + STEPS[i];
    logEl.appendChild(d); document.getElementById('pb').style.width = ((i+1)*20)+'%';
  }
  model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  document.getElementById('btn-start').style.display = 'block';
}

async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    running = true;
    log("APEX_OS ONLINE. ALL SYSTEMS GREEN.", "ok");
    requestAnimationFrame(renderLoop);
  };
}

function log(txt, type='ok') {
  termQ.push({ txt, type });
  if (termQ.length > 5) termQ.shift();
  const el = document.getElementById('term-lines');
  el.innerHTML = '';
  termQ.forEach(q => {
    const d = document.createElement('div'); d.className = `tl t${q.type}`; d.textContent = `> ${q.txt}`; el.appendChild(d);
  });
}

function toggleNight() {
  nightMode = !nightMode;
  video.style.filter = nightMode ? 'brightness(0.3) contrast(2.5) saturate(0) sepia(1) hue-rotate(100deg)' : 'brightness(.5) contrast(1.4) saturate(0.9)';
  document.getElementById('night-btn').textContent = nightMode ? '☾ OPTICS: NIGHT' : '☾ OPTICS: STD';
  log(nightMode ? "NIGHT_VISION ACTIVATED" : "STANDARD SPECTRUM", "info");
}

function drawASCII(x, y, w, h, col) {
  const chars = "X01%$#@".split("");
  ctx.font = "12px 'Share Tech Mono'";
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.2;
  for (let i = x; i < x + w; i += 12) {
    for (let j = y; j < y + h; j += 14) {
      if (Math.random() > 0.3) ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i, j);
    }
  }
  ctx.globalAlpha = 1;
}

async function renderLoop(now) {
  if (!running) return;
  fpsCnt++;
  if (now - lastFpsT > 1000) {
    document.getElementById('b-fps').textContent = fpsCnt + ' FPS';
    fpsCnt = 0; lastFpsT = now;
  }

  if (video.readyState === 4) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const raw = await model.detect(video, CFG.MAX_DET, CFG.CONF);
    lastPred = tracker.update(raw);
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawHUD();
  updateStats();
  requestAnimationFrame(renderLoop);
}

function drawHUD() {
  const cX = canvas.width / 2, cY = canvas.height / 2;
  
  lastPred.forEach(p => {
    const [x, y, w, h] = p.sm;
    const col = COL[p.cls] || COL._d;
    const name = USER_MEM[p.cls] || DEFAULT_ALIASES[p.cls] || p.cls.toUpperCase();
    const isSel = p.id === selTid;
    const dist = Math.min(999, (CFG.FOCAL * (OBJ_H[p.cls] || 1.0) / h).toFixed(1));

    // Направленные линии (Паутина)
    ctx.setLineDash([2, 8]);
    ctx.strokeStyle = isSel ? col : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(x + w/2, y + h/2); ctx.stroke();
    ctx.setLineDash([]);

    // Ночной режим
    if (nightMode) drawASCII(x, y, w, h, col);

    // Рамка (Corners + Pulse)
    ctx.strokeStyle = col;
    ctx.lineWidth = isSel ? 3 : 1;
    ctx.strokeRect(x, y, w, h);
    
    // Вектор движения
    ctx.beginPath();
    ctx.moveTo(x + w/2, y + h/2);
    ctx.lineTo(x + w/2 + p.vec[0]*10, y + h/2 + p.vec[1]*10);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    // Заголовки (Уменьшенные)
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(x, y - 22, 90, 22);
    ctx.fillStyle = col;
    ctx.font = "bold 10px 'Orbitron'";
    ctx.fillText(name, x + 5, y - 8);
    ctx.font = "9px 'Share Tech Mono'";
    ctx.fillText(`${dist}m | ${p.ocr}`, x + 5, y + h + 12);
  });
}

function updateStats() {
  let thr = 0, maxD = 0, conf = 0;
  lastPred.forEach(p => {
    if (THREATS.has(p.cls)) thr++;
    const d = parseFloat((CFG.FOCAL * (OBJ_H[p.cls] || 1.0) / p.sm[3]).toFixed(1));
    if (d > maxD) maxD = d;
    conf += p.score;
  });
  document.getElementById('s-thr').textContent = thr;
  document.getElementById('s-dist').textContent = maxD > 0 ? maxD + 'm' : '---';
  document.getElementById('s-conf').textContent = lastPred.length ? Math.round((conf/lastPred.length)*100)+'%' : '---';
  document.getElementById('s-trk').textContent = lastPred.length;
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * sx, cy = (e.clientY - rect.top) * sy;

  const hit = lastPred.find(p => cx > p.sm[0] && cx < p.sm[0]+p.sm[2] && cy > p.sm[1] && cy < p.sm[1]+p.sm[3]);
  if (hit) {
    selTid = hit.id;
    const name = USER_MEM[hit.cls] || DEFAULT_ALIASES[hit.cls] || hit.cls.toUpperCase();
    document.getElementById('info-title').textContent = name;
    document.getElementById('info-title').dataset.cls = hit.cls;
    document.getElementById('info-grid').innerHTML = `<div class="ik">ID_REF</div><div class="iv">${hit.ocr}</div><div class="ik">TRACK_ID</div><div class="iv">#${hit.id}</div><div class="ik">PROBABILITY</div><div class="iv">${Math.round(hit.score*100)}%</div><div class="ik">CLASS</div><div class="iv">${hit.cls}</div>`;
    document.getElementById('info-panel').classList.add('open');
    log(`LOCKED ON: ${name}`, "talert");
  } else {
    closeInfo();
  }
});

function closeInfo() { selTid = null; document.getElementById('info-panel').classList.remove('open'); }

function renameObject() {
  const cls = document.getElementById('info-title').dataset.cls;
  const n = prompt("NEW ALIAS:", USER_MEM[cls] || cls);
  if (n) { USER_MEM[cls] = n.toUpperCase(); localStorage.setItem('myeye_mem', JSON.stringify(USER_MEM)); location.reload(); }
}

bootSeq();
</script>
</body>
</html>
