<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro | Neural HUD v15.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<style>
:root {
  --g: #00ff41; --g2: #00cc33; --g3: #003a12;
  --b: #00aaff; --r: #ff3333; --y: #ffe600;
  --o: #ff9900; --p: #cc44ff;
  --panel: rgba(2,8,4,.94);
  --border: rgba(0,255,65,.18);
  --card-h: 180px;
  --term-h: 150px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family: 'Share Tech Mono', monospace; color: var(--g);
  -webkit-tap-highlight-color: transparent; user-select: none;
}

/* BOOT SCREEN */
#boot {
  position: fixed; inset: 0; background: #000; z-index: 300;
  display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px;
}
#boot-hex { position:absolute; inset:0; overflow:hidden; opacity:.05; pointer-events:none; }
#boot-hex svg { width:100%; height:100%; }
#boot-logo-wrap { position: relative; margin-bottom: 10px; }
#boot-logo {
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em; color: transparent;
}
.bc {
  display: inline-block; opacity: 0; color: var(--g);
  text-shadow: 0 0 24px rgba(0,255,65,.55);
  animation: charDrop .55s cubic-bezier(.22,1,.36,1) forwards;
}
#boot-logo-g {
  position: absolute; inset: 0; font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: clamp(42px, 12vw, 82px); letter-spacing: .18em; color: var(--g);
  opacity: 0; animation: glitchLoop 5s 1.6s infinite;
}
#boot-scan {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent, var(--g), transparent);
  animation: scanDown 3s ease-in-out infinite;
}
#boot-sub { font-size: 8px; letter-spacing: .45em; color: var(--g2); text-transform: uppercase; margin: 8px 0 22px; opacity: 0; animation: fadeUp .5s .95s forwards; }
#boot-log { width: min(360px, 88vw); font-size: 8.5px; color: var(--g2); min-height: 90px; line-height: 2; }
.bl.ok::before { content: '✔ '; color: var(--g); }
.bl.warn::before { content: '⚡ '; color: var(--o); }
#pb-wrap { width: min(360px, 88vw); margin-top: 16px; }
#pb-track { height: 2px; background: var(--g3); }
#pb { height: 100%; width: 0; background: var(--g); transition: width .35s; }
#btn-start {
  margin-top: 32px; display: none; background: none; border: 1px solid var(--g);
  color: var(--g); font-family: 'Orbitron', sans-serif; font-size: 10px;
  letter-spacing: .35em; padding: 13px 44px; cursor: pointer;
}

/* APP LAYOUT */
#app { position: fixed; inset: 0; display: none; flex-direction: column; }
#vp { position: relative; flex: 1; min-height: 0; overflow: hidden; background: #000; }
video { display: none; }
#output_canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
#grid-ov { position: absolute; inset: 0; z-index: 3; opacity: .025; background-image: linear-gradient(var(--g) 1px, transparent 1px), linear-gradient(90deg, var(--g) 1px, transparent 1px); background-size: 48px 48px; }
#alert-flash { position: absolute; inset: 0; z-index: 6; pointer-events: none; opacity: 0; }
#alert-flash.on { animation: alertFlash 1.2s ease-out forwards; }

/* HUD Elements */
#topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 15; display: flex; justify-content: space-between; padding: 10px 14px; pointer-events: none;}
#sys-id { font-family:'Orbitron', sans-serif; font-size:13px; font-weight:900; letter-spacing:.2em; }
.badge { font-size:7.5px; padding:3px 8px; border:1px solid var(--border); background:var(--panel); color:var(--g2); display:flex; align-items:center; gap:4px; margin-bottom: 2px;}
.bdot { width:4px; height:4px; border-radius:50%; background:var(--g); animation:dotBlink 1.5s infinite; }
#cache-badge { position: absolute; top: 45px; left: 14px; font-size: 7px; color: rgba(0,255,65,.3); z-index: 16; }

/* Info Card */
#info-card {
  flex: 0 0 var(--card-h); background: rgba(1,5,2,.99); border-top: 1px solid var(--g);
  position: relative; z-index: 30; max-height: 0; transition: max-height .28s; overflow: hidden;
}
#info-card.open { max-height: var(--card-h); pointer-events: all; }
#ic-body { padding: 12px; }
#ic-name { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
#ic-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; font-size: 8px; }
.ick { color: rgba(0,255,65,.4); }
#ic-tbar { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
#ic-tt { flex: 1; height: 4px; background: var(--g3); }
#ic-tf { height: 100%; width: 0; background: var(--g); }

/* Terminal */
#terminal-wrap { flex: 0 0 var(--term-h); background: #000; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
#term-header { padding: 4px 12px; display: flex; justify-content: space-between; font-size: 7px; border-bottom: 1px solid var(--border); }
#term-body { flex: 1; overflow-y: auto; padding: 4px 12px; font-size: 8px; }
.trow { display: grid; grid-template-columns: 60px 70px 1fr 60px; gap: 5px; margin-bottom: 2px; opacity: 0; animation: rowIn .2s forwards; }

@keyframes charDrop { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:none; } }
@keyframes scanDown { 0% { top:0; opacity:0; } 50% { opacity:1; } 100% { top:100%; opacity:0; } }
@keyframes alertFlash { 0% { opacity:1; background:rgba(255,51,51,0.2); } 100% { opacity:0; } }
@keyframes dotBlink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
@keyframes rowIn { from { opacity:0; transform:translateX(-5px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex"><svg viewBox="0 0 800 600"><defs><pattern id="hxp" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse"><polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/></pattern></defs><rect width="100%" height="100%" fill="url(#hxp)"/></svg></div>
  <div id="boot-logo-wrap">
    <div id="boot-logo"><span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span></div>
    <div id="boot-logo-g">myEYE</div>
    <div id="boot-scan"></div>
  </div>
  <div id="boot-sub">Neural HUD Interface v15.0</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div></div>
  <button id="btn-start" onclick="startApp()">ACTIVATE SYSTEM</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="grid-ov"></div>
    <div id="alert-flash"></div>
    <div id="topbar">
      <div id="sys-id">myEYE <small>// PRO</small></div>
      <div id="badges">
        <div class="badge"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge"><span class="bdot"></span><span id="obj-txt">SCANNING</span></div>
      </div>
    </div>
    <div id="cache-badge">CACHE: 0 CLASSES</div>
  </div>

  <div id="info-card">
    <div id="ic-body">
      <div id="ic-name" onclick="renameObj()">---</div>
      <div id="ic-grid"></div>
      <div id="ic-tbar">
        <div style="font-size:7px">THREAT</div>
        <div id="ic-tt"><div id="ic-tf"></div></div>
        <div id="ic-tv" style="font-size:8px">0%</div>
      </div>
      <button onclick="closeCard()" style="margin-top:10px; background:none; border:1px solid var(--g); color:var(--g); font-size:8px; padding:4px 8px;">✕ CLOSE</button>
    </div>
  </div>

  <div id="terminal-wrap">
    <div id="term-header"><span>SYSTEM LOG</span><span onclick="clearLog()" style="cursor:pointer">CLEAR</span></div>
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';
const CACHE_KEY = 'myeye_v15_data';
let UC = JSON.parse(localStorage.getItem(CACHE_KEY)) || { aliases:{}, counts:{}, events:[] };

const GROUPS = { person:'HUMAN', car:'VEHICLE', dog:'ANIMAL', 'cell phone':'DEVICE' };
const GCOL = { HUMAN:'#00ff41', VEHICLE:'#ff3333', ANIMAL:'#ffe600', DEVICE:'#00aaff', OBJECT:'#ffffff' };

let detector, poseModel, poseResult, poseBox, poseCanvas, poseCtx;
let lastObjects = [], selectedCls = null, detecting = false, poseRunning = false;
let frameN = 0, fpsN = 0, lastFpsT = 0;

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');

function saveCache() {
  localStorage.setItem(CACHE_KEY, JSON.stringify(UC));
  document.getElementById('cache-badge').textContent = `CACHE: ${Object.keys(UC.counts).length} CLS / ${UC.events.length} EVT`;
}

function sysLog(evt, type, group) {
  const row = document.createElement('div');
  row.className = 'trow';
  row.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><span style="color:var(--g2)">${type}</span><span style="color:#fff">${evt}</span><span>${group}</span>`;
  const body = document.getElementById('term-body');
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

async function initModels() {
  const bLog = (txt) => {
    const d = document.createElement('div'); d.className = 'bl ok'; d.textContent = txt;
    document.getElementById('boot-log').appendChild(d);
  };
  bLog('CORE: LOADING TENSORFLOW...');
  detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  bLog('CORE: DETECTOR READY');
  
  poseModel = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}` });
  poseModel.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5 });
  poseModel.onResults(res => { poseResult = res; poseRunning = false; });
  await poseModel.initialize();
  
  bLog('CORE: NEURAL HUD ACTIVE');
  document.getElementById('pb').style.width = '100%';
  document.getElementById('btn-start').style.display = 'block';
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => {
    video.srcObject = s;
    video.play();
    requestAnimationFrame(renderLoop);
  });
}

async function renderLoop() {
  if (video.readyState < 2) return requestAnimationFrame(renderLoop);
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  fpsN++;
  if (performance.now() - lastFpsT > 1000) {
    document.getElementById('fps-txt').textContent = fpsN + ' FPS';
    fpsN = 0; lastFpsT = performance.now();
  }

  if (!detecting) {
    detecting = true;
    detector.detect(video).then(objs => { lastObjects = objs; detecting = false; });
  }

  drawHUD();
  
  // Pose Processing
  const p = lastObjects.find(o => o.class === 'person');
  if (p && !poseRunning && frameN % 3 === 0) {
    poseRunning = true;
    const [bx, by, bw, bh] = p.bbox;
    if (!poseCanvas) { poseCanvas = document.createElement('canvas'); poseCtx = poseCanvas.getContext('2d'); }
    poseCanvas.width = bw; poseCanvas.height = bh;
    poseCtx.drawImage(video, bx, by, bw, bh, 0, 0, bw, bh);
    poseBox = { bx, by, bw, bh };
    poseModel.send({ image: poseCanvas });
  }
  
  drawPose();
  frameN++;
  requestAnimationFrame(renderLoop);
}

function drawHUD() {
  lastObjects.forEach(obj => {
    const [x, y, w, h] = obj.bbox;
    const col = GCOL[GROUPS[obj.class]] || '#fff';
    ctx.strokeStyle = col;
    ctx.lineWidth = (obj.class === selectedCls) ? 4 : 2;
    ctx.strokeRect(x, y, w, h);
    
    ctx.fillStyle = col;
    ctx.font = '12px Share Tech Mono';
    const name = UC.aliases[obj.class] || obj.class.toUpperCase();
    ctx.fillText(name, x, y - 5);
  });
  document.getElementById('obj-txt').textContent = lastObjects.length + ' TARGETS';
}

function drawPose() {
  if (!poseResult || !poseResult.poseLandmarks || !poseBox) return;
  const { bx, by, bw, bh } = poseBox;
  const pts = poseResult.poseLandmarks;
  
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#00ff41';
  
  // Рисуем кости (упрощенно)
  const connections = [[11,12], [11,23], [12,24], [23,24], [11,13], [13,15], [12,14], [14,16]];
  connections.forEach(([a, b]) => {
    if (pts[a].visibility > 0.5 && pts[b].visibility > 0.5) {
      ctx.beginPath();
      ctx.moveTo(bx + pts[a].x * bw, by + pts[a].y * bh);
      ctx.lineTo(bx + pts[b].x * bw, by + pts[b].y * bh);
      ctx.stroke();
    }
  });

  // Голова
  if (pts[0].visibility > 0.5) {
    ctx.beginPath();
    ctx.ellipse(bx + pts[0].x * bw, by + pts[0].y * bh - 10, 15, 20, 0, 0, Math.PI*2);
    ctx.stroke();
  }
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const hit = lastObjects.find(o => {
    const [x,y,w,h] = o.bbox;
    return mx > x && mx < x+w && my > y && my < y+h;
  });

  if (hit) {
    selectedCls = hit.class;
    document.getElementById('ic-name').textContent = UC.aliases[hit.class] || hit.class.toUpperCase();
    document.getElementById('ic-grid').innerHTML = `<div class="ick">CLASS</div><div>${hit.class}</div><div class="ick">SCORE</div><div>${Math.round(hit.score*100)}%</div>`;
    document.getElementById('ic-tf').style.width = '40%';
    document.getElementById('info-card').classList.add('open');
    sysLog(`LOCKED: ${hit.class}`, 'TRACKING', 'HUD');
  }
});

function closeCard() { document.getElementById('info-card').classList.remove('open'); selectedCls = null; }

function renameObj() {
  const cls = selectedCls;
  const nn = prompt("NEW ALIAS FOR " + cls);
  if (nn) { UC.aliases[cls] = nn.toUpperCase(); saveCache(); document.getElementById('ic-name').textContent = nn.toUpperCase(); }
}

function clearLog() { document.getElementById('term-body').innerHTML = ''; }

initModels();
</script>
</body>
</html>
