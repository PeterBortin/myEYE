<!DOCTYPE html><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Vision Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: none;
            border: 20px solid rgba(0, 255, 100, 0.1); box-sizing: border-box;
        }
        .label { position: absolute; color: #0f6; font-size: 12px; text-shadow: 0 0 5px #0f6; }
        #btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: none; border: 1px solid #0f6; color: #0f6;
            cursor: pointer; z-index: 20; text-transform: uppercase;
        }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <button id="btn">Инициализировать протокол CV</button>
    
    <div id="ui">
        <div class="label" style="top:30px; left:30px;">STATUS: SCANNING...</div>
        <div class="label" style="top:30px; right:30px;">REC ●</div>
        <div class="label" style="bottom:30px; left:30px;" id="data">ISO: 800 | BW: 40MHz</div>
    </div>

    <!-- Подключаем Three.js из CDN -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const btn = document.getElementById('btn');
        const ui = document.getElementById('ui');
        let video, scene, camera, renderer, material;

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 },
                    audio: false
                });
                
                initScene(stream);
                ui.style.display = 'block';
            } catch (err) {
                console.error(err);
                alert("Ошибка доступа: " + err.message);
                btn.style.display = 'block';
            }
        });

        function initScene(stream) {
            video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const texture = new THREE.VideoTexture(video);

            // КАСТОМНЫЙ ШЕЙДЕР (Комбинируем все эффекты с ваших фото)
            const shaderCode = {
                vertex: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragment: `
                    uniform sampler2D tDiffuse;
                    uniform float time;
                    varying vec2 vUv;

                    void main() {
                        vec2 uv = vUv;
                        
                        // 1. Глитч-смещение (image_5)
                        float shift = sin(time * 10.0 + uv.y * 20.0) * 0.005 * step(0.9, sin(time * 5.0));
                        uv.x += shift;

                        // 2. Эффект точек/пикселизации (image_2)
                        float dots = 150.0; 
                        vec2 gridUv = floor(uv * dots) / dots;
                        vec4 color = texture2D(tDiffuse, gridUv);

                        // 3. Расчет яркости
                        float brightness = (color.r + color.g + color.b) / 3.0;

                        // 4. Стилизация под изумрудный/синий (image_3)
                        vec3 digitalTint = vec3(0.0, 1.0, 0.7); 
                        if(brightness < 0.2) color.rgb *= 0.1; // Глубокие тени

                        // 5. Скан-линии (image_4)
                        float scanline = sin(uv.y * 400.0 + time * 5.0) * 0.1;
                        
                        // Итоговый микс
                        vec3 finalColor = color.rgb * digitalTint + scanline;
                        
                        // Добавляем шум
                        float noise = fract(sin(dot(uv, vec2(12.9898,78.233)*time)) * 43758.5453);
                        finalColor += noise * 0.05;

                        gl_FragColor = vec4(finalColor * brightness * 1.5, 1.0);
                    }
                `
            };

            material = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: texture },
                    time: { value: 0 }
                },
                vertexShader: shaderCode.vertex,
                fragmentShader: shaderCode.fragment
            });

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (material) {
                material.uniforms.time.value += 0.05;
            }
            renderer.render(scene, camera);
            
            // Динамические данные в UI
            if(Math.random() > 0.9) {
                document.getElementById('data').innerText = `ISO: ${Math.floor(Math.random()*1200)} | BW: ${ (Math.random()*100).toFixed(2) }MHz`;
            }
        }
    </script>
</body>
</html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Vision CV Filter</title>
    <style>
        /* Mobile-first стили */
        :root {
            --ui-color: #33ff33; /* Ярко-зеленый (image_0, image_4) */
            --bg-color: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--ui-color);
            font-family: 'Courier New', Courier, monospace; /* Моноширинный шрифт (image_4) */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер для UI и Canvas */
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Видео скрыто, canvas используется для вывода */
        video {
            display: none;
        }

        #output-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполнить экран, сохраняя пропорции */
            display: none; /* Скрыт до старта */
        }

        /* Кнопка запроса разрешения */
        #start-btn {
            background: transparent;
            border: 2px solid var(--ui-color);
            color: var(--ui-color);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        #start-btn:hover {
            background: var(--ui-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--ui-color);
        }

        /* UI Оверлей (как в image_4) */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Не мешать нажатиям */
            display: none;
            z-index: 50;
        }

        .ui-element {
            position: absolute;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; text-align: right; }
        .bottom-left { bottom: 20px; left: 20px; }
        .center-mark {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
        }

        /* Анимация мигания для UI */
        @keyframes blink { 50% { opacity: 0; } }
        .blink { animation: blink 1s linear infinite; }

        /* Кадрирование (черные полосы как в image_0) */
        #cinematic-bars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none; z-index: 60;
            display: none;
        }
        .bar { background: rgba(0,0,0,0.8); height: 10%; width: 100%; }

    </style>
</head>
<body>

    <div id="app-container">
        <button id="start-btn">Включить цифровое зрение</button>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        
        <div id="ui-overlay">
            <div class="ui-element top-left">
                SYS_STATUS: <span class="blink">ONLINE</span><br>
                MODE: CV_SCAN<br>
                FILT: DOTS_GLITCH
            </div>
            <div class="ui-element top-right">
                REC <span style="color:red" class="blink">●</span><br>
                <span id="time-display">00:00:00</span>
            </div>
            <div class="ui-element bottom-left">
                [ AI_MODEL: SERIOUS_FX ]<br>
                [ TARGET_DETECT: ENABLED ]
            </div>
            <div class="ui-element center-mark">[ + ]</div>
        </div>

        <div id="cinematic-bars">
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/serious-effects@1.1.2/dist/serious-effects.js"></script>
    
    <script>
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const uiOverlay = document.getElementById('ui-overlay');
        const cinematicBars = document.getElementById('cinematic-bars');
        const timeDisplay = document.getElementById('time-display');

        startBtn.addEventListener('click', async () => {
            startBtn.innerText = 'Запрашиваю камеру...';
            try {
                // 1. Запрос разрешения
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user', // Селфи-камера (как в image_0)
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                video.srcObject = stream;
                
                // Ждем пока видео начнет играть, чтобы получить размеры
                await new Promise(resolve => video.onloadedmetadata = resolve);
                video.play();

                // 2. Инициализация фильтра
                initSeriousEffects();

                // 3. Показ UI
                startBtn.style.display = 'none';
                canvas.style.display = 'block';
                uiOverlay.style.display = 'block';
                cinematicBars.style.display = 'flex';
                startTimeDisplay();

            } catch (error) {
                console.error('Ошибка доступа:', error);
                startBtn.innerText = 'Ошибка. Попробуйте снова';
                alert('Не удалось получить доступ к камере. Убедитесь, что вы дали разрешение.');
            }
        });

        // Основная функция настройки фильтра
        function initSeriousEffects() {
            // Создаем менеджер эффектов, привязываем его к canvas
            const fx = new SeriousEffects.Manager(canvas);

            // Настраиваем canvas под размер видеопотока
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // --- ДОБАВЛЕНИЕ ЭФФЕКТОВ ---
            // Мы собираем цепочку эффектов, чтобы они накладывались друг на друга

            // Эффект 1: Базовое ч/б с тонированием (image_3)
            // serious-effects не имеет встроенного tint, мы симулируем его через ColorMatrix
            fx.addEffect(new SeriousEffects.Effects.ColorMatrix({
                matrix: [
                    0.2, 0.2, 0.2, 0, 0,  // R: Низкий R, чтобы уйти в бирюзу
                    0.5, 0.5, 0.5, 0, 0.5, // G: Высокий G (image_0, image_3)
                    0.7, 0.7, 0.7, 0, 0.7, // B: Высокий B (image_2, image_3)
                    0,   0,   0,   1, 0   // A
                ]
            }));

            // Эффект 2: Точечная сетка (как в image_2, image_4)
            // dotScreen создает эффект газетной печати/старого монитора
            fx.addEffect(new SeriousEffects.Effects.DotScreen({
                scale: 1.0,  // Размер точек (меньше = плотнее)
                angle: 1.1, // Угол наклона сетки
                center: { x: 0.5, y: 0.5 }
            }));

            // Эффект 3: Глитч и искажение (image_1, image_5)
            // badTV симулирует помехи старого ТВ
            fx.addEffect(new SeriousEffects.Effects.BadTV({
                distortion: 2.0, // Сила искажения
                distortion2: 1.0,
                speed: 0.1,      // Скорость анимации
                rollSpeed: 0     // Вертикальная прокрутка
            }));

            // Эффект 4: RGB сдвиг (хроматическая аберрация как в image_5)
            // RGBShift делает картинку более «цифровой»
            fx.addEffect(new SeriousEffects.Effects.RGBShift({
                amount: 0.005, // Сила сдвига
                angle: 0.0     // Угол сдвига
            }));
            
            // Эффект 5: Сканирующие линии (CRT линии, как в image_4, image_5)
            fx.addEffect(new SeriousEffects.Effects.Film({
                grayscale: false,
                sIntensity: 0.3, // Интенсивность скан-линий
                nIntensity: 0.2, // Интенсивность шума
                sCount: 400     // Количество линий
            }));


            // --- ЗАПУСК ЦИКЛА РЕНДЕРИНГА ---
            function render() {
                // SeriousEffects автоматически берет кадр из video,
                // применяет шейдеры и рисует на canvas.
                fx.render(video);
                requestAnimationFrame(render);
            }

            render();
        }

        // Обновление времени в UI
        function startTimeDisplay() {
            function update() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                timeDisplay.innerText = `${h}:${m}:${s}`;
                requestAnimationFrame(update);
            }
            update();
        }

    </script>
</body>
</html>
