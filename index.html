<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE OS v3.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g),0 0 60px #004400;animation:gpulse 2s ease-in-out infinite;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(--g2);min-height:115px;line-height:1.9;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px;
letter-spacing:.3em;padding:13px 42px;cursor:pointer;transition:all .2s;}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp-container { position: relative; flex: 1; overflow: hidden; background: #000; }
#vp-clipper { position: absolute; inset: 0; transition: transform 0.1s ease-out; transform-origin: center; }

video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.55) contrast(1.38) saturate(.88);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

/* CAMERA CONTROLS */
#cam-ui { position: absolute; right: 15px; top: 70px; z-index: 100; display: flex; flex-direction: column; gap: 20px; align-items: center; }
.side-btn { 
    width: 50px; height: 50px; border: 1px solid var(--border); background: var(--panel); 
    color: var(--g2); font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px;
}
.side-btn:active { background: var(--g); color: #000; }
.side-btn span { font-size: 16px; margin-bottom: 2px; }

#zoom-box { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--g2); font-size: 9px; }
#zoom-range { 
    appearance: none; width: 100px; height: 2px; background: var(--g3); 
    transform: rotate(-90deg) translateY(-45px); cursor: pointer;
}
#zoom-range::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--g); }

/* HUD ELEMENTS */
#vp-container::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(0,255,65,.016) 3px,rgba(0,255,65,.016) 4px);
animation:scanroll 10s linear infinite;}

.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 5px var(--g);}
.hc::before{width:2px;height:20px;}.hc::after{width:20px;height:2px;}
#hc-tl{top:10px;left:10px;} #hc-tr{top:10px;right:10px;transform:rotate(90deg);}
#hc-bl{bottom:10px;left:10px;transform:rotate(-90deg);} #hc-br{bottom:10px;right:10px;transform:rotate(180deg);}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:.2em;color:var(--g);}
#badges{display:flex;gap:5px;}
.badge{font-size:8px;padding:3px 8px;border:1px solid var(--border);background:var(--panel);color:var(--g2);}
.badge.hi{border-color:var(--g);color:var(--g);}

#statbar{position:absolute;bottom:0;left:0;right:0;z-index:15;display:flex;gap:1px;pointer-events:none;}
.sc{flex:1;padding:5px;background:var(--panel);border-top:1px solid var(--border);font-size:7px;color:var(--g2);text-align:center;}
.sc span{display:block;color:var(--g);font-size:10px;font-weight:bold;}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(2,8,4,.97);border-top:2px solid var(--g);
padding:12px 16px 10px;transform:translateY(100%);
transition:transform .28s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}

#terminal{flex:0 0 auto;height:100px;background:var(--bg);border-top:1px solid var(--border);padding:7px 14px;overflow:hidden;}
#term-lines{font-size:9px;line-height:1.6;}
.tl{opacity:0;animation:si .18s forwards;}
.tinfo{color:var(--b);}.twarn{color:var(--o);}.talert{color:var(--r);}.ttap{color:var(--y);}

@keyframes gpulse{0%,100%{text-shadow:0 0 20px var(--g);}50%{text-shadow:0 0 45px var(--g);}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 120px;}}
@keyframes si{from{opacity:0;transform:translateX(-5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">INITIALIZE ACCESS</button>
</div>

<div id="app" style="display:none;">
  <div id="vp-container">
    <div id="vp-clipper">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>

    <div id="cam-ui">
        <button class="side-btn" onclick="toggleFlash()" id="flash-btn"><span>☼</span>FLASH</button>
        <button class="side-btn" onclick="takeSnapshot()"><span>▣</span>SNAP</button>
        <button class="side-btn" onclick="toggleNight()"><span>☾</span>MODE</button>
        <div id="zoom-box">
            <input type="range" id="zoom-range" min="1" max="4" step="0.1" value="1" oninput="setZoom(this.value)">
            <div id="zoom-val">1.0x</div>
        </div>
    </div>

    <div id="topbar">
      <div id="sys-id">myEYE v3.5</div>
      <div id="badges">
        <div class="badge hi" id="b-fps">-- FPS</div>
        <div class="badge hi" id="b-obj">0 OBJ</div>
      </div>
    </div>

    <div id="statbar">
      <div class="sc">THREATS<span id="s-thr">0</span></div>
      <div class="sc">DIST MAX<span id="s-dist">---</span></div>
      <div class="sc">SENSITIVITY<span id="s-conf">---%</span></div>
    </div>

    <div id="info-panel">
      <button onclick="closeInfo()" style="float:right; background:none; border:1px solid var(--g); color:var(--g); font-size:9px; padding:2px 10px;">CLOSE</button>
      <div id="info-title" style="font-family:'Orbitron'; font-weight:700; margin-bottom:10px;">---</div>
      <div id="info-grid" style="display:grid; grid-template-columns: 1fr 1fr; font-size:10px;"></div>
    </div>
  </div>

  <div id="terminal">
    <div id="term-lines"></div>
  </div>
</div>

<script>
const DEFAULT_ALIASES = { person: 'СУБЪЕКТ', car: 'АВТОМОБИЛЬ', cell_phone: 'ТЕРМИНАЛ' };
let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');
let model=null, running=false, lastPred=[], lastFpsT=0, fpsCnt=0;
let termQ=[], logThr={}, nightMode=false, selTid=null, videoTrack=null;

const tracker = { 
    tracks: {}, 
    nid: 1,
    update(preds) {
        // Упрощенная логика трекинга для примера
        return preds.map(p => { p.id = Math.floor(Math.random()*100); return p; });
    }
};

async function bootSeq(){
  const log = document.getElementById('boot-log');
  const pb = document.getElementById('pb');
  const steps = ["MOUNTING SENSORS...", "LOADING COCO-SSD LITE...", "STABILIZING OPTICS...", "READY."];
  for(let i=0; i<steps.length; i++){
    await new Promise(r=>setTimeout(r, 600));
    log.innerHTML += `> ${steps[i]}<br>`;
    pb.style.width = ((i+1)/steps.length*100)+'%';
  }
  model = await cocoSsd.load({base:'lite_mobilenet_v2'});
  document.getElementById('btn-start').style.display='block';
}

async function initCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    videoTrack = stream.getVideoTracks()[0];
    document.getElementById('video').srcObject = stream;
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    running = true;
    requestAnimationFrame(renderLoop);
    log("VISION_SYSTEM ONLINE", "tinfo");
  } catch(e) { alert("Camera access denied."); }
}

function setZoom(val) {
    document.getElementById('vp-clipper').style.transform = `scale(${val})`;
    document.getElementById('zoom-val').textContent = parseFloat(val).toFixed(1) + 'x';
}

async function toggleFlash() {
    if(!videoTrack) return;
    const caps = videoTrack.getCapabilities();
    if(!caps.torch) return log("HARDWARE: NO FLASH", "talert");
    const current = videoTrack.getSettings().torch;
    await videoTrack.applyConstraints({ advanced: [{ torch: !current }] });
    log(`FLASH: ${!current ? 'ON' : 'OFF'}`, "twarn");
}

function takeSnapshot() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    const temp = document.createElement('canvas');
    temp.width = v.videoWidth; temp.height = v.videoHeight;
    const ctx = temp.getContext('2d');
    ctx.drawImage(v, 0, 0);
    ctx.drawImage(c, 0, 0, temp.width, temp.height);
    
    const link = document.createElement('a');
    link.download = `EYE_CAPTURE_${Date.now()}.png`;
    link.href = temp.toDataURL();
    link.click();
    log("SNAPSHOT SAVED TO STORAGE", "tinfo");
}

function toggleNight() {
    nightMode = !nightMode;
    document.getElementById('video').style.filter = nightMode ? 
        'brightness(0.5) contrast(2.5) saturate(0) sepia(1) hue-rotate(80deg)' : 
        'brightness(.55) contrast(1.38) saturate(.88)';
    log(`SENSORS: ${nightMode ? 'NIGHT_VISION' : 'STANDARD'}`, "twarn");
}

async function renderLoop(now){
  if(!running) return;
  fpsCnt++;
  if(now - lastFpsT > 1000){
    document.getElementById('b-fps').textContent = fpsCnt + ' FPS';
    fpsCnt=0; lastFpsT=now;
  }

  const v = document.getElementById('video');
  const c = document.getElementById('canvas');
  if(v.readyState === 4){
    c.width = v.videoWidth; c.height = v.videoHeight;
    const raw = await model.detect(v, 20, 0.2);
    lastPred = raw;
    draw(c.getContext('2d'), c.width, c.height);
    updateHUD();
  }
  requestAnimationFrame(renderLoop);
}

function draw(ctx, w, h){
  ctx.clearRect(0,0,w,h);
  lastPred.forEach(p => {
    const [x,y,bw,bh] = p.bbox;
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 2;
    ctx.strokeRect(x,y,bw,bh);
    ctx.fillStyle = '#00ff41';
    ctx.font = "12px Share Tech Mono";
    ctx.fillText(`${p.class.toUpperCase()} [${Math.round(p.score*100)}%]`, x, y-5);
  });
}

function updateHUD(){
    document.getElementById('b-obj').textContent = lastPred.length + ' OBJ';
    document.getElementById('s-thr').textContent = lastPred.filter(p=>p.class==='person').length;
    if(lastPred.length > 0) {
        document.getElementById('s-conf').textContent = Math.round(lastPred[0].score * 100) + '%';
    }
}

function log(txt, type){
    const d = document.createElement('div');
    d.className = `tl ${type}`;
    d.textContent = `> ${txt}`;
    const term = document.getElementById('term-lines');
    term.prepend(d);
    if(term.childNodes.length > 5) term.lastChild.remove();
}

bootSeq();
</script>
</body>
</html>
