<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINATOR_VISION v14.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.2) contrast(1.5); }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            color: #00ff41; font-size: 12px; text-shadow: 0 0 5px #00ff41;
            pointer-events: none; line-height: 1.4;
        }
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00ff41; letter-spacing: 2px;
        }
        button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 30px; cursor: pointer; font-family: inherit; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <div id="status-text">SYSTEM: READY_FOR_SCAN</div>
    <button onclick="startSystem()">INITIALIZE VISION</button>
</div>

<div id="container">
    <div id="hud">
        CORE: ACTIVE<br>
        SCAN_MODE: SYMBOLIC_DECONSTRUCTION<br>
        <div id="log"></div>
    </div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('log');
    
    let cocoModel, bpModel;
    const SYMBOLS = "01$#@%&*+=:-. ".split("");

    async function startSystem() {
        document.getElementById('status-text').innerText = "LOADING NEURAL_NETS...";
        try {
            // Инициализация моделей
            [cocoModel, bpModel] = await Promise.all([
                cocoSsd.load(),
                bodyPix.load({
                    architecture: 'MobileNetV1',
                    outputStride: 16,
                    multiplier: 0.5
                })
            ]);

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('boot-screen').style.display = 'none';
                render();
            };
        } catch (err) {
            alert("INIT_ERROR: " + err);
        }
    }

    async function render() {
        // Очищаем и рисуем текущий кадр видео как фон
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            // 1. Детекция объектов (машины, предметы и т.д.)
            const objects = await cocoModel.detect(video, 5, 0.4);
            
            // 2. Сегментация людей (для символьного силуэта)
            const segmentation = await bpModel.segmentPerson(video, {
                internalResolution: 'low', // Важно для скорости
                segmentationThreshold: 0.6
            });

            // РИСУЕМ СИМВОЛЬНЫЙ СИЛУЭТ (МАТРИЦА)
            drawSymbolicMask(segmentation);

            // РИСУЕМ РАМКИ ДЛЯ ОСТАЛЬНЫХ ОБЪЕКТОВ
            objects.forEach(obj => {
                if (obj.class !== 'person') { // Людей мы уже "отрисовали" символами
                    drawObjectUI(obj);
                }
            });

        } catch (e) {
            console.error(e);
        }

        requestAnimationFrame(render);
    }

    function drawSymbolicMask(seg) {
        const step = 10; // Шаг сетки (чем меньше, тем плотнее символы)
        ctx.font = "bold 10px Courier New";
        ctx.fillStyle = "#00ff41";

        for (let y = 0; y < seg.height; y += step) {
            for (let x = 0; x < seg.width; x += step) {
                const index = y * seg.width + x;
                // Если нейросеть говорит, что это человек (1)
                if (seg.data[index] === 1) {
                    const char = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    // Добавляем эффект "цифрового шума" через прозрачность
                    ctx.globalAlpha = Math.random() * 0.7 + 0.3;
                    ctx.fillText(char, x, y);
                }
            }
        }
        ctx.globalAlpha = 1.0;
    }

    function drawObjectUI(obj) {
        const [x, y, w, h] = obj.bbox;
        ctx.strokeStyle = "#ff0000"; // Красный для тех, кто не человек
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(x, y, w, h);
        
        ctx.fillStyle = "#ff0000";
        ctx.font = "10px Courier New";
        ctx.fillText(`ID: ${obj.class.toUpperCase()}`, x, y - 5);
        
        // Маленький терминал слева
        if (Math.random() > 0.9) {
            const line = `> TARGET: ${obj.class} DIST: ${Math.round(2000/w)}m`;
            log.innerHTML = line + "<br>" + log.innerHTML.split("<br>").slice(0, 5).join("<br>");
        }
    }
</script>
</body>
</html>
