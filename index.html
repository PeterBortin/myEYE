<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE | Neural HUD Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
:root{ --g:#00ff41; --panel:rgba(2,8,4,.7); --blue:#00aaff; }
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--g);}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:42px;color:var(--g);text-shadow:0 0 15px var(--g);}
#pb-wrap{width:260px;height:2px;background:#111;margin-top:20px;}
#pb{height:100%;width:0;background:var(--g);transition:width .3s;}
#btn-start{margin-top:30px;display:none;background:none;border:1px solid var(--g);color:var(--g);padding:15px 40px;cursor:pointer;font-family:'Orbitron';text-transform:uppercase;}

#app{position:fixed;inset:0;display:none;flex-direction:column;}
#vp{position:relative;flex:1;background:#000;}
video{display:none;}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;display:flex;justify-content:space-between;padding:15px;pointer-events:none;}
.badge{font-size:10px;padding:4px 10px;border:1px solid rgba(0,255,65,.3);background:var(--panel);}

#terminal{height:100px;background:#000;border-top:1px solid rgba(0,255,65,0.2);padding:10px;font-size:11px;overflow:hidden;display:flex;flex-direction:column-reverse;}
.tl{color:#00cc33;margin-bottom:2px;border-left:2px solid #003a12;padding-left:5px;}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log" style="font-size:10px; margin-top:10px;">ADAPTIVE OPTICS CALIBRATION...</div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="startApp()">START SYSTEM</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="topbar">
      <div style="font-family:'Orbitron'; font-weight:700;">HUD_v11.5 // MULTI_SCAN_LENS</div>
      <div>
        <span class="badge" id="b-fps">0 FPS</span>
        <span class="badge" id="b-obj">SCANNING...</span>
      </div>
    </div>
  </div>
  <div id="terminal"></div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

let objectDetector, lastFps = 0, frameCount = 0;
const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d');

// Инициализация Pose
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true, minDetectionConfidence: 0.5 });

async function initModels() {
  objectDetector = await cocoSsd.load();
  await pose.initialize();
  document.getElementById('pb').style.width = '100%';
  document.getElementById('boot-log').innerText = "CALIBRATION COMPLETE";
  document.getElementById('btn-start').style.display = 'block';
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const camera = new Camera(videoElement, {
    onFrame: async () => { await draw(); },
    width: 1280, height: 720
  });
  camera.start();
}

// Глобальные переменные для хранения данных по каждому человеку
let currentDetectionBox = null;

pose.onResults((results) => {
  if (!results.poseLandmarks || !currentDetectionBox) return;
  
  const { x, y, w, h } = currentDetectionBox;
  const landmarks = results.poseLandmarks;

  // 1. Рисуем КРАСНЫЙ СИЛУЭТ (только внутри кропа)
  if (results.segmentationMask) {
    canvasCtx.save();
    offscreenCanvas.width = canvasElement.width;
    offscreenCanvas.height = canvasElement.height;
    offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    offscreenCtx.drawImage(results.segmentationMask, x, y, w, h);
    offscreenCtx.globalCompositeOperation = 'source-in';
    offscreenCtx.fillStyle = 'rgba(255, 0, 0, 0.3)';
    offscreenCtx.fillRect(0,0, offscreenCanvas.width, offscreenCanvas.height);
    canvasCtx.drawImage(offscreenCanvas, 0, 0);
    canvasCtx.restore();
  }

  // 2. Рисуем СКЕЛЕТ
  // Корректируем координаты точек под размер всего экрана
  const adjustedLandmarks = landmarks.map(lp => ({
    ...lp,
    x: (lp.x * w + x) / canvasElement.width,
    y: (lp.y * h + y) / canvasElement.height
  }));

  drawConnectors(canvasCtx, adjustedLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 3});
  drawLandmarks(canvasCtx, adjustedLandmarks, {color: '#00ff41', fillColor: '#00ff41', lineWidth: 1, radius: 2});

  // 3. ОВАЛ ГОЛОВЫ
  const nose = adjustedLandmarks[0];
  const leftEar = adjustedLandmarks[7];
  const rightEar = adjustedLandmarks[8];
  const dx = (rightEar.x - leftEar.x) * canvasElement.width;
  const dy = (rightEar.y - leftEar.y) * canvasElement.height;
  const distance = Math.sqrt(dx*dx + dy*dy);
  const headRadiusW = distance * 0.8; 
  const headRadiusH = headRadiusW * 1.3;

  canvasCtx.beginPath();
  canvasCtx.ellipse(nose.x * canvasElement.width, (nose.y * canvasElement.height) - (headRadiusH * 0.2), headRadiusW, headRadiusH, 0, 0, Math.PI * 2);
  canvasCtx.strokeStyle = '#00ff41';
  canvasCtx.lineWidth = 2;
  canvasCtx.stroke();
});

async function draw() {
  const w = canvasElement.width = videoElement.videoWidth;
  const h = canvasElement.height = videoElement.videoHeight;
  if(w === 0) return;

  canvasCtx.drawImage(videoElement, 0, 0, w, h);

  const objs = await objectDetector.detect(videoElement);
  document.getElementById('b-obj').innerText = objs.length + " TARGETS";

  for (const o of objs) {
    if(o.class === 'person') {
      // Рисуем рамку человека
      canvasCtx.strokeStyle = 'rgba(0, 255, 65, 0.4)';
      canvasCtx.setLineDash([5, 5]);
      canvasCtx.strokeRect(...o.bbox);
      canvasCtx.setLineDash([]);

      // ЗАПУСКАЕМ СКАН ПОЗЫ ДЛЯ ЭТОГО КОНКРЕТНОГО УЧАСТКА
      currentDetectionBox = { x: o.bbox[0], y: o.bbox[1], w: o.bbox[2], h: o.bbox[3] };
      
      // Создаем временный кроп для нейронки
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = o.bbox[2];
      tempCanvas.height = o.bbox[3];
      tempCanvas.getContext('2d').drawImage(videoElement, o.bbox[0], o.bbox[1], o.bbox[2], o.bbox[3], 0, 0, o.bbox[2], o.bbox[3]);
      
      await pose.send({image: tempCanvas});
    } else {
      // Рисуем синие объекты
      canvasCtx.strokeStyle = '#00aaff';
      canvasCtx.strokeRect(...o.bbox);
      canvasCtx.fillStyle = '#00aaff';
      canvasCtx.font = '12px Share Tech Mono';
      canvasCtx.fillText(o.class.toUpperCase(), o.bbox[0], o.bbox[1] - 5);
    }
  }

  frameCount++;
  const now = performance.now();
  if (now - lastFps > 1000) {
    document.getElementById('b-fps').innerText = frameCount + " FPS";
    frameCount = 0; lastFps = now;
  }
}

initModels();
</script>
</body>
</html>
