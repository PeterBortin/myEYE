<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v12.0 | NEURAL_SILHOUETTE</title>
    
    <!-- TensorFlow.js Core -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- Модель для детекции (рамки) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- Модель для сегментации (силуэты) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

    <style>
        :root { --main: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--main); }
        #viewport { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3) contrast(1.2); z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        button { background: none; border: 1px solid var(--main); color: var(--main); padding: 15px 40px; cursor: pointer; letter-spacing: 3px; font-family: inherit; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 20; font-size: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-left: 3px solid var(--main); }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom:20px; font-size:12px; letter-spacing:5px;">SYSTEM_V12: INITIALIZING SEGMENTATION_CORE</div>
    <button onclick="init()">START NEURAL_SCAN</button>
</div>

<div id="viewport">
    <div class="hud" id="stats">STATUS: STANDBY<br>FPS: 0</div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const stats = document.getElementById('stats');
    
    let detector, segmenter;
    const ASCII = "01$#@%&*+=:-. ".split("");
    let lastTime = 0;

    async function init() {
        document.querySelector('button').innerText = "LOADING MODELS...";
        try {
            // Загрузка моделей параллельно
            [detector, segmenter] = await Promise.all([
                cocoSsd.load(),
                bodyPix.load({
                    architecture: 'MobileNetV1',
                    outputStride: 16,
                    multiplier: 0.5,
                    quantBytes: 2
                })
            ]);

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = stream;
            
            document.getElementById('overlay').style.display = 'none';
            render();
        } catch (e) {
            alert("FATAL_ERROR: " + e.message);
        }
    }

    async function render(now) {
        const fps = Math.round(1000 / (now - lastTime));
        lastTime = now;
        stats.innerHTML = `STATUS: ACTIVE_SCAN<br>FPS: ${fps}<br>ENGINE: BODY_PIX_V1`;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // 1. Детекция объектов (для рамок и типов)
        const predictions = await detector.detect(video);
        
        // 2. Сегментация (для точного силуэта человека)
        // Мы делаем сегментацию в низком разрешении для скорости
        const segmentation = await segmenter.segmentPerson(video, {
            flipHorizontal: false,
            internalResolution: 'medium',
            segmentationThreshold: 0.7
        });

        // Очистка и отрисовка кадра
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // ЭФФЕКТ МАТРИЦЫ ПО СИЛУЭТУ
        drawMatrixSilhouette(segmentation);

        // Отрисовка стандартных рамок COCO-SSD
        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            ctx.strokeStyle = "#00ff41";
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = "#00ff41";
            ctx.font = "10px Courier New";
            ctx.fillText(`> ${p.class.toUpperCase()} [${Math.round(p.score*100)}%]`, x, y - 5);
        });

        requestAnimationFrame(render);
    }

    function drawMatrixSilhouette(seg) {
        const step = 8; // Плотность символов. Чем меньше, тем детальнее.
        const data = seg.data; // Массив 0 и 1 (1 - это человек)
        const width = seg.width;
        
        ctx.font = "bold 9px Courier New";
        
        for (let y = 0; y < canvas.height; y += step) {
            for (let x = 0; x < canvas.width; x += step) {
                // Проверяем, попадает ли точка в маску нейросети
                const index = y * width + x;
                if (data[index] === 1) {
                    const char = ASCII[Math.floor(Math.random() * ASCII.length)];
                    
                    // Эффект "свечения"
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "#00ff41";
                    ctx.fillStyle = `rgba(0, 255, 65, ${Math.random() * 0.8 + 0.2})`;
                    
                    ctx.fillText(char, x, y);
                }
            }
        }
        // Сброс тени для производительности
        ctx.shadowBlur = 0;
    }
</script>
</body>
</html>
