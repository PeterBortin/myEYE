<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE v4.0 PRO | FUSION CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41; --y:#ffff00; --r:#ff2244; --b:#00aaff; --p:#cc00ff;
  --bg:#000; --panel:rgba(2,8,4,.98); --border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;}

#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:40px;color:var(--g);text-shadow:0 0 20px var(--g);}
#pb-wrap{width:260px;height:2px;background:#111;margin-top:20px;}
#pb{height:100%;width:0;background:var(--g);transition:width .2s;}
#btn-start{margin-top:30px;display:none;background:none;border:1px solid var(--g);color:var(--g);padding:10px 30px;cursor:pointer;font-family:'Orbitron';}

#app{position:fixed;inset:0;display:flex;flex-direction:column;visibility:hidden;}
#vp{position:relative;flex:1;overflow:hidden;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;filter:brightness(0.7);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#aim-dot{position:absolute;top:50%;left:50%;width:8px;height:8px;background:var(--r);border-radius:50%;transform:translate(-50%,-50%);z-index:10;box-shadow:0 0 15px var(--r);border:2px solid #fff;}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:100;background:var(--panel);border-top:4px solid var(--g);padding:20px;transform:translateY(100%);transition:transform 0.3s;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-title{font-family:'Orbitron';font-size:24px;color:var(--r);margin-bottom:10px;text-transform:uppercase;}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;border-bottom:1px solid #333;padding-bottom:10px;}
#info-desc{margin-top:10px;font-size:13px;line-height:1.4;}

#terminal{height:100px;background:#050505;border-top:1px solid #222;padding:10px;font-size:10px;color:var(--g2);overflow:hidden;}
.tl{margin-bottom:2px;opacity:0.8;}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE PRO</div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">INITIALIZE SYSTEM</button>
</div>

<div id="app">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="aim-dot"></div>
    <div id="info-panel">
      <div id="info-title">TARGET_DATA</div>
      <div id="info-grid"></div>
      <div id="info-desc"></div>
      <button onclick="closeInfo()" style="margin-top:15px;background:none;border:1px solid #666;color:#666;padding:5px 10px;">CLOSE</button>
    </div>
  </div>
  <div id="terminal" id="term-lines"></div>
</div>

<script>
const ALIASES = {
  person: {n: 'СУБЪЕКТ', c: '#00ff41'}, // Зеленый
  car: {n: 'АВТОМОБИЛЬ', c: '#ffff00'}, // Желтый
  truck: {n: 'ГРУЗОВИК', c: '#ffff00'},
  bus: {n: 'АВТОБУС', c: '#ffff00'},
  bicycle: {n: 'ВЕЛОСИПЕД', c: '#00aaff'}, // Голубой
  dog: {n: 'ОБЪЕКТ_БИО', c: '#cc00ff'}, // Фиолетовый
  cat: {n: 'ОБЪЕКТ_БИО', c: '#cc00ff'},
  cell_phone: {n: 'ТЕРМИНАЛ', c: '#ff9900'},
  default: {n: 'ОБЪЕКТ', c: '#ffffff'}
};

const CFG = { CONF: 0.3, SMOOTH: 0.15 }; // Уменьшен SMOOTH для более быстрой реакции рамок
let model, lastPreds = [], tracks = {}, selId = null;

async function bootSeq() {
  const pb = document.getElementById('pb');
  model = await cocoSsd.load({ base: 'mobilenet_v2' });
  pb.style.width = '100%';
  document.getElementById('btn-start').style.display = 'block';
}

async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').style.visibility = 'visible';
    detectLoop(); // Цикл нейросети
    renderLoop(); // Цикл отрисовки
  };
}

// Тяжелый цикл детекции (работает медленнее отрисовки)
async function detectLoop() {
  if (video.readyState === 4) {
    const predictions = await model.detect(video, 10, CFG.CONF);
    processTracks(predictions);
  }
  setTimeout(detectLoop, 60); // ~15 FPS для нейросети достаточно
}

function processTracks(preds) {
  const now = Date.now();
  preds.forEach(p => {
    let id = p.class; // В данном примере упрощенный трекинг по классу
    if (!tracks[id]) {
      tracks[id] = { pos: p.bbox, cls: p.class, ocr: generatePlate(p.class), score: p.score };
    } else {
      tracks[id].targetPos = p.bbox; // Обновляем целевую позицию
      tracks[id].score = p.score;
    }
    tracks[id].lastSeen = now;
  });
}

// Легкий цикл отрисовки (60 FPS для плавности)
function renderLoop() {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const now = Date.now();

  for (let id in tracks) {
    let t = tracks[id];
    if (now - t.lastSeen > 1000) { delete tracks[id]; continue; }

    // Интерполяция позиции (Lerp) для плавности
    if (t.targetPos) {
      for (let i = 0; i < 4; i++) {
        t.pos[i] += (t.targetPos[i] - t.pos[i]) * CFG.SMOOTH;
      }
    }

    drawObject(ctx, t, id === selId);
  }
  requestAnimationFrame(renderLoop);
}

function drawObject(ctx, t, isSel) {
  const [x, y, w, h] = t.pos;
  const info = ALIASES[t.cls] || ALIASES.default;
  const color = isSel ? '#ff2244' : info.c;

  // Отрисовка пунктира к центру
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = isSel ? color : 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height/2);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Рамка
  ctx.strokeStyle = color;
  ctx.lineWidth = isSel ? 4 : 2;
  ctx.strokeRect(x, y, w, h);

  // Тайтл (Крупный)
  ctx.fillStyle = color;
  ctx.font = "bold 22px Orbitron";
  ctx.fillRect(x, y - 35, ctx.measureText(info.n).width + 20, 35);
  ctx.fillStyle = "#000";
  ctx.fillText(info.n, x + 10, y - 10);

  // Номер/OCR (если авто)
  if (t.ocr) {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(x, y + h, w, 25);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Share Tech Mono";
    ctx.fillText(t.ocr, x + 5, y + h + 18);
  }
}

function generatePlate(cls) {
  if (!['car', 'truck', 'bus'].includes(cls)) return "SCANNING_TEXT...";
  const r = (l) => l[Math.floor(Math.random() * l.length)];
  const letters = "ABCEHIKMOPTX";
  const nums = "0123456789";
  return `${r(letters)}${r(letters)} ${r(nums)}${r(nums)}${r(nums)}${r(nums)} ${r(letters)}${r(letters)}`;
}

// Клик для выбора объекта
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const ty = (e.clientY - rect.top) * (canvas.height / rect.height);

  for (let id in tracks) {
    const [x, y, w, h] = tracks[id].pos;
    if (tx > x && tx < x + w && ty > y && ty < y + h) {
      showInfo(id, tracks[id]);
      return;
    }
  }
  closeInfo();
});

function showInfo(id, t) {
  selId = id;
  const info = ALIASES[t.cls] || ALIASES.default;
  document.getElementById('info-title').textContent = info.n;
  document.getElementById('info-grid').innerHTML = `
    <div>ID: #00${id.toUpperCase()}</div><div>CONF: ${Math.round(t.score*100)}%</div>
    <div>OCR_DATA: ${t.ocr}</div><div>STATUS: TRACKING</div>
  `;
  document.getElementById('info-desc').innerHTML = `Объект классифицирован как <b>${t.cls}</b>. Анализ поведения в норме. Код захвата: ${generateOCR()}.`;
  document.getElementById('info-panel').classList.add('open');
}

function generateOCR() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function closeInfo() { selId = null; document.getElementById('info-panel').classList.remove('open'); }

bootSeq();
</script>
</body>
</html>
