<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>myEYE // VISION OS v5.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root {
  --g: #00ff41; --g-low: rgba(0,255,65,0.15); --g-mid: rgba(0,255,65,0.4);
  --y: #ffe600; --o: #ff9900; --r: #ff2244; --b: #00c8ff;
  --bg: #010603; --panel: rgba(1,8,4,0.92);
  --glow: 0 0 15px rgba(0,255,65,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
body, html { width: 100%; height: 100%; background: #000; overflow: hidden;
  font-family: 'Share Tech Mono', monospace; color: var(--g);
  user-select: none; -webkit-tap-highlight-color: transparent; }

/* --- BOOT SCREEN --- */
#boot { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
#boot-logo { font-family: 'Orbitron', sans-serif; font-size: 54px; font-weight: 900; letter-spacing: 0.2em; text-shadow: var(--glow); margin-bottom: 20px; }
#boot-log { width: 320px; font-size: 10px; color: var(--g-mid); height: 120px; overflow: hidden; line-height: 1.6; }
.boot-line { animation: fadeIn 0.1s forwards; }
.progress-bar { width: 320px; height: 2px; background: #002208; margin-top: 15px; position: relative; }
#progress-fill { height: 100%; width: 0%; background: var(--g); box-shadow: 0 0 10px var(--g); transition: width 0.1s; }

/* --- APP LAYOUT --- */
#app { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; transition: opacity 1s; }
#viewport { position: relative; flex: 1; background: #000; overflow: hidden; }
video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6) contrast(1.2); }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

/* --- HUD OVERLAYS --- */
.scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,255,65,0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 5; }
#vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 140%); z-index: 6; pointer-events: none; }

/* Top Bar */
#top-hud { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
.sys-info { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; }
.sys-stats { display: flex; gap: 15px; }
.stat-box { border: 1px solid var(--g-low); background: var(--panel); padding: 4px 10px; font-size: 10px; display: flex; align-items: center; gap: 6px; }
.dot { width: 4px; height: 4px; background: var(--g); border-radius: 50%; animation: blink 1s infinite; }

/* Terminal */
#terminal { height: 140px; background: var(--bg); border-top: 1px solid var(--g-low); padding: 10px 15px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column-reverse; scroll-behavior: smooth; }
.t-row { display: flex; gap: 10px; margin-bottom: 4px; opacity: 0.8; animation: t-in 0.2s ease-out forwards; }
.t-ts { color: var(--g-mid); min-width: 60px; }
.t-msg { word-break: break-all; }
.t-warn { color: var(--o); } .t-crit { color: var(--r); text-shadow: 0 0 5px var(--r); }

/* Info Panel */
#info-side { position: absolute; right: -300px; top: 80px; width: 260px; background: var(--panel); border: 1px solid var(--g-low); padding: 15px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; pointer-events: all; }
#info-side.active { right: 20px; }
.info-h { font-family: 'Orbitron'; font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid var(--g-mid); padding-bottom: 5px; }
.info-row { display: flex; justify-content: space-between; font-size: 11px; margin: 6px 0; }
.info-val { color: #fff; text-shadow: 0 0 5px var(--g); }

/* Buttons */
.btn-core { background: transparent; border: 1px solid var(--g); color: var(--g); padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
.btn-core:hover { background: var(--g); color: #000; box-shadow: var(--glow); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes t-in { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-log"></div>
  <div class="progress-bar"><div id="progress-fill"></div></div>
  <button id="start-btn" class="btn-core" style="display:none; margin-top:30px;" onclick="startSystem()">INITIALIZE LINK</button>
</div>

<div id="app">
  <div id="viewport">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scanline"></div>
    <div id="vignette"></div>
    
    <div id="top-hud">
      <div class="sys-info">VISION OS // V5.2<br><span style="font-size:9px; opacity:0.5;">ENCRYPTED NEURAL LINK</span></div>
      <div class="sys-stats">
        <div class="stat-box"><div class="dot"></div> <span id="fps-val">00</span> FPS</div>
        <div class="stat-box" style="border-color:var(--r); color:var(--r);"><div class="dot" style="background:var(--r);"></div> <span id="obj-count">0</span> DETECTED</div>
      </div>
    </div>

    <div id="info-side">
      <div class="info-h" id="info-name">TARGET</div>
      <div class="info-row"><span>PROBABILITY</span><span class="info-val" id="info-conf">0%</span></div>
      <div class="info-row"><span>EST. DISTANCE</span><span class="info-val" id="info-dist">0.0m</span></div>
      <div class="info-row"><span>SECTOR</span><span class="info-val" id="info-sect">A-1</span></div>
      <div style="margin-top:15px; font-size:10px; color:var(--g-mid); line-height:1.4;" id="info-desc">
        Awaiting data packet from neural core...
      </div>
      <button class="btn-core" style="width:100%; margin-top:15px; font-size:10px;" onclick="closeInfo()">RELEASE LOCK</button>
    </div>
  </div>

  <div id="terminal"></div>
</div>

<script>
let model, tracker = {}, selectedId = null;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const term = document.getElementById('terminal');

const CONFIG = {
  threshold: 0.45,
  colors: { person: '#ffe600', car: '#00c8ff', default: '#00ff41' },
  labels: { person: 'HUMAN', car: 'VEHICLE', chair: 'OBJECT' }
};

// --- LOGGING ---
function log(msg, type = '') {
  const row = document.createElement('div');
  row.className = `t-row ${type}`;
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  row.innerHTML = `<span class="t-ts">[${ts}]</span><span class="t-msg">${msg}</span>`;
  term.prepend(row);
  if (term.childNodes.length > 50) term.lastChild.remove();
}

// --- BOOT SEQUENCE ---
async function boot() {
  const logEl = document.getElementById('boot-log');
  const fill = document.getElementById('progress-fill');
  const steps = [
    "Initializing Neural Kernel...",
    "Calibrating Vision Matrix...",
    "Loading COCO-SSD Weights...",
    "Establishing Camera Handshake...",
    "System Ready."
  ];

  for (let i = 0; i < steps.length; i++) {
    const p = document.createElement('div');
    p.className = 'boot-line';
    p.textContent = `> ${steps[i]}`;
    logEl.appendChild(p);
    fill.style.width = `${(i + 1) * 20}%`;
    await new Promise(r => setTimeout(r, 600));
  }
  
  model = await cocoSsd.load();
  document.getElementById('start-btn').style.display = 'block';
}

async function startSystem() {
  const stream = await navigator.mediaDevices.getUserMedia({ 
    video: { facingMode: 'environment', width: 1280 }, 
    audio: false 
  });
  video.srcObject = stream;
  video.play();
  
  document.getElementById('boot').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').style.opacity = '1';
    log("NEURAL LINK ESTABLISHED", "t-warn");
    requestAnimationFrame(render);
  }, 1000);
}

// --- RENDER LOOP ---
let lastTime = 0;
async function render(now) {
  const fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  document.getElementById('fps-val').textContent = fps;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  const predictions = await model.detect(video);
  processDetections(predictions);
  
  drawHUD(predictions);
  requestAnimationFrame(render);
}

function processDetections(preds) {
  document.getElementById('obj-count').textContent = preds.length;
  preds.forEach(p => {
    const key = p.class + Math.round(p.bbox[0]);
    if (!tracker[key]) {
      log(`NEW TARGET: ${p.class.toUpperCase()} IN SECTOR ${Math.random() > 0.5 ? 'B-3' : 'A-1'}`);
      tracker[key] = true;
    }
  });
}

function drawHUD(preds) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  preds.forEach(p => {
    const [x, y, w, h] = p.bbox;
    const col = CONFIG.colors[p.class] || CONFIG.colors.default;
    const isSelected = selectedId === p.class + x;

    // Corner Accents
    ctx.strokeStyle = col;
    ctx.lineWidth = isSelected ? 4 : 2;
    const len = 20;
    
    // Draw corners
    ctx.beginPath();
    ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
    ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
    ctx.moveTo(x + w, y + h - len); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - len, y + h);
    ctx.moveTo(x + len, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - len);
    ctx.stroke();

    // Fill & Noise
    ctx.fillStyle = isSelected ? `rgba(${parseInt(col.slice(1,3),16)},200,65,0.15)` : 'rgba(0,255,65,0.03)';
    ctx.fillRect(x, y, w, h);

    // Dynamic Label
    ctx.fillStyle = col;
    ctx.font = "bold 12px 'Orbitron'";
    ctx.fillText(`${p.class.toUpperCase()} // ${Math.round(p.score * 100)}%`, x, y - 10);
    
    // Scan bar inside box
    const scanY = y + (Math.sin(Date.now() / 200) * 0.5 + 0.5) * h;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(x, scanY, w, 1);
    ctx.globalAlpha = 1.0;
  });
}

// --- INTERACTION ---
window.addEventListener('mousedown', e => {
  // Простая симуляция выбора объекта кликом
  const side = document.getElementById('info-side');
  side.classList.add('active');
  log("TARGET LOCKED: MANUAL OVERRIDE", "t-crit");
});

function closeInfo() {
  document.getElementById('info-side').classList.remove('active');
  log("TARGET RELEASED");
}

boot();
</script>
</body>
</html>
