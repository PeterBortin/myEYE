<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE Pro | Neural HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root {
  --g:  #00ff41;  --g2: #00cc33;  --g3: #003a12;
  --b:  #00aaff;  --r:  #ff3333;  --y:  #ffe600;
  --o:  #ff9900;  --p:  #cc44ff;
  --panel: rgba(2,8,4,.94);
  --border: rgba(0,255,65,.18);
  --card-h: 180px;
  --term-h: 150px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: var(--g);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ══════════════════════════════════
   BOOT SCREEN
══════════════════════════════════ */
#boot {
  position: fixed; inset: 0; background: #000; z-index: 300;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 24px; gap: 0;
}
#boot-hex { position:absolute; inset:0; overflow:hidden; opacity:.05; pointer-events:none; }
#boot-hex svg { width:100%; height:100%; }
#boot-logo-wrap { position: relative; margin-bottom: 10px; line-height: 1; }
#boot-logo {
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: transparent;
}
.bc {
  display: inline-block;
  opacity: 0;
  color: var(--g);
  text-shadow: 0 0 24px rgba(0,255,65,.55), 0 0 60px rgba(0,255,65,.18);
  animation: charDrop .55s cubic-bezier(.22,1,.36,1) forwards;
}
.bc:nth-child(1){animation-delay:.05s}
.bc:nth-child(2){animation-delay:.18s}
.bc:nth-child(3){animation-delay:.31s}
.bc:nth-child(4){animation-delay:.44s}
.bc:nth-child(5){animation-delay:.57s}

#boot-logo-g {
  position: absolute; inset: 0;
  font-family: 'Orbitron', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 12vw, 82px);
  letter-spacing: .18em;
  white-space: nowrap;
  color: var(--g);
  opacity: 0; pointer-events: none;
  animation: glitchLoop 5s 1.6s infinite;
}
#boot-scan {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent, var(--g), transparent);
  box-shadow: 0 0 12px var(--g);
  animation: scanDown 3s ease-in-out infinite;
}
#boot-sub {
  font-size: 8px; letter-spacing: .45em; color: var(--g2); text-transform: uppercase;
  margin: 8px 0 22px; opacity: 0; animation: fadeUp .5s .95s forwards;
}
#boot-log {
  width: min(360px, 88vw); font-size: 8.5px; color: var(--g2);
  min-height: 90px; line-height: 2;
}
#boot-log .bl {
  opacity: 0; animation: fadeUp .18s forwards;
  padding-left: 5px; border-left: 2px solid var(--g3); margin-bottom: 2px;
}
#boot-log .bl.ok::before   { content: '✔ '; color: var(--g); }
#boot-log .bl.warn::before { content: '⚡ '; color: var(--o); }
#boot-log .bl.err::before  { content: '✕ '; color: var(--r); }

#pb-wrap { width: min(360px, 88vw); margin-top: 16px; }
#pb-track { height: 2px; background: var(--g3); }
#pb { height: 100%; width: 0; background: linear-gradient(90deg, var(--g2), var(--g));
  box-shadow: 0 0 12px var(--g); transition: width .35s cubic-bezier(.22,1,.36,1); }
#pb-pct { font-size: 7px; color: var(--g2); text-align: right; margin-top: 3px; letter-spacing: .2em; }

#btn-start {
  margin-top: 32px; display: none;
  background: none; border: 1px solid var(--g); color: var(--g);
  font-family: 'Orbitron', sans-serif; font-size: 10px;
  letter-spacing: .35em; padding: 13px 44px; cursor: pointer;
  position: relative; overflow: hidden; transition: color .25s;
}
#btn-start::before {
  content: ''; position: absolute; inset: 0; background: var(--g);
  transform: scaleX(0); transform-origin: left;
  transition: transform .28s cubic-bezier(.22,1,.36,1); z-index: -1;
}
#btn-start:hover::before,
#btn-start:active::before { transform: scaleX(1); }
#btn-start:hover, #btn-start:active { color: #000; }

/* ══════════════════════════════════
   APP LAYOUT
══════════════════════════════════ */
#app {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
}
#vp {
  position: relative;
  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
  background: #000;
}
video { display: none; }
#output_canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 2; cursor: crosshair;
}

#vp::after {
  content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px,
    rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 4px);
  animation: scanroll 8s linear infinite;
}
#vignette {
  position: absolute; inset: 0; z-index: 4; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 36%, rgba(0,0,0,.88) 100%);
}
#grid-ov {
  position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: .025;
  background-image: linear-gradient(var(--g) 1px, transparent 1px),
                    linear-gradient(90deg, var(--g) 1px, transparent 1px);
  background-size: 48px 48px;
}
#alert-flash { position: absolute; inset: 0; z-index: 6; pointer-events: none; opacity: 0; }
#alert-flash.on { animation: alertFlash 1.2s ease-out forwards; }

/* ══════════════════════════════════
   ZOOM CONTROL
══════════════════════════════════ */
#zoom-ui {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  z-index: 50; display: flex; flex-direction: column; align-items: center;
  gap: 15px; background: rgba(0,20,5,0.4); padding: 15px 8px;
  border: 1px solid var(--border); backdrop-filter: blur(5px);
}
#zoom-val {
  font-size: 10px; color: var(--g); text-shadow: 0 0 5px var(--g);
  font-weight: bold; width: 40px; text-align: center;
}
#zoom-range {
  writing-mode: bt-lr; /* IE */
  -webkit-appearance: slider-vertical; /* WebKit */
  width: 8px; height: 180px; background: var(--g3);
  outline: none; cursor: pointer;
}
#zoom-range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 10px;
  background: var(--g); border-radius: 2px; box-shadow: 0 0 10px var(--g);
}
#zoom-label { font-size: 7px; opacity: 0.5; letter-spacing: 0.2em; text-transform: uppercase; }

/* ══════════════════════════════════
   UI ELEMENTS (TOPBAR, CARD, TERM)
══════════════════════════════════ */
.hc { position: absolute; width: 52px; height: 52px; z-index: 10; pointer-events: none; }
.hc::before, .hc::after { content:''; position:absolute; background:var(--g); box-shadow:0 0 6px var(--g); }
.hc::before { width:2px; height:18px; } .hc::after { width:18px; height:2px; }
#hc-tl{top:0;left:0;}    #hc-tl::before{top:0;left:0;}     #hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}   #hc-tr::before{top:0;right:0;}    #hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;} #hc-bl::before{bottom:0;left:0;}  #hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;} #hc-br::after{bottom:0;right:0;}

#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 15; pointer-events: none;
  display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
}
#sys-id { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:900; letter-spacing:.2em; }
#sys-id small { font-weight:400; font-size:9px; opacity:.4; }
#badges { display:flex; gap:5px; }
.badge { font-size:7.5px; padding:3px 8px; border:1px solid var(--border); background:var(--panel); color:var(--g2); display:flex; align-items:center; gap:4px; }
.bdot { width:4px; height:4px; border-radius:50%; background:var(--g); animation:dotBlink 1.5s infinite; }
#b-threat { display:none; color:var(--r); }

#info-card {
  flex: 0 0 var(--card-h); height: var(--card-h); background: rgba(1,5,2,.99);
  border-top: 1px solid rgba(0,255,65,.45); position: relative; z-index: 30;
  max-height: 0; transition: max-height .28s; overflow: hidden; pointer-events: none;
}
#info-card.open { max-height: var(--card-h); pointer-events: all; }
#ic-close { position: absolute; top: 8px; right: 12px; background: none; border: 1px solid rgba(0,255,65,.3); color: var(--g2); font-size: 8px; padding: 3px 10px; cursor: pointer; }
#ic-body { padding: 10px 14px; }
#ic-name { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .18em; }
#ic-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px 8px; font-size: 8px; margin: 8px 0; }
.ick { color: rgba(0,255,65,0.4); }

#terminal-wrap {
  flex: 0 0 var(--term-h); height: var(--term-h); background: rgba(0,0,0,.96);
  border-top: 1px solid var(--border); z-index: 20; display: flex; flex-direction: column; overflow: hidden;
}
#term-body { flex: 1; overflow-y: auto; padding: 4px 12px; font-size: 8px; }
.trow { display: grid; grid-template-columns: 60px 68px 1fr 68px 74px; gap: 4px; padding: 2px 0; }

@keyframes charDrop { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:none; } }
@keyframes glitchLoop { 0%,90%,100%{ opacity:0; } 91%{ opacity:0.7; transform:translateX(-3px); color:var(--r); } 93%{ opacity:0.5; transform:translateX(3px); color:var(--b); } }
@keyframes scanDown { 0% { top:0; opacity:0; } 50% { opacity:1; } 100% { top:100%; opacity:0; } }
@keyframes scanroll { from { background-position:0 0; } to { background-position:0 80px; } }
@keyframes dotBlink { 0%,100%{ opacity:1; } 50% { opacity:.2; } }
@keyframes alertFlash { 0% { opacity:1; background:rgba(255,51,51,.1); } 100% { opacity:0; } }
</style>
</head>
<body>

<div id="boot">
  <div id="boot-hex"><svg viewBox="0 0 800 600"><defs><pattern id="hxp" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse"><polygon points="28,2 54,16 54,44 28,46 2,44 2,16" fill="none" stroke="#00ff41" stroke-width=".5"/></pattern></defs><rect width="100%" height="100%" fill="url(#hxp)"/></svg></div>
  <div id="boot-logo-wrap">
    <div id="boot-logo"><span class="bc">m</span><span class="bc">y</span><span class="bc">E</span><span class="bc">Y</span><span class="bc">E</span></div>
    <div id="boot-logo-g">myEYE</div>
    <div id="boot-scan"></div>
  </div>
  <div id="boot-sub">PRO NEURAL INTERFACE v16.0</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb-track"><div id="pb"></div></div><div id="pb-pct">0%</div></div>
  <button id="btn-start" onclick="startApp()">ACTIVATE</button>
</div>

<div id="app">
  <div id="vp">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <!-- ZOOM UI -->
    <div id="zoom-ui">
      <div id="zoom-label">mag</div>
      <div id="zoom-val">1.0x</div>
      <input type="range" id="zoom-range" min="1" max="5" step="0.1" value="1">
      <div id="zoom-label">zoom</div>
    </div>

    <div id="topbar">
      <div id="sys-id">myEYE <small>// NEURAL HUD</small></div>
      <div id="badges">
        <div class="badge"><span class="bdot"></span><span id="fps-txt">-- FPS</span></div>
        <div class="badge"><span class="bdot"></span><span id="obj-txt">SCANNING</span></div>
        <div class="badge" id="b-threat"><span class="bdot" style="background:var(--r)"></span>THREAT</div>
      </div>
    </div>
    
    <div id="grid-ov"></div><div id="vignette"></div><div id="alert-flash"></div>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div><div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
  </div>

  <div id="info-card">
    <button id="ic-close" onclick="closeCard()">✕ CLOSE</button>
    <div id="ic-body">
      <div id="ic-name">---</div>
      <div id="ic-grid"></div>
      <div id="ic-desc" style="font-size:8px; opacity:0.6; border-top:1px solid var(--border); padding-top:5px;"></div>
    </div>
  </div>

  <div id="terminal-wrap">
    <div id="term-body"></div>
  </div>
</div>

<script>
'use strict';

const CACHE_KEY = 'myeye_v16';
let UC = JSON.parse(localStorage.getItem(CACHE_KEY)) || { aliases:{}, counts:{}, events:[] };
const GROUPS = { person:'HUMAN', car:'VEHICLE', dog:'ANIMAL', 'cell phone':'DEVICE' };
const KB = { _d:{threat:0.2, desc:'Standard object identification.'}, person:{threat:0.7, desc:'Biological target. Motion tracking active.'} };

let detector, poseModel, poseReady = false, poseResult, poseBox;
let lastObjects = [], selectedCls = null, threatActive = false;
let currentZoom = 1.0;

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const zoomRange = document.getElementById('zoom-range');
const zoomVal = document.getElementById('zoom-val');

zoomRange.addEventListener('input', (e) => {
  currentZoom = parseFloat(e.target.value);
  zoomVal.textContent = currentZoom.toFixed(1) + 'x';
});

function sysLog(evt, type='SYS', grp='SYS') {
  const row = document.createElement('div');
  row.className = 'trow';
  row.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><span>LOG</span><span>${evt}</span><span style="color:var(--g)">${type}</span><span>${grp}</span>`;
  const tb = document.getElementById('term-body');
  tb.appendChild(row);
  tb.scrollTop = tb.scrollHeight;
}

async function initModels() {
  const blog = document.getElementById('boot-log');
  const addLog = (t) => { const d=document.createElement('div'); d.className='bl ok'; d.textContent=t; blog.appendChild(d); };
  
  addLog('CORE: LOADING TENSORFLOW...');
  detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  addLog('SENSORS: COCO-SSD ONLINE');
  
  poseModel = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}` });
  poseModel.setOptions({ modelComplexity:0, minDetectionConfidence:0.5 });
  poseModel.onResults(r => { poseResult = r; });
  await poseModel.initialize();
  poseReady = true;
  addLog('NEURAL: POSE ENGINE ACTIVE');
  
  document.getElementById('pb').style.width = '100%';
  document.getElementById('btn-start').style.display = 'block';
}

function startApp() {
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  sysLog('INTERFACE INITIALIZED');

  navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment', width:1280, height:720 } })
    .then(stream => {
      video.srcObject = stream;
      video.play();
      requestAnimationFrame(loop);
    });
}

async function loop() {
  if (video.readyState === 4) {
    const vw = video.videoWidth, vh = video.videoHeight;
    canvas.width = vw; canvas.height = vh;

    // --- ZOOM LOGIC ---
    // Вычисляем размеры области захвата видео (чем больше зум, тем меньше область)
    const sw = vw / currentZoom;
    const sh = vh / currentZoom;
    const sx = (vw - sw) / 2;
    const sy = (vh - sh) / 2;

    // Рисуем увеличенную часть видео на весь холст
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, vw, vh);

    // Детекция объектов (делаем на оригинальном видео для точности, затем проецируем)
    if (frameCount % 5 === 0) {
      const rawDetections = await detector.detect(video);
      
      // Пересчитываем координаты BBox под текущий зум
      lastObjects = rawDetections.map(obj => {
        const [bx, by, bw, bh] = obj.bbox;
        return {
          ...obj,
          bbox: [
            (bx - sx) * currentZoom,
            (by - sy) * currentZoom,
            bw * currentZoom,
            bh * currentZoom
          ]
        };
      });
    }

    drawHUD();
    
    if (poseReady && lastObjects.some(o => o.class === 'person')) {
      // Для Pose используем текущий кадр холста (уже с зумом)
      poseModel.send({ image: canvas });
      drawSkel(sx, sy);
    }
  }
  frameCount++;
  requestAnimationFrame(loop);
}

let frameCount = 0;
function drawHUD() {
  lastObjects.forEach(obj => {
    const [x, y, w, h] = obj.bbox;
    ctx.strokeStyle = varToHex(obj.class);
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    
    ctx.fillStyle = varToHex(obj.class);
    ctx.font = '10px Share Tech Mono';
    ctx.fillText(`${obj.class.toUpperCase()} [${Math.round(obj.score*100)}%]`, x, y > 15 ? y - 5 : y + 15);
  });
  document.getElementById('obj-txt').textContent = lastObjects.length + ' TARGETS';
}

function drawSkel(sx, sy) {
  if (!poseResult || !poseResult.poseLandmarks) return;
  const lm = poseResult.poseLandmarks;
  const vw = canvas.width, vh = canvas.height;

  ctx.fillStyle = '#00ff41';
  lm.forEach(p => {
    if (p.visibility > 0.5) {
      ctx.beginPath();
      // Точки рисуем прямо по координатам холста, т.к. poseModel уже получил зуммированный кадр
      ctx.arc(p.x * vw, p.y * vh, 3, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function varToHex(cls) {
  const g = GROUPS[cls] || 'OBJECT';
  if (g === 'HUMAN') return '#00ff41';
  if (g === 'VEHICLE') return '#ff3333';
  return '#00aaff';
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  const hit = lastObjects.find(o => x > o.bbox[0] && x < o.bbox[0]+o.bbox[2] && y > o.bbox[1] && y < o.bbox[1]+o.bbox[3]);
  if (hit) openCard(hit); else closeCard();
});

function openCard(o) {
  document.getElementById('ic-name').textContent = o.class.toUpperCase();
  document.getElementById('ic-grid').innerHTML = `<div>COORD</div><div>${Math.round(o.bbox[0])}:${Math.round(o.bbox[1])}</div><div>SCORE</div><div>${Math.round(o.score*100)}%</div>`;
  document.getElementById('info-card').classList.add('open');
}
function closeCard() { document.getElementById('info-card').classList.remove('open'); }

initModels();
</script>
</body>
</html>
