<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>myEYE | ADVANCED HUMAN DETECTION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:'Orbitron',sans-serif;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(--g);
text-shadow:0 0 30px var(--g),0 0 60px #004400;animation:gpulse 2s ease-in-out infinite;}
#boot-sub{font-size:9px;letter-spacing:.45em;color:var(--g2);margin:6px 0 32px;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(--g2);min-height:115px;line-height:1.9;}
#boot-log .bl{opacity:0;animation:fi .22s forwards;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(--g);
color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px;
letter-spacing:.3em;padding:13px 42px;cursor:pointer;transition:all .2s;}
#btn-start:hover,#btn-start:active{background:var(--g);color:#000;box-shadow:0 0 20px var(--g);}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.55) contrast(1.38) saturate(.88);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

#vp::after{content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(0,255,65,.016) 3px,rgba(0,255,65,.016) 4px);
animation:scanroll 10s linear infinite;}

.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--g);box-shadow:0 0 5px var(--g);}
.hc::before{width:2px;height:20px;}.hc::after{width:20px;height:2px;}
#hc-tl{top:0;left:0;}#hc-tl::before{top:0;left:0;}#hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}#hc-tr::before{top:0;right:0;}#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;}#hc-bl::before{bottom:0;left:0;}#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}

#xhair{position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:22px;height:22px;margin:-11px;}
#xhair::before{content:'';position:absolute;top:10px;left:0;width:22px;height:2px;
background:rgba(0,255,65,.3);}
#xhair::after{content:'';position:absolute;left:10px;top:0;width:2px;height:22px;
background:rgba(0,255,65,.3);}

#radar{position:absolute;top:50%;left:50%;z-index:7;width:6px;height:6px;margin:-3px;
border-radius:50%;background:var(--g);pointer-events:none;
box-shadow:0 0 0 0 rgba(0,255,65,.5);animation:rpulse 4s ease-out infinite;}

#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
#sys-id{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(--g);text-shadow:0 0 12px var(--g);}
#badges{display:flex;gap:5px;}
.badge{font-size:8px;letter-spacing:.12em;padding:3px 8px;
border:1px solid var(--border);background:var(--panel);color:var(--g2);}
.badge.hi{border-color:var(--g);color:var(--g);}
.badge.al{border-color:var(--r);color:var(--r);}
.badge.wn{border-color:var(--o);color:var(--o);}

#night-btn{position:absolute;top:10px;left:100px;z-index:20;background:none;
border:1px solid var(--border);color:var(--g2);font-family:'Share Tech Mono',monospace;
font-size:8px;padding:4px 10px;cursor:pointer;letter-spacing:.1em;}
#night-btn:hover,#night-btn:active{border-color:var(--b);color:var(--b);}

#statbar{position:absolute;bottom:0;left:0;right:0;z-index:15;
display:flex;gap:1px;pointer-events:none;}
.sc{flex:1;padding:5px 5px;background:var(--panel);
border-top:1px solid var(--border);font-size:7px;
letter-spacing:.07em;color:var(--g2);text-align:center;}
.sc span{display:block;color:var(--g);font-size:10px;font-weight:bold;}

#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(2,8,4,.97);border-top:2px solid var(--g);
padding:12px 16px 10px;transform:translateY(100%);
transition:transform .28s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-close{position:absolute;top:10px;right:14px;background:none;
border:1px solid var(--g2);color:var(--g2);font-family:'Share Tech Mono',monospace;
font-size:9px;padding:3px 10px;cursor:pointer;letter-spacing:.1em;}
#info-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(--g);margin-bottom:8px;display:inline-block;
cursor:pointer;border-bottom:1px dashed transparent;transition:.2s;}
#info-title:hover{border-bottom-color:var(--g);text-shadow:0 0 10px var(--g);}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:9px;}
.ik{color:var(--g2);}.iv{color:var(--g);}
#info-desc{margin-top:8px;font-size:9px;color:var(--g2);line-height:1.6;
border-top:1px solid var(--border);padding-top:6px;}

#terminal{flex:0 0 auto;height:108px;background:var(--bg);
border-top:1px solid var(--border);padding:7px 14px;overflow:hidden;z-index:20;}
#term-hdr{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:.28em;
color:var(--g3);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
#term-hdr::before{content:'';flex:1;height:1px;background:var(--g3);}
#term-lines{font-size:9px;line-height:1.72;}
.tl{opacity:0;animation:si .18s forwards;}
.tok{color:var(--g);}.twarn{color:var(--o);}.talert{color:var(--r);}.tinfo{color:var(--b);}.ttap{color:var(--y);}

@keyframes gpulse{0%,100%{text-shadow:0 0 20px var(--g),0 0 40px #003300;}
50%{text-shadow:0 0 45px var(--g),0 0 90px #00aa44;}}
@keyframes fi{to{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-5px);}to{opacity:.93;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 120px;}}
@keyframes rpulse{0%{box-shadow:0 0 0 0 rgba(0,255,65,.5);}
70%{box-shadow:0 0 0 70px rgba(0,255,65,0);}100%{box-shadow:0 0 0 0 rgba(0,255,65,0);}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-logo">myEYE</div>
  <div id="boot-sub">advanced biological tracking</div>
  <div id="boot-log"></div>
  <div id="pb-wrap"><div id="pb"></div></div>
  <button id="btn-start" onclick="initCamera()">INITIALIZE SYSTEM</button>
</div>

<div id="app" style="display:none;">
  <div id="vp">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="hc" id="hc-tl"></div><div class="hc" id="hc-tr"></div>
    <div class="hc" id="hc-bl"></div><div class="hc" id="hc-br"></div>
    <div id="xhair"></div><div id="radar"></div>
    <button id="night-btn" onclick="toggleNight()">☾ NIGHT</button>

    <div id="topbar">
      <div id="sys-id">myEYE // BIO-SCAN</div>
      <div id="badges">
        <div class="badge hi" id="b-fps">-- FPS</div>
        <div class="badge hi" id="b-obj">0 OBJ</div>
        <div class="badge" id="b-mode">X-RAY ADAPT</div>
        <div class="badge" id="b-rng">ULTRA</div>
      </div>
    </div>

    <div id="statbar">
      <div class="sc">MAX_RANGE<span id="s-dist">---</span></div>
      <div class="sc">BIOMASS<span id="s-thr">0</span></div>
      <div class="sc">ACCURACY<span id="s-conf">---%</span></div>
      <div class="sc">SESSIONS<span id="s-trk">0</span></div>
    </div>

    <div id="info-panel">
      <button id="info-close" onclick="closeInfo()">✕ CLOSE</button>
      <div id="info-title" onclick="renameObject()">---</div>
      <div id="info-grid"></div>
      <div id="info-desc"></div>
    </div>
  </div>

  <div id="terminal">
    <div id="term-hdr"><span>NEURAL_FEED // BIOMETRIC_DATA_STREAM</span></div>
    <div id="term-lines"></div>
  </div>
</div>

<script>
const DEFAULT_ALIASES = {
  person: 'СУБЪЕКТ', car: 'ОБЪЕКТ_V1', truck: 'ГРУЗОВИК', bus: 'АВТОБУС',
  motorcycle: 'МОТОЦИКЛ', bicycle: 'ВЕЛОСИПЕД', 'fire hydrant': 'ГИДРАНТ',
  'stop sign': 'СТОП', 'traffic light': 'СВЕТОФОР', dog: 'BIO_CANINE', cat: 'BIO_FELINE',
  'cell phone': 'ТЕРМИНАЛ', bottle: 'РЕСУРС', backpack: 'ГРУЗ', chair: 'МЕБЕЛЬ',
  tv: 'ЭКРАН', laptop: 'ЛЕПТОП', mouse: 'МАНИПУЛЯТОР', keyboard: 'ВВОД'
};

let USER_MEM = JSON.parse(localStorage.getItem('myeye_mem') || '{}');

const CFG={
  FOCAL:1000, 
  CONF:0.20,  
  MAX_DET:40,
  SKIP:1, 
  SMOOTH:0.18, 
  TTL:45,    
  IOU:0.3
};

const OBJ_H={
  person:1.75, car:1.5, truck:3.0, dog:0.5, cat:0.3, 'cell phone':0.15, default:1.0
};

const THREAT=new Set(['person','car','truck']);
const COL={
  person:'#ff3300', car:'#ffcc00', _d:'#00ff41'
};

function getAlias(cls) { return USER_MEM[cls] || DEFAULT_ALIASES[cls] || cls.toUpperCase(); }
function getCol(c){return COL[c]||COL._d;}
function dist(bbox,cls){
  const rh=OBJ_H[cls]||OBJ_H.default;
  const px=Math.max(bbox[2],bbox[3]);
  return px<2?999:Math.min(999,+(CFG.FOCAL*rh/px).toFixed(1));
}

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function iou(a,b){
  const ix=Math.max(a[0],b[0]),iy=Math.max(a[1],b[1]);
  const iw=Math.min(a[0]+a[2],b[0]+b[2])-ix,ih=Math.min(a[1]+a[3],b[1]+b[3])-iy;
  if(iw<=0||ih<=0) return 0;
  return (iw*ih)/(a[2]*a[3]+b[2]*b[3]-iw*ih);
}

class Tracker{
  constructor(){this.tracks={};this.nid=1;}
  update(preds){
    for(const k in this.tracks){
      this.tracks[k].age++;
      this.tracks[k].seen=false;
      if(this.tracks[k].age>CFG.TTL) delete this.tracks[k];
    }
    for(const p of preds){
      let best=null, bs=CFG.IOU;
      for(const id in this.tracks){
        const t=this.tracks[id];
        if(t.cls!==p.class) continue;
        const s=iou(t.sm,p.bbox);
        if(s>bs){bs=s;best=t;}
      }
      if(best){
        best.sm=best.sm.map((v,i)=>v+(p.bbox[i]-v)*CFG.SMOOTH);
        best.score=best.score+(p.score-best.score)*CFG.SMOOTH;
        best.age=0; best.seen=true;
        p._tid=best.id;
      }else{
        const id=this.nid++;
        this.tracks[id]={id,cls:p.class,sm:[...p.bbox],score:p.score,age:0,seen:true};
        p._tid=id;
      }
    }
    return Object.values(this.tracks).filter(t=>t.age<2);
  }
}

const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const termEl=document.getElementById('term-lines');
let model=null, running=false, lastPred=[], lastFpsT=0, fpsCnt=0;
let termQ=[], logThr={}, nightMode=false, selTid=null;
const tracker=new Tracker();

async function bootSeq(){
  const bootLog=document.getElementById('boot-log');
  const pbEl=document.getElementById('pb');
  const BOOT=[[0,"DECRYPTING KERNEL..."],[200,"LOADING TENSORFLOW_CORE v3.18"],[400,"INIT COCO-SSD LITE MODEL"],[700,"CALIBRATING THERMAL LAYERS"],[900,"SYSTEM READY"]];
  for(let i=0;i<BOOT.length;i++){
    await new Promise(r=>setTimeout(r,BOOT[i][0]-(i?BOOT[i-1][0]:0)));
    const d=document.createElement('div');d.className='bl';d.textContent='> '+BOOT[i][1];
    bootLog.appendChild(d);pbEl.style.width=((i+1)/BOOT.length*100)+'%';
  }
  model=await cocoSsd.load({base:'lite_mobilenet_v2'});
  document.getElementById('btn-start').style.display='block';
}

async function initCamera(){
  try {
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}});
    video.srcObject=s;
    video.onloadedmetadata=()=>{
      video.play();
      document.getElementById('boot').style.display='none';
      document.getElementById('app').style.display='flex';
      running=true;
      log("INTERFACE_BOOT: SUCCESS",'ok');
      requestAnimationFrame(renderLoop);
    };
  } catch(e) { log("ERR: NO_CAM",'alert'); }
}

function log(txt,type='ok'){
  termQ.push({txt,type});
  if(termQ.length>5) termQ.shift();
  termEl.innerHTML='';
  termQ.forEach(q=>{
    const d=document.createElement('div');
    d.className='tl t'+q.type; d.textContent='> '+q.txt;
    termEl.appendChild(d);
  });
}

async function renderLoop(now){
  if(!running) return requestAnimationFrame(renderLoop);
  fpsCnt++;
  if(now-lastFpsT>1000){
    document.getElementById('b-fps').textContent=fpsCnt+' FPS';
    fpsCnt=0;lastFpsT=now;
  }
  if(video.readyState === 4){
    const raw=await model.detect(video,CFG.MAX_DET,CFG.CONF);
    lastPred=tracker.update(raw);
  }
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  draw(now);
  updateHUD();
  requestAnimationFrame(renderLoop);
}

function draw(time){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  lastPred.forEach(p=>{
    const [x,y,w,h]=p.sm;
    const col=getCol(p.cls);
    const isSel = p.id === selTid;
    
    // ОСНОВНАЯ РАМКА
    ctx.strokeStyle=col;
    ctx.lineWidth=isSel ? 3 : 1;
    ctx.strokeRect(x,y,w,h);
    
    // ЭФФЕКТ ДЛЯ ЧЕЛОВЕКА (ТОЧКИ)
    if(p.cls === 'person'){
      ctx.fillStyle = "#ff4400";
      // Псевдослучайные точки внутри силуэта
      const seed = p.id * 100;
      for(let i=0; i<15; i++){
          const px = x + (Math.sin(seed + i + time*0.002) * 0.5 + 0.5) * w;
          const py = y + (Math.cos(seed * i - time*0.001) * 0.5 + 0.5) * h;
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI*2);
          ctx.fill();
      }
      // "ГОЛОВА" - верхний квадрат
      const hw = w * 0.25;
      ctx.strokeRect(x + w/2 - hw/2, y + h*0.05, hw, hw);
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + h*0.05 + hw/2);
      ctx.lineTo(x + w + 40, y - 20); // "Лазерная" линия связи
      ctx.strokeStyle = hexA(col, 0.4);
      ctx.stroke();
    }

    // ТЕКСТ
    ctx.fillStyle=col;
    ctx.font="10px 'Orbitron'";
    ctx.fillText(`${getAlias(p.cls)} #${p.id}`, x, y-10);
  });
}

function updateHUD(){
  document.getElementById('b-obj').textContent=lastPred.length+' OBJ';
  let thr=0;
  lastPred.forEach(p=>{ if(p.cls === 'person') thr++; });
  document.getElementById('s-thr').textContent=thr;
  document.getElementById('s-trk').textContent=Object.keys(tracker.tracks).length;
}

function toggleNight(){
  nightMode=!nightMode;
  video.style.filter=nightMode?'brightness(.4) contrast(2) saturate(0) sepia(1) hue-rotate(90deg)':'brightness(.55) contrast(1.38) saturate(.88)';
}

function handleTap(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
  const hit=lastPred.find(p=>{
    const [x,y,w,h]=p.sm;
    return cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h;
  });
  if(hit){
    selTid=hit.id;
    document.getElementById('info-title').textContent=getAlias(hit.cls);
    document.getElementById('info-title').dataset.cls=hit.cls;
    document.getElementById('info-panel').classList.add('open');
  } else {
    selTid=null;
    document.getElementById('info-panel').classList.remove('open');
  }
}

function renameObject() {
  const titleEl = document.getElementById('info-title');
  const cls = titleEl.dataset.cls;
  const n = prompt(`ИЗМЕНИТЬ ИМЯ КЛАССА ${cls}:`, titleEl.textContent);
  if (n) {
    USER_MEM[cls] = n.toUpperCase();
    localStorage.setItem('myeye_mem', JSON.stringify(USER_MEM));
    location.reload();
  }
}

canvas.addEventListener('click',handleTap);
bootSeq();
</script>
</body>
</html>
